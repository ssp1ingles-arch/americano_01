<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--vl:#A78BFA;--gn:#5FD87A;--am:#F5C518;--rd:#f87171;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}

html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;}

.gnav-logo span{opacity:.55;font-size:1rem;}
.gnav-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-decoration:none;padding:.3rem .85rem;border-radius:.4rem;border:1px solid transparent;transition:all .18s;white-space:nowrap;}
.gnav-s1{color:#64DFDF;border-color:rgba(100,223,223,.35);background:rgba(100,223,223,.08);}
.gnav-s1:hover{background:rgba(100,223,223,.15);}
.gnav-s2{color:#F5C518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.06);}
.gnav-s2:hover{background:rgba(245,197,24,.12);}
.gnav-s3{color:#A78BFA;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08);}
.gnav-s3:hover{background:rgba(167,139,250,.15);}
.gnav-s3.active{border-color:#A78BFA;background:rgba(167,139,250,.12);box-shadow:0 0 10px rgba(167,139,250,.2);}
.gnav-s4{color:#FF6B6B;border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);}
.gnav-s4:hover{background:rgba(255,107,107,.15);}
.gnav-s4.active{color:#FF6B6B;border-color:#FF6B6B;background:rgba(255,107,107,.12);box-shadow:0 0 10px rgba(255,107,107,.2);}
.gnav-s5{color:#10B981;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.gnav-s5:hover{background:rgba(16,185,129,.18);}
.gnav-s5.active{border-color:#10B981;background:rgba(16,185,129,.16);box-shadow:0 0 10px rgba(16,185,129,.25);}

.gnav-jornada:hover{border-color:rgba(255,255,255,.32);background:linear-gradient(135deg,rgba(100,223,223,.18),rgba(245,197,24,.13),rgba(167,139,250,.18));}

/* LOCAL NAV */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;}
.nav-back{color:var(--vl);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.8;transition:opacity .2s;}
.nav-back:hover{opacity:1;}.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;transition:opacity .2s;}.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}
.nav-sub{font-size:.72rem;color:var(--td);}
.nav-count{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;color:var(--vl);}

/* LAYOUT */
.wrap{padding-top:96px;position:relative;z-index:1;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;padding:.85rem 1.25rem;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:96px;z-index:50;}
.grp-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.32rem .85rem;border-radius:.4rem;border:1px solid var(--bd);background:none;color:var(--td);cursor:pointer;transition:all .18s;}
.grp-btn:hover{color:var(--tx);border-color:var(--bdh);}
.grp-btn.on{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);color:var(--vl);}
.grp-btn.on1{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.4);color:var(--am);}
.grp-btn.on2{background:rgba(95,216,122,.1);border-color:rgba(95,216,122,.4);color:var(--gn);}
.grp-btn.on3{background:rgba(100,223,223,.1);border-color:rgba(100,223,223,.4);color:#64DFDF;}
.quiz-btn{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.32rem .9rem;border-radius:.4rem;border:1px solid rgba(167,139,250,.35);background:rgba(167,139,250,.08);color:var(--vl);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:.4rem;}
.quiz-btn:hover{background:rgba(167,139,250,.18);}
.quiz-btn.on{background:rgba(167,139,250,.2);border-color:var(--vl);box-shadow:0 0 10px rgba(167,139,250,.2);}
.quiz-dot{width:8px;height:8px;border-radius:50%;background:var(--vl);}
.quiz-reset{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:700;padding:.32rem .75rem;border-radius:.4rem;border:1px solid var(--bd);background:none;color:var(--td);cursor:pointer;display:none;}
.quiz-reset.show{display:block;}

/* GRID */
.grid-area{padding:1.25rem;}
.group-label{font-family:'Space Grotesk',sans-serif;font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--td);margin-bottom:.85rem;padding-left:.1rem;display:flex;align-items:center;gap:.6rem;}
.group-label::after{content:'';flex:1;height:1px;background:var(--bd);}
.group-section{margin-bottom:2rem;}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;}

/* FLASH CARD */
.fc-wrap{perspective:800px;}
.fc{width:100%;aspect-ratio:3/4;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);}
.fc.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:.85rem;border:1px solid var(--bd);overflow:hidden;display:flex;flex-direction:column;}
.fc-front{background:var(--sf);}
.fc-back{background:var(--sf2);transform:rotateY(180deg);}

/* FRONT */
.fc-front-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem .75rem .5rem;position:relative;}
.fc-group-badge{position:absolute;top:.65rem;right:.65rem;font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.18rem .5rem;border-radius:2rem;border:1px solid;}
.fc-num{font-size:.55rem;font-weight:700;color:var(--td);position:absolute;top:.65rem;left:.65rem;}
.fc-verb{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;line-height:1.1;text-align:center;margin-bottom:.4rem;}
.fc-phon{font-size:.7rem;color:var(--td);text-align:center;font-style:italic;margin-bottom:.6rem;}
.fc-hint{font-size:.62rem;color:var(--td);text-align:center;opacity:.6;}
.fc-front-bar{height:3px;width:100%;}

/* BACK */
.fc-back-content{flex:1;padding:.85rem .8rem;overflow:hidden;}
.fc-forms{display:grid;grid-template-columns:1fr;gap:.4rem;margin-bottom:.75rem;}
.fc-form{background:var(--bg);border:1px solid var(--bd);border-radius:.55rem;padding:.45rem .65rem;}
.fc-form-label{font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--td);margin-bottom:.18rem;}
.fc-form-word{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:800;}
.fc-form-phon{font-size:.6rem;color:var(--td);font-style:italic;}
.fc-sentence{font-size:.68rem;color:var(--tm);line-height:1.4;margin-top:.4rem;padding-top:.4rem;border-top:1px solid var(--bd);}
.fc-sentence .en{color:var(--tx);}
.fc-sentence .pt{color:var(--td);}
.fc-error{font-size:.62rem;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:.4rem;padding:.3rem .5rem;margin-top:.4rem;color:var(--rd);}
.fc-tip{font-size:.62rem;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);border-radius:.4rem;padding:.3rem .5rem;margin-top:.35rem;color:var(--vl);}
.fc-back-bar{height:3px;width:100%;}

/* QUIZ OVERLAY */
.fc-quiz-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--sf);border-radius:.85rem;border:1px solid var(--bd);z-index:5;}
.fc-quiz-overlay.show{display:flex;}
.fc-quiz-verb{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:800;text-align:center;margin-bottom:.6rem;}
.fc-quiz-q{font-size:.75rem;color:var(--td);text-align:center;}
.fc-quiz-tap{font-size:.62rem;color:var(--td);margin-top:1rem;opacity:.6;}

/* STATS BAR */
.stats{display:flex;align-items:center;gap:1rem;padding:.6rem 1.25rem;background:var(--sf);border-top:1px solid var(--bd);font-size:.75rem;color:var(--td);}
.stat-n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;color:var(--vl);}

/* HIDDEN */
.hidden{display:none!important;}

@media(max-width:900px){.card-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.card-grid{grid-template-columns:repeat(2,1fr);}.fc-verb{font-size:1.5rem;}}
</style>

];

const GROUP_NAMES = ['','① 6 Mais Usados','② Comunicação e Percepção','③ Verbos de Ação'];
const GROUP_COLORS = ['','#F5C518','#5FD87A','#64DFDF'];

// ── STATE ────────────────────────────────────────────────────────────────────
let activeGroup = 0;
let quizMode = false;
let flipped = new Set();

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderCard(v) {
  const c = v.color;
  const isFlipped = flipped.has(v.id) ? 'flipped' : '';

  const sentences = v.sentences.map(s =>
    `<div class="fc-sentence"><div class="en">${s.en}</div><div class="pt">${s.pt}</div></div>`
  ).join('');

  const errorHTML = v.error ? `<div class="fc-error">⚠️ ${v.error}</div>` : '';
  const tipHTML   = v.tip   ? `<div class="fc-tip">💡 ${v.tip}</div>` : '';

  const ppRow = v.pp !== '—'
    ? `<div class="fc-form">
        <div class="fc-form-label">Particípio (V3)</div>
        <div class="fc-form-word" style="color:${c}">${v.pp}</div>
        <div class="fc-form-phon">${v.pp_phon}</div>
       </div>`
    : `<div class="fc-form">
        <div class="fc-form-label">Particípio</div>
        <div class="fc-form-word" style="color:var(--td);font-size:.85rem">—</div>
        <div class="fc-form-phon">${v.pp_phon}</div>
       </div>`;

  return `
  <div class="fc-wrap" id="wrap${v.id}">
    <div class="fc ${isFlipped}" id="card${v.id}" onclick="flipCard(${v.id})">

      <!-- FRONT -->
      <div class="fc-face fc-front">
        <div class="fc-front-top">
          <div class="fc-num">${String(v.id).padStart(2,'0')}</div>
          <div class="fc-group-badge" style="color:${c};border-color:${c}33;background:${c}11">${GROUP_NAMES[v.group].split(' ')[0]}</div>
          <div class="fc-verb" style="color:${c}">${v.verb}</div>
          <div class="fc-phon">/${v.phon}/</div>
          <div class="fc-hint">${quizMode ? 'Qual é o passado?' : 'Clique para ver as formas'}</div>
        </div>
        <div class="fc-front-bar" style="background:${c}"></div>
      </div>

      <!-- BACK -->
      <div class="fc-face fc-back">
        <div class="fc-back-content">
          <div class="fc-forms">
            <div class="fc-form">
              <div class="fc-form-label">Presente (V1)</div>
              <div class="fc-form-word" style="color:var(--tm)">${v.verb}</div>
              <div class="fc-form-phon">/${v.phon}/</div>
            </div>
            <div class="fc-form">
              <div class="fc-form-label">Passado (V2)</div>
              <div class="fc-form-word" style="color:${c}">${v.past}</div>
              <div class="fc-form-phon">/${v.past_phon}/</div>
            </div>
            ${ppRow}
          </div>
          ${sentences}
          ${errorHTML}
          ${tipHTML}
        </div>
        <div class="fc-back-bar" style="background:${c}"></div>
      </div>

    </div>
  </div>`;
}

function buildGrid() {
  const area = document.getElementById('gridArea');
  const groups = [1, 2, 3];
  let html = '';

  for (const g of groups) {
    const verbs = VERBS.filter(v => activeGroup === 0 || activeGroup === g)
                       .filter(v => v.group === g);
    if (!verbs.length) continue;

    html += `<div class="group-section">
      <div class="group-label" style="color:${GROUP_COLORS[g]}">${GROUP_NAMES[g]}</div>
      <div class="card-grid">${verbs.map(renderCard).join('')}</div>
    </div>`;
  }

  area.innerHTML = html;
  updateCount();
}

function updateCount() {
  const visible = activeGroup === 0 ? VERBS.length : VERBS.filter(v => v.group === activeGroup).length;
  document.getElementById('navCount').textContent = `${visible} verbos`;
}

// ── INTERACTIONS ─────────────────────────────────────────────────────────────
function flipCard(id) {
  const card = document.getElementById('card' + id);
  if (!card) return;
  if (flipped.has(id)) {
    flipped.delete(id);
    card.classList.remove('flipped');
  } else {
    flipped.add(id);
    card.classList.add('flipped');
  }
}

function filterGroup(g, btn) {
  activeGroup = g;
  document.querySelectorAll('.grp-btn').forEach(b => {
    b.classList.remove('on','on1','on2','on3');
  });
  if (g === 0) btn.classList.add('on');
  else btn.classList.add('on' + g);
  flipped.clear();
  buildGrid();
}

function toggleQuiz() {
  quizMode = !quizMode;
  const btn = document.getElementById('quizBtn');
  const rst = document.getElementById('resetBtn');
  btn.classList.toggle('on', quizMode);
  rst.classList.toggle('show', quizMode);
  if (quizMode) {
    btn.innerHTML = '<span class="quiz-dot"></span> Quiz Ativo';
    flipped.clear();
  } else {
    btn.innerHTML = '<span class="quiz-dot"></span> Modo Quiz';
  }
  buildGrid();
}

function resetCards() {
  flipped.clear();
  buildGrid();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildGrid();
</script>
</body>
</html>

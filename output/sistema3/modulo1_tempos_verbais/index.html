<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo 1 — Os 12 Tempos Verbais · Sistema 3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--sf3:#1c2a3e;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--vl:#A78BFA;--rd:#f87171;--gn:#5FD87A;--cy:#64DFDF;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;}

/* GLOBAL NAV */
.gnav{position:fixed;top:0;left:0;right:0;z-index:999;height:48px;background:#080c14;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 1.25rem;gap:1rem;}
.gnav-logo{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:.45rem;margin-right:auto;}
.gnav-logo span{opacity:.55;font-size:1rem;}
.gnav-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-decoration:none;padding:.3rem .85rem;border-radius:.4rem;border:1px solid transparent;transition:all .18s;white-space:nowrap;}
.gnav-s1{color:#64DFDF;border-color:rgba(100,223,223,.35);background:rgba(100,223,223,.08);}
.gnav-s1:hover{background:rgba(100,223,223,.15);border-color:rgba(100,223,223,.6);}
.gnav-s2{color:#F5C518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.06);}
.gnav-s2:hover{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.55);}
.gnav-s3{color:#A78BFA;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08);}
.gnav-s3:hover{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.6);}
.gnav-s3.active{color:#A78BFA;border-color:#A78BFA;background:rgba(167,139,250,.12);box-shadow:0 0 10px rgba(167,139,250,.2);}
.gnav-s4{color:#FF6B6B;border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);}
.gnav-s4:hover{background:rgba(255,107,107,.15);}
.gnav-s4.active{color:#FF6B6B;border-color:#FF6B6B;background:rgba(255,107,107,.12);box-shadow:0 0 10px rgba(255,107,107,.2);}
.gnav-s5{color:#10B981;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.gnav-s5:hover{background:rgba(16,185,129,.18);}
.gnav-s5.active{border-color:#10B981;background:rgba(16,185,129,.16);box-shadow:0 0 10px rgba(16,185,129,.25);}
.gnav-jornada{background:linear-gradient(135deg,rgba(100,223,223,.12),rgba(245,197,24,.08),rgba(167,139,250,.12));border-color:rgba(255,255,255,.18);color:#fff;}
.gnav-jornada:hover{border-color:rgba(255,255,255,.32);background:linear-gradient(135deg,rgba(100,223,223,.18),rgba(245,197,24,.13),rgba(167,139,250,.18));}

/* LOCAL NAV */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;}
.nav-back{color:var(--vl);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.8;transition:opacity .2s;}
.nav-back:hover{opacity:1;}.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;transition:opacity .2s;}.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);font-size:.8rem;}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}
.nav-sub{font-size:.72rem;color:var(--td);}

/* LAYOUT */
.wrap{padding-top:96px;position:relative;z-index:1;}

/* CONTROLS BAR */
.controls{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;padding:.85rem 1.25rem;border-bottom:1px solid var(--bd);background:var(--sf);}
.gf-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:.3rem .85rem;border-radius:.4rem;border:1px solid var(--bd);background:none;color:var(--td);cursor:pointer;transition:all .18s;}
.gf-btn:hover{color:var(--tx);border-color:var(--bdh);}
.gf-btn.all.on{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.4);color:var(--vl);}
.gf-btn.past.on{background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.4);color:var(--rd);}
.gf-btn.present.on{background:rgba(95,216,122,.1);border-color:rgba(95,216,122,.4);color:var(--gn);}
.gf-btn.future.on{background:rgba(100,223,223,.1);border-color:rgba(100,223,223,.4);color:var(--cy);}
.cmp-btn{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.3rem .9rem;border-radius:.4rem;border:1px solid rgba(167,139,250,.35);background:rgba(167,139,250,.08);color:var(--vl);cursor:pointer;transition:all .18s;white-space:nowrap;}
.cmp-btn:hover{background:rgba(167,139,250,.18);border-color:rgba(167,139,250,.6);}
.cmp-btn.on{background:rgba(167,139,250,.2);border-color:var(--vl);box-shadow:0 0 10px rgba(167,139,250,.2);}

/* TIMELINE */
.timeline-area{padding:1.25rem 1.25rem 0;background:var(--sf);border-bottom:1px solid var(--bd);overflow-x:auto;}
.timeline-inner{display:flex;align-items:flex-start;min-width:540px;position:relative;padding-bottom:1rem;}
.timeline-line{position:absolute;top:44px;left:0;right:0;height:2px;background:linear-gradient(90deg,rgba(248,113,113,.4),rgba(248,113,113,.4) 33%,rgba(95,216,122,.4) 33%,rgba(95,216,122,.4) 66%,rgba(100,223,223,.4) 66%);pointer-events:none;}
.tg{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;padding:0 .25rem;}
.tg-label{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.55rem;padding:.2rem .65rem;border-radius:2rem;border:1px solid;}
.tg-past .tg-label{color:var(--rd);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.07);}
.tg-present .tg-label{color:var(--gn);border-color:rgba(95,216,122,.3);background:rgba(95,216,122,.07);}
.tg-future .tg-label{color:var(--cy);border-color:rgba(100,223,223,.3);background:rgba(100,223,223,.07);}
.tg-dots{display:flex;gap:.5rem;position:relative;z-index:2;}
.dot{width:38px;height:38px;border-radius:50%;background:var(--sf2);border:2px solid var(--bd);cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;transition:all .2s;display:flex;align-items:center;justify-content:center;position:relative;}
.dot .dot-num{font-size:.7rem;font-weight:800;}
.tg-past .dot{color:var(--rd);}
.tg-past .dot:hover,.tg-past .dot.active{background:rgba(248,113,113,.12);border-color:var(--rd);box-shadow:0 0 14px rgba(248,113,113,.35);}
.tg-present .dot{color:var(--gn);}
.tg-present .dot:hover,.tg-present .dot.active{background:rgba(95,216,122,.12);border-color:var(--gn);box-shadow:0 0 14px rgba(95,216,122,.35);}
.tg-future .dot{color:var(--cy);}
.tg-future .dot:hover,.tg-future .dot.active{background:rgba(100,223,223,.12);border-color:var(--cy);box-shadow:0 0 14px rgba(100,223,223,.35);}
.dot.dim{opacity:.28;}
.tg-names{display:flex;gap:.5rem;margin-top:.4rem;}
.tg-names span{width:38px;font-size:.5rem;font-weight:600;text-align:center;color:var(--td);line-height:1.3;display:block;}

/* PANEL */
.panel-wrap{padding:1.25rem;max-width:900px;margin:0 auto;}
.panel{display:none;}
.panel.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.p-header{display:flex;align-items:flex-start;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.p-anchor{width:88px;height:88px;flex-shrink:0;background:var(--sf);border:1px solid var(--bd);border-radius:.85rem;display:flex;align-items:center;justify-content:center;}
.p-meta{flex:1;}
.p-group-tag{font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.3rem;}
.p-name{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;line-height:1.15;margin-bottom:.35rem;}
.p-namePT{font-size:.82rem;color:var(--td);}
.p-formula{background:var(--sf2);border:1px solid var(--bd);border-radius:.65rem;padding:.75rem 1rem;margin-bottom:1rem;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:600;}
.p-formula .label{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.3rem;}

.p-use{background:var(--sf);border:1px solid var(--bd);border-left:3px solid;border-radius:.55rem;padding:.7rem 1rem;margin-bottom:1rem;font-size:.84rem;color:var(--tm);line-height:1.55;}

.p-section-label{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.55rem;}

/* EXAMPLES TABLE */
.ex-table{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:.82rem;}
.ex-table th{text-align:left;font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--td);padding:.35rem .5rem;border-bottom:1px solid var(--bd);}
.ex-table td{padding:.4rem .5rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;}
.ex-table tr:last-child td{border-bottom:none;}
.ex-pronoun{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.8rem;width:60px;}
.ex-en{color:var(--tx);}
.ex-pt{color:var(--td);}

/* MARKERS */
.markers{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
.marker{background:var(--sf2);border:1px solid var(--bd);border-radius:2rem;padding:.2rem .65rem;font-size:.72rem;font-weight:600;font-family:'Space Grotesk',sans-serif;color:var(--tm);}

/* ERROR BOX */
.error-box{background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.25);border-radius:.65rem;padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.75rem;}
.error-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem;}
.error-wrong{font-family:'Space Grotesk',sans-serif;font-size:.85rem;color:var(--rd);text-decoration:line-through;margin-right:.5rem;}
.error-right{font-family:'Space Grotesk',sans-serif;font-size:.85rem;color:var(--gn);}
.error-note{font-size:.76rem;color:var(--tm);margin-top:.3rem;}

/* TIP BOX */
.tip-box{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.25);border-radius:.65rem;padding:.75rem 1rem;margin-bottom:1rem;font-size:.82rem;color:var(--tm);line-height:1.55;}
.tip-box strong{color:var(--vl);}

/* COMPARE PANEL */
.compare-wrap{display:none;padding:1.25rem;gap:1rem;max-width:1100px;margin:0 auto;}
.compare-wrap.active{display:grid;grid-template-columns:1fr 1fr;animation:fadeIn .25s ease;}
.cmp-card{background:var(--sf);border:1px solid var(--bd);border-radius:.85rem;padding:1rem;}
.cmp-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;margin-bottom:.5rem;}
.cmp-formula{font-family:'Space Grotesk',sans-serif;font-size:.78rem;background:var(--sf2);border-radius:.45rem;padding:.5rem .75rem;margin-bottom:.75rem;}
.cmp-ex{font-size:.8rem;padding:.35rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.cmp-ex:last-child{border-bottom:none;}
.cmp-ex .en{color:var(--tx);}
.cmp-ex .pt{color:var(--td);font-size:.74rem;}

/* SVG ANCHORS */
@keyframes draw{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
@keyframes pulse{0%,100%{r:6}50%{r:9}}
@keyframes grow-tri{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
@keyframes bounce-arrow{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@keyframes bounce-arrow-up{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes bounce-arrow-r{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}

@media(max-width:640px){
  .compare-wrap.active{grid-template-columns:1fr;}
  .timeline-area{padding:.75rem .75rem 0;}
}
</style>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
const C = {rd:'#f87171', gn:'#5FD87A', cy:'#64DFDF', vl:'#A78BFA'};

const TENSES = [
  // ── PASSADO ──────────────────────────────────────────────────────────────
  {
    id:0, group:'past', color:C.rd,
    name:'Simple Past', namePT:'Passado Simples',
    formula:'Subject + <span style="color:'+C.rd+'">V2</span> (forma passada)',
    use:'Ações completadas no passado, com tempo definido.',
    markers:['yesterday','last week','ago','in 2020','last night'],
    examples:[
      ['I','played football yesterday.','Eu joguei futebol ontem.'],
      ['You','read a story last night.','Você leu uma história ontem à noite.'],
      ['He','wrote a new song.','Ele escreveu uma nova música.'],
      ['She','cooked dinner yesterday.','Ela cozinhou jantar ontem.'],
      ['It','rained heavily last week.','Choveu muito na semana passada.'],
      ['We','studied English last year.','Nós estudamos inglês no ano passado.'],
      ['They','watched a movie yesterday.','Eles assistiram um filme ontem.'],
    ],
    error:{wrong:'I writed',right:'I wrote',note:'Verbos irregulares não têm -ed!'},
    tip:null, anchor:'down',
  },
  {
    id:1, group:'past', color:C.rd,
    name:'Past Continuous', namePT:'Passado Contínuo',
    formula:'Subject + <span style="color:'+C.rd+'">was/were</span> + <span style="color:'+C.rd+'">verb-ing</span>',
    use:'Ação em progresso num momento específico do passado; frequentemente interrompida por outra ação.',
    markers:['while','when','at that moment','at 6pm yesterday'],
    examples:[
      ['I','was reading a book when you called.','Eu estava lendo quando você ligou.'],
      ['You','were cooking dinner yesterday evening.','Você estava cozinhando ontem à tarde.'],
      ['He','was playing the guitar at 6PM.','Ele estava tocando violão às 18h.'],
      ['She','was watching TV when I arrived.','Ela estava assistindo TV quando cheguei.'],
      ['It','was raining all night.','Estava chovendo a noite toda.'],
      ['We','were working on the assignment.','Estávamos trabalhando na tarefa.'],
      ['They','were talking to each other.','Eles estavam conversando entre si.'],
    ],
    error:null,
    tip:'Imagine uma linha do passado — algo estava acontecendo (contínuo) <strong>quando</strong> algo interrompeu (simples).',
    anchor:'v-down',
  },
  {
    id:2, group:'past', color:C.rd,
    name:'Past Perfect', namePT:'Passado Perfeito',
    formula:'Subject + <span style="color:'+C.rd+'">had</span> + <span style="color:'+C.rd+'">V3</span> (particípio)',
    use:'Ação que aconteceu ANTES de outra ação no passado. O "passado do passado".',
    markers:['before','after','already','by the time','when'],
    examples:[
      ['I','had finished my homework before dinner.','Eu tinha terminado a lição antes do jantar.'],
      ['You','had visited London before moving there.','Você tinha visitado antes de se mudar.'],
      ['He','had written a song before joining the band.','Ele tinha escrito antes de entrar na banda.'],
      ['She','had cooked dinner before guests arrived.','Ela tinha cozinhado antes dos convidados chegarem.'],
      ['It','had stopped raining before we went out.','Tinha parado de chover antes de sairmos.'],
      ['We','had seen that movie before it was on TV.','Tínhamos visto antes de passar na TV.'],
      ['They','had completed the project before the deadline.','Tinham completado antes do prazo.'],
    ],
    error:null, tip:null, anchor:'arc-left',
  },
  {
    id:3, group:'past', color:C.rd,
    name:'Past Perfect Continuous', namePT:'Passado Perfeito Contínuo',
    formula:'Subject + <span style="color:'+C.rd+'">had been</span> + <span style="color:'+C.rd+'">verb-ing</span>',
    use:'Ação que estava em progresso antes de outra ação no passado. Ênfase na duração.',
    markers:['for','since','before','when','by the time'],
    examples:[
      ['I','had been writing a book.','Eu tinha estado escrevendo um livro.'],
      ['She','had been working there for 5 years before she quit.','Ela tinha trabalhado lá 5 anos antes de sair.'],
      ['They','had been waiting for an hour before the bus arrived.','Eles tinham esperado uma hora antes do ônibus chegar.'],
    ],
    error:null,
    tip:'Raro no dia a dia. Mais usado para narrativas complexas e inglês formal.',
    anchor:'tri-left',
  },
  // ── PRESENTE ─────────────────────────────────────────────────────────────
  {

// ── RENDER PANEL ─────────────────────────────────────────────────────────────
function renderPanel(t) {
  const groupLabel = {past:'Passado', present:'Presente', future:'Futuro'}[t.group];
  const groupColor = t.color;

  let errorHTML = '';
  if (t.error) {
    errorHTML = `<div class="error-box">
      <div class="error-icon">⚠️</div>
      <div>
        <span class="error-wrong">${t.error.wrong}</span>
        <span class="error-right">✓ ${t.error.right}</span>
        <div class="error-note">${t.error.note}</div>
      </div>
    </div>`;
  }

  let tipHTML = '';
  if (t.tip) {
    tipHTML = `<div class="tip-box">💡 ${t.tip}</div>`;
  }

  const exRows = t.examples.map(([pron, en, pt]) =>
    `<tr>
      <td class="ex-pronoun" style="color:${groupColor}">${pron}</td>
      <td class="ex-en">${en}</td>
      <td class="ex-pt">${pt}</td>
    </tr>`
  ).join('');

  const markers = t.markers.map(m => `<span class="marker">${m}</span>`).join('');

  return `
    <div class="p-header">
      <div class="p-anchor" id="anchorBox">${anchorSVG(t.anchor, t.color)}</div>
      <div class="p-meta">
        <div class="p-group-tag" style="color:${groupColor}">${groupLabel} · Tempo ${t.id + 1} de 12</div>
        <div class="p-name" style="color:${groupColor}">${t.name}</div>
        <div class="p-namePT">${t.namePT}</div>
      </div>
    </div>

    <div class="p-formula">
      <div class="label">Fórmula</div>
      ${t.formula}
    </div>

    <div class="p-use" style="border-left-color:${groupColor}">
      <div style="font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.3rem;">Quando usar</div>
      ${t.use}
    </div>

    <div class="p-section-label">Marcadores de tempo</div>
    <div class="markers" style="margin-bottom:1.1rem">${markers}</div>

    <div class="p-section-label">Exemplos por pronome</div>
    <table class="ex-table">
      <thead><tr><th>Pronome</th><th>Inglês</th><th>Português</th></tr></thead>
      <tbody>${exRows}</tbody>
    </table>

    ${errorHTML}
    ${tipHTML}
  `;
}

// ── STATE & SELECTION ─────────────────────────────────────────────────────────
let currentId = 4;
let compareMode = false;
let groupFilter = 'all';

function selectById(id) {
  if (compareMode) return;
  currentId = id;
  const t = TENSES[id];

  // Update dots
  document.querySelectorAll('.dot').forEach(d => {
    d.classList.remove('active');
    if (parseInt(d.dataset.id) === id) d.classList.add('active');
  });

  // Render
  const wrap = document.getElementById('panelWrap');
  wrap.innerHTML = renderPanel(t);
  wrap.style.display = 'block';
  // Force SVG animation re-trigger
  const anchor = document.getElementById('anchorBox');
  if (anchor) {
    anchor.innerHTML = anchorSVG(t.anchor, t.color);
  }
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function filterGroup(group, btn) {
  groupFilter = group;
  document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.dot').forEach(d => {
    const id = parseInt(d.dataset.id);
    const g = TENSES[id].group;
    if (group === 'all' || g === group) {
      d.classList.remove('dim');
    } else {
      d.classList.add('dim');
    }
  });
}

// ── COMPARE MODE ─────────────────────────────────────────────────────────────
const COMPARE_PAIRS = [
  [0,1], // Simple Past vs Past Continuous
  [4,5], // Simple Present vs Present Continuous
  [8,9], // Future Simple vs Future Continuous
];
let cmpPairIdx = 0;

function renderCmpCard(t) {
  const exHTML = t.examples.slice(0,4).map(([p,en,pt]) =>
    `<div class="cmp-ex"><div class="en">${p} — ${en}</div><div class="pt">${pt}</div></div>`
  ).join('');
  return `
    <div class="cmp-card" style="border-color:${t.color}22">
      <div class="cmp-title" style="color:${t.color}">${t.name}</div>
      <div class="cmp-formula">${t.formula}</div>
      <div style="font-size:.72rem;color:var(--td);margin-bottom:.5rem;">${t.use}</div>
      ${exHTML}
    </div>`;
}

function toggleCompare() {
  compareMode = !compareMode;
  const btn = document.getElementById('cmpBtn');
  const wrap = document.getElementById('panelWrap');
  const cmpWrap = document.getElementById('cmpWrap');
  btn.classList.toggle('on', compareMode);

  if (compareMode) {
    wrap.style.display = 'none';
    const [a, b] = COMPARE_PAIRS[cmpPairIdx % COMPARE_PAIRS.length];
    cmpPairIdx++;
    cmpWrap.innerHTML = renderCmpCard(TENSES[a]) + renderCmpCard(TENSES[b]);
    cmpWrap.classList.add('active');
  } else {
    cmpWrap.classList.remove('active');
    wrap.style.display = 'block';
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────

sty.textContent = `
  @keyframes draw{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
`;
document.head.appendChild(sty);

selectById(4); // Start with Simple Present

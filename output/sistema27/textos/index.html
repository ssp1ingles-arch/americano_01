<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Textos · Shadowing com Propósito · Sistema 27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--rd:#f87171;--gn:#5FD87A;--s27:#047857;--s27d:#064E3B;--s27l:#D1FAE5;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* LOCAL NAV / BREADCRUMB */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;border-bottom:1px solid var(--bd);}
.nav-back{color:var(--s27);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.9;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

.wrap{padding-top:64px;max-width:1100px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;display:flex;gap:1.5rem;align-items:flex-start;}
.hidden{display:none!important;}

/* SIDEBAR (desktop) */
.sidebar{width:240px;flex-shrink:0;position:sticky;top:64px;display:flex;flex-direction:column;gap:.4rem;padding-top:1.2rem;}
.txt-btn{position:relative;display:flex;align-items:center;gap:.6rem;background:var(--sf);border:1px solid var(--bd);border-radius:.7rem;padding:.7rem .9rem;cursor:pointer;transition:all .18s;text-align:left;}
.txt-btn:hover{border-color:var(--bdh);}
.txt-btn.on{border-color:var(--s27);background:rgba(4,120,87,.14);box-shadow:0 0 12px rgba(4,120,87,.2);}
.txt-icon{font-size:1.1rem;flex-shrink:0;}
.txt-label{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;color:var(--tm);line-height:1.3;}
.txt-btn.on .txt-label{color:var(--s27);}
.txt-check{position:absolute;top:.4rem;right:.5rem;font-size:.7rem;color:var(--gn);}

/* MOBILE DROPDOWN */
.txt-select{display:none;width:100%;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.75rem .9rem;border-radius:.6rem;border:1px solid var(--bd);background:var(--sf);color:var(--tx);margin-top:1.2rem;margin-bottom:0;}

.main-col{flex:1;min-width:0;padding-top:1.2rem;}

/* CABEÇALHO */
.txt-header{background:var(--sf);border:1px solid var(--bd);border-radius:1rem;padding:1.3rem 1.5rem;margin-bottom:1.3rem;}
.txt-eyebrow{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem;flex-wrap:wrap;}
.txt-num{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--s27);}
.nivel-badge{font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.2rem .6rem;border-radius:2rem;}
.nivel-badge.avancado{color:#F87171;background:rgba(248,113,113,.14);}
.nivel-badge.intermediario{color:#FBBF24;background:rgba(251,191,36,.14);}
.txt-title{font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:800;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.txt-tema{font-size:.88rem;color:var(--tm);margin-top:.5rem;line-height:1.55;}

/* TOOLBAR */
.toolbar-row{display:flex;justify-content:center;margin-bottom:1.3rem;}
.shadow-btn{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;padding:.7rem 1.2rem;border-radius:.7rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.shadow-btn:hover{border-color:var(--bdh);color:var(--tx);}
.shadow-btn.on{border-color:var(--s27);background:rgba(4,120,87,.16);color:var(--s27);}

/* TEXTO COMPLETO */
.texto-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;padding:1.8rem 1.9rem;margin-bottom:1.3rem;}
.texto-p{font-size:18px;line-height:1.8;color:var(--tx);margin-bottom:1.4rem;}
.texto-p:last-child{margin-bottom:0;}
.voc{position:relative;color:var(--s27);text-decoration:underline;text-decoration-color:rgba(4,120,87,.55);text-underline-offset:3px;cursor:pointer;font-weight:600;}
.voc:hover{text-decoration-color:var(--s27);}
.voc-tip{position:absolute;bottom:calc(100% + 8px);left:0;z-index:30;background:var(--sf2);border:1px solid var(--bdh);border-radius:.7rem;padding:.8rem .95rem;font-size:.8rem;line-height:1.55;color:var(--tm);min-width:220px;max-width:320px;box-shadow:0 12px 30px rgba(0,0,0,.45);white-space:normal;text-decoration:none;font-weight:400;}
.voc-tip b{color:var(--s27);font-family:'Space Grotesk',sans-serif;display:block;margin-bottom:.3rem;font-size:.85rem;}

/* MODO SHADOWING */
.shadow-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;padding:2.4rem 1.75rem;margin-bottom:1.3rem;text-align:center;}
.shadow-instrucao{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;color:var(--td);letter-spacing:.02em;margin-bottom:1.6rem;}
.shadow-frase{font-size:18px;line-height:1.8;color:var(--tx);font-weight:600;min-height:70px;display:flex;align-items:center;justify-content:center;}
.shadow-prog-card{max-width:420px;margin:1.6rem auto 0;}
.shadow-prog-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.shadow-prog-fill{height:100%;background:linear-gradient(90deg,var(--s27),#10B981);border-radius:3px;transition:width .4s ease;}
.shadow-prog-label{font-family:'Space Grotesk',sans-serif;font-size:.7rem;color:var(--td);margin-top:.5rem;}
.shadow-actions{display:flex;gap:.7rem;justify-content:center;margin-top:1.6rem;flex-wrap:wrap;}
.shadow-next-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.8rem 1.6rem;border-radius:.7rem;border:none;background:var(--s27);color:#fff;cursor:pointer;}
.shadow-next-btn:hover{filter:brightness(1.15);}
.shadow-next-btn:disabled{opacity:.4;cursor:default;}
.shadow-exit-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.8rem 1.4rem;border-radius:.7rem;border:1px solid var(--bd);background:var(--bg);color:var(--tm);cursor:pointer;}
.shadow-exit-btn:hover{border-color:var(--bdh);color:var(--tx);}

@media(max-width:620px){
  .shadow-frase{font-size:20px;min-height:120px;padding:0 .5rem;}
  .shadow-card{padding:2.2rem 1.1rem;}
}

/* VOCABULÁRIO DO TEXTO */
.vocab-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;color:var(--s27);margin:1.6rem 0 .8rem;}
.table-wrap{overflow-x:auto;background:var(--sf);border:1px solid var(--bd);border-radius:1rem;}
.v-table{width:100%;min-width:440px;border-collapse:collapse;}
.v-table th{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--td);text-align:left;padding:.85rem 1rem;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15);}
.v-row{cursor:pointer;transition:background .15s;}
.v-row:hover td{background:rgba(4,120,87,.06);}
.v-row.active td{background:rgba(4,120,87,.1);}
.v-table td{padding:.85rem 1rem;border-bottom:1px solid var(--bd);vertical-align:top;font-size:.86rem;line-height:1.5;}
.word-cell{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--s27);min-width:220px;}
.def-cell{color:var(--tm);min-width:200px;}
.exp-row td{padding:0;border-bottom:1px solid var(--bd);}
.exp-row.hidden td{display:none;padding:0;border:none;}
.exp-inner{padding:.9rem 1.4rem;background:rgba(4,120,87,.07);font-size:.85rem;color:var(--tx);font-style:italic;line-height:1.55;}

/* PROGRESSO */
.progresso-row{margin-top:1.6rem;display:flex;justify-content:center;}
.progresso-label{display:flex;align-items:center;gap:.6rem;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;color:var(--tx);cursor:pointer;background:var(--sf);border:1px solid var(--bd);border-radius:.7rem;padding:.8rem 1.3rem;}
.progresso-label input{width:19px;height:19px;accent-color:var(--s27);cursor:pointer;}

/* PRÓXIMO TEXTO */
.next-row{display:flex;justify-content:center;margin-top:1.5rem;}
.next-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.8rem 1.5rem;border-radius:.7rem;border:1px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;transition:all .18s;}
.next-btn:hover{border-color:var(--s27);color:var(--s27);}

@media(max-width:900px){
  .sidebar{display:none;}
  .txt-select{display:block;}
  .wrap{flex-direction:column;}
}
</style>
</head>

<script>
// ── DATA: 7 TEXTOS DE SHADOWING ────────────────────────────────────────────────
const TEXTOS = [
  { id:1, emoji:'🌅', tituloPT:'Ganhe a Manhã', tituloEN:'Win the Morning', tema:'A importância da primeira hora do dia.', nivel:'avancado',
    paragrafos:[
      "When you're morning, before the world wakes up, I want you to picture something simple and real. The alarm goes off. It's still dark. The room is quiet. No messages, no noise, no demands.",
      "In that moment, you are not reacting to life. You are deciding how you will live it.",
      "That first hour of your day carries more power than most people understand. It shapes your attitude. It affects your focus. It even influences how you handle money and how much progress you make.",
      "If you lose your morning, you spend the rest of the day trying to catch up. If you win your morning, you spend the rest of your day leading.",
      "Most people wake up and immediately hand their mind over to the world. They grab their phone. They scroll. They read messages. They read bad news. They watch other people's highlights. And within five minutes of waking up, their mind is already full of noise that isn't theirs.",
      "The person who wins the morning doesn't do that. They protect that first hour. They use it to set their intentions. They choose what gets their attention first. And because of that, they move through the day with direction, not distraction."
    ],
    vocab:[
      {expr:'win the morning', pt:'ganhar a manhã / começar o dia da forma certa', match:'win your morning'},
      {expr:'before the world wakes up', pt:'antes do mundo acordar / nas primeiras horas'},
      {expr:'no demands', pt:'sem cobranças / sem exigências'},
      {expr:'reacting to life', pt:'reagindo à vida (posição passiva)'},
      {expr:'deciding how you will live it', pt:'decidindo como vai viver (posição ativa)'},
      {expr:'carries more power than most people understand', pt:'tem mais poder do que a maioria das pessoas percebe'},
      {expr:'shapes your attitude', pt:'molda sua atitude'},
      {expr:'affects your focus', pt:'afeta seu foco'},
      {expr:'trying to catch up', pt:'tentando se recuperar / se igualar'},
      {expr:'hand your mind over to the world', pt:'entregar sua mente para o mundo (phrasal verb: hand over = ceder controle)', match:'hand their mind over to the world'},
      {expr:'highlights', pt:'os melhores momentos da vida de outras pessoas (redes sociais)'},
      {expr:"full of noise that isn't theirs", pt:'cheio de ruídos que não são seus'},
      {expr:'set their intentions', pt:'definir suas intenções para o dia'},
      {expr:'move through the day with direction', pt:'passar o dia com direção, com propósito'}
    ]
  },
  { id:2, emoji:'🎯', tituloPT:'O Maior Risco', tituloEN:'The Biggest Risk', tema:'Por que não correr riscos é o maior risco de todos.', nivel:'avancado',
    paragrafos:[
      "Have you ever thought that the biggest risk in life might actually be not taking any risks at all?",
      "We're exploring risk-taking: why it matters, how it helps us grow, and why stepping outside our comfort zones can change our lives. We'll also talk about how being willing to fail is often the key to real success.",
      "Imagine a simple puzzle called the nine-dot IQ test. You see nine dots arranged in a square. The challenge is to connect all the dots using just four straight lines without lifting your pen from the paper.",
      "Most people struggle at first. Why? Because they automatically assume they have to stay inside the square shape created by the dots. They place an invisible border around the puzzle. But here's the secret: the solution only appears when you draw lines that go outside that imagined box.",
      "Life works the same way. The limits that hold us back are often not real. They are self-imposed. We create the walls. We stay inside them. And we call it being realistic.",
      "The person who takes a risk doesn't ignore reality. They question the assumptions. They test the borders. They're willing to look foolish for a moment in order to find the solution that others couldn't see."
    ],
    vocab:[
      {expr:'risk-taking', pt:'assumir riscos / correr riscos'},
      {expr:'stepping outside our comfort zones', pt:'sair da zona de conforto'},
      {expr:'being willing to fail', pt:'estar disposto a falhar'},
      {expr:'automatically assume', pt:'assumir automaticamente sem questionar'},
      {expr:'invisible border', pt:'fronteira invisível (que a mente cria)'},
      {expr:'self-imposed', pt:'auto-imposto / criado por si mesmo'},
      {expr:'think outside the box', pt:'pensar fora da caixa', match:null, manualEx:'When you think outside the box, you find solutions others miss.'},
      {expr:'question the assumptions', pt:'questionar os pressupostos / não aceitar o óbvio'},
      {expr:'test the borders', pt:'testar os limites'},
      {expr:'look foolish', pt:'parecer tolo / passar vergonha'},
      {expr:'limits that hold us back', pt:'limitações que nos seguram'},
      {expr:'being realistic', pt:'"ser realista" como desculpa para não arriscar (irônico no contexto)'}
    ]
  },
  { id:3, emoji:'🧭', tituloPT:'Propósito e Estabilidade', tituloEN:'Meaning & Stability', tema:'Encontrar significado em algo maior que você mesmo.', nivel:'avancado',
    paragrafos:[
      "To find meaning and stability in our lives — that is, to feel that life has purpose and is not constantly changing in a scary way — there's a deep psychological truth we need to face.",
      "We have to believe that something is more important than just ourselves. We need to feel connected to a purpose or cause that is bigger than our own individual wants and needs.",
      "This always requires a leap of faith — making a choice to trust or believe in something even when we don't have complete proof or certainty. Whether it's religion, family, close relationships, or a career: each of us eventually reaches a moment where we have to make a real commitment.",
      "A commitment is a serious promise to ourselves or to others that we will stay with something. Not just when it's easy, but especially when it's hard. That's when commitment reveals its true value.",
      "The people who find stability are not the ones who found a perfect life. They are the ones who found something worth committing to — and stayed."
    ],
    vocab:[
      {expr:'meaning and stability', pt:'significado e estabilidade'},
      {expr:'face', pt:'enfrentar / confrontar (sinônimo: confront, deal with)'},
      {expr:'a deep psychological truth', pt:'uma verdade psicológica profunda'},
      {expr:'connected to a purpose', pt:'conectado a um propósito'},
      {expr:'bigger than our own wants and needs', pt:'maior que nossos próprios desejos e necessidades', match:'bigger than our own individual wants and needs'},
      {expr:'leap of faith', pt:'salto de fé / decidir confiar sem prova completa'},
      {expr:'proof or certainty', pt:'prova ou certeza'},
      {expr:'commitment', pt:'compromisso, promessa séria'},
      {expr:'stay with something', pt:'permanecer com algo, não desistir'},
      {expr:'reveals its true value', pt:'revela seu verdadeiro valor'},
      {expr:'worth committing to', pt:'que vale a pena se comprometer com'}
    ]
  },
  { id:4, emoji:'🧠', tituloPT:'Estudar Uma Vez, Lembrar Sempre', tituloEN:'Study & Recall', tema:'Como ter foco real ao estudar e reter o que aprendeu.', nivel:'avancado',
    paragrafos:[
      "There is a level of learning where you read something once, truly grasp it, and later recall it with calm confidence. No tension in your chest, no blank mind, no heavy sigh as you try to force the answer out. That level is not magic. It is built with intention and mental discipline.",
      "Most people read passively. Their eyes move across the page, but their minds drift. They reach the end of a chapter and realize they cannot clearly explain what they just read. The real problem was never repetition. The problem was a lack of depth in the first contact.",
      "If you want to study once and recall without struggle, you must treat the first exposure as serious work. Give it full presence. Sit with an alert posture. Remove background noise. Make the moment focused and deliberate.",
      "As you move through the material, do not aim to cover large amounts quickly. Aim to understand small sections completely. After each paragraph or key point, pause and mentally summarize. Ask yourself what the core message is. If you cannot say it in simple language, you have not yet understood it."
    ],
    vocab:[
      {expr:'grasp', pt:'compreender profundamente (mais do que apenas "entender")'},
      {expr:'recall', pt:'recordar / recuperar da memória (trazer de volta)'},
      {expr:'calm confidence', pt:'confiança tranquila, sem ansiedade'},
      {expr:'blank mind', pt:'mente em branco'},
      {expr:'heavy sigh', pt:'um suspiro pesado (de frustração ou cansaço)'},
      {expr:'read passively', pt:'ler passivamente (sem engajamento real)'},
      {expr:'minds drift', pt:'a mente vagueia / se dispersa'},
      {expr:'lack of depth', pt:'falta de profundidade'},
      {expr:'first contact', pt:'primeiro contato (com o material)'},
      {expr:'full presence', pt:'presença total / atenção plena'},
      {expr:'alert posture', pt:'postura alerta / ereta e atenta'},
      {expr:'focused and deliberate', pt:'focado e deliberado / intencional'},
      {expr:'mentally summarize', pt:'resumir mentalmente'},
      {expr:'core message', pt:'mensagem central / essencial'},
      {expr:'construction of memory', pt:'construção de memória (memória é construída, não apenas absorvida)', match:null, manualEx:'Recall is the construction of memory, not just playback of a recording.'}
    ]
  },
  { id:5, emoji:'🚨', tituloPT:'Uma Manhã Caótica', tituloEN:'A Crazy Morning', tema:'Acordar atrasado e enfrentar as consequências — situação cotidiana com vocabulário rico.', nivel:'intermediario',
    paragrafos:[
      "Yesterday morning, I woke up late because I had accidentally turned off my alarm instead of just hitting snooze like I usually do.",
      "I shot out of bed, threw on some clothes, and rushed out of the house without even grabbing breakfast. I was already annoyed with myself, but I kept telling myself I could still make it on time — if everything else went smoothly.",
      "But of course, nothing went smoothly. I got stuck in traffic. I missed my bus. I spilled coffee on my shirt. By the time I finally arrived, I was 20 minutes late, out of breath, and looked like I had been through a storm.",
      "The worst part? When I walked in, nobody even seemed to notice. All that panic, all that rushing, all that stress — and it didn't change a thing. Sometimes the lesson is not about being on time. It's about learning that the world keeps turning either way."
    ],
    vocab:[
      {expr:'hit snooze', pt:'apertar o botão de soneca (para mais 5-10 min de sono)', match:'hitting snooze'},
      {expr:'turn off the alarm', pt:'desligar o alarme (sem soneca)', match:'turned off my alarm'},
      {expr:'shot out of bed', pt:'saltou da cama rapidamente (como se tivesse sido lançado)'},
      {expr:'threw on some clothes', pt:'vestiu uma roupa rapidamente, sem cuidado'},
      {expr:'rushed out of the house', pt:'saiu de casa correndo'},
      {expr:'without even grabbing breakfast', pt:'sem nem pegar o café da manhã'},
      {expr:'keep telling yourself', pt:'continuar se dizendo / se convencendo', match:'kept telling myself'},
      {expr:'make it on time', pt:'chegar na hora / não se atrasar'},
      {expr:'go smoothly', pt:'correr bem / sem problemas', match:'went smoothly'},
      {expr:'get stuck in traffic', pt:'ficar preso no trânsito', match:'got stuck in traffic'},
      {expr:'spill', pt:'derramar (acidentalmente)', match:'spilled'},
      {expr:'out of breath', pt:'sem fôlego / ofegante'},
      {expr:'been through a storm', pt:'passou por uma tempestade (aparência bagunçada)'},
      {expr:'the world keeps turning', pt:'o mundo continua girando / a vida segue'}
    ]
  },
  { id:6, emoji:'🚲', tituloPT:'Treine sua Boca', tituloEN:'Train Your Mouth', tema:'Por que falar inglês é uma habilidade física tanto quanto mental.', nivel:'intermediario',
    paragrafos:[
      "Do you know why so many people study English for years but still struggle to speak with confidence? It's not because they're lazy. It's not because they're weak. It's because they spend all their time training their mind but not their mouth.",
      "Think about it. You memorize grammar rules. You read books. You get good scores on exams. But when it's time to actually speak, your tongue feels heavy. Your mind goes blank and your confidence quietly disappears.",
      "Here's the simple truth: to speak English naturally and confidently, you have to train your mouth, not just your mind.",
      "You didn't learn to ride a bicycle by reading an instruction manual. You learned by getting on the bike, losing your balance, falling, trying again, and slowly moving forward. Speaking English works the same way.",
      "It's not about how much English you know. It's about how much English your mouth has practiced saying. Speaking is a physical skill as much as a mental one. When you train your mouth, you build muscle memory — just like a singer who warms up before a performance, or an athlete who practices movements before a game."
    ],
    vocab:[
      {expr:'struggle to', pt:'ter dificuldade em / lutar para'},
      {expr:'training your mind but not your mouth', pt:'a crítica central: foco só no conhecimento, não na prática oral', match:'training their mind but not their mouth'},
      {expr:'your tongue feels heavy', pt:'sua língua parece pesada (dificuldade de falar)'},
      {expr:'your mind goes blank', pt:'sua mente fica em branco'},
      {expr:'quietly disappears', pt:'some silenciosamente'},
      {expr:'instruction manual', pt:'manual de instruções'},
      {expr:'losing your balance', pt:'perdendo o equilíbrio'},
      {expr:'slowly moving forward', pt:'avançando devagar'},
      {expr:'muscle memory', pt:'memória muscular (corpo aprende pelo treino)'},
      {expr:'warm up', pt:'se aquecer / fazer aquecimento (antes de performance)', match:'warms up'}
    ]
  },
  { id:7, emoji:'👻', tituloPT:'Uma Noite Estranha', tituloEN:'A Strange Night', tema:'Texto narrativo de suspense — vocabulário atmosférico e expressivo.', nivel:'intermediario',
    paragrafos:[
      "Last winter, something strange happened to me late one night. I was home alone because my partner was away for work, and I'd decided to stay in for the evening.",
      "It was a cold, quiet night and the house felt unusually still. It was already pretty late when I decided to go to bed — around 11, or maybe closer to midnight. I'd turned off most of the lights and was walking upstairs, thinking about my day.",
      "Outside, the street was silent. No people, no cars passing by.",
      "As I reached the top of the stairs, I heard a sound. At first, it was very soft and unclear — like a light tapping or a whisper. I stopped and listened carefully, trying to figure out where it was coming from.",
      "The sound seemed to be moving, which immediately made me feel uneasy. A few seconds later, I heard it again. This time, it was louder and slower — almost like footsteps. It seemed to be coming from right outside, near the front door.",
      "My heart started pounding and I suddenly became very aware that I was completely alone in the house. I stood there for a moment, trying to stay calm. Then I heard it one more time — and I realized it was just the wind moving a tree branch against the window."
    ],
    vocab:[
      {expr:'stay in for the evening', pt:'ficar em casa à noite / não sair'},
      {expr:'unusually still', pt:'inusitadamente quieto / parado de forma estranha'},
      {expr:'closer to midnight', pt:'mais perto da meia-noite'},
      {expr:'figure out where it was coming from', pt:'descobrir de onde estava vindo'},
      {expr:'uneasy', pt:'desconfortável e preocupado / com um mau pressentimento'},
      {expr:'footsteps', pt:'passos (o som de alguém andando)'},
      {expr:'my heart started pounding', pt:'meu coração começou a disparar'},
      {expr:'suddenly became very aware', pt:'de repente ficou muito consciente / percebeu intensamente'},
      {expr:'completely alone', pt:'completamente sozinho'},
      {expr:'trying to stay calm', pt:'tentando manter a calma'},
      {expr:'tree branch against the window', pt:'galho de árvore batendo na janela'}
    ]
  }
];

// ── HELPERS ────────────────────────────────────────────────────────────────────
function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightParagraph(text, vocab, textId, paraIdx) {
  const entries = vocab.map((v, i) => ({ i, term: v.match === null ? null : (v.match || v.expr) })).filter(e => e.term);
  if (!entries.length) return text;
  entries.sort((a, b) => b.term.length - a.term.length);
  const pattern = entries.map(e => escapeRegex(e.term)).join('|');
  const re = new RegExp('(' + pattern + ')', 'gi');
  let result = '';
  let last = 0;
  let uid = 0;
  let m;
  re.lastIndex = 0;
  while ((m = re.exec(text)) !== null) {
    result += text.slice(last, m.index);
    const matched = m[0];
    const entry = entries.find(e => e.term.toLowerCase() === matched.toLowerCase());
    const tipId = 'tip-' + textId + '-' + paraIdx + '-' + (uid++);
    result += `<span class="voc" onclick="toggleVocTip(event,'${tipId}')">${matched}<span class="voc-tip hidden" id="${tipId}"><b>${vocab[entry.i].expr}</b>${vocab[entry.i].pt}</span></span>`;
    last = m.index + matched.length;
  }
  result += text.slice(last);
  return result;
}

function splitFrases(paragrafos) {
  const frases = [];
  paragrafos.forEach(p => {
    const parts = p.match(/[^.!?]+[.!?]+(?=\s|$)|[^.!?]+$/g) || [p];
    parts.forEach(s => { const t = s.trim(); if (t) frases.push(t); });
  });
  return frases;
}

function getExemploTexto(texto, item) {
  if (item.match === null) return item.manualEx || item.expr;
  const term = (item.match || item.expr).toLowerCase();
  const frases = splitFrases(texto.paragrafos);
  for (const f of frases) { if (f.toLowerCase().indexOf(term) !== -1) return f; }
  return item.manualEx || texto.paragrafos[0];
}

// ── STATE ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 's27_textos_progresso';
let state = {
  textoAtual: 1,
  shadowing: {},
  shadowIndex: {},
  concluidos: [],
  expandidas: {}
};

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) Object.assign(state, JSON.parse(raw)); } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function getTexto(id) { return TEXTOS.find(t => t.id === id); }

// ── SIDEBAR / SELECT ──────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = TEXTOS.map(t => `
    <div class="txt-btn ${t.id === state.textoAtual ? 'on' : ''}" onclick="selectTexto(${t.id})">
      ${state.concluidos.includes(t.id) ? '<span class="txt-check">✓</span>' : ''}
      <span class="txt-icon">${t.emoji}</span>
      <div class="txt-label">${t.id}. ${t.tituloPT}</div>
    </div>
  `).join('');

  document.getElementById('txtSelect').innerHTML = TEXTOS.map(t => `
    <option value="${t.id}" ${t.id === state.textoAtual ? 'selected' : ''}>${t.emoji} ${t.id}. ${t.tituloPT}${state.concluidos.includes(t.id) ? ' ✓' : ''}</option>
  `).join('');
}

function selectTexto(id) {
  state.textoAtual = id;
  saveState();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── MODO SHADOWING ─────────────────────────────────────────────────────────────
function toggleShadowing() {
  const id = state.textoAtual;
  state.shadowing[id] = !state.shadowing[id];
  if (state.shadowing[id]) state.shadowIndex[id] = state.shadowIndex[id] || 0;
  saveState();
  renderTexto();
}

function shadowNext() {
  const id = state.textoAtual;
  const frases = splitFrases(getTexto(id).paragrafos);
  if ((state.shadowIndex[id] || 0) < frases.length - 1) {
    state.shadowIndex[id] = (state.shadowIndex[id] || 0) + 1;
    saveState();
    renderTexto();
  }
}
function shadowPrev() {
  const id = state.textoAtual;
  if ((state.shadowIndex[id] || 0) > 0) {
    state.shadowIndex[id]--;
    saveState();
    renderTexto();
  }
}

// ── TOOLTIP DE VOCABULÁRIO INLINE ─────────────────────────────────────────────
function toggleVocTip(e, id) {
  e.stopPropagation();
  const el = document.getElementById(id);
  const willOpen = el.classList.contains('hidden');
  document.querySelectorAll('.voc-tip').forEach(t => t.classList.add('hidden'));
  if (willOpen) el.classList.remove('hidden');
}
document.addEventListener('click', () => document.querySelectorAll('.voc-tip').forEach(t => t.classList.add('hidden')));

// ── EXPRESSÕES ─────────────────────────────────────────────────────────────────
function toggleExpressao(id, idx) {
  const set = state.expandidas[id] || (state.expandidas[id] = []);
  const i = set.indexOf(idx);
  if (i === -1) set.push(idx); else set.splice(i, 1);
  saveState();
  renderTexto();
}

// ── PROGRESSO ──────────────────────────────────────────────────────────────────
function toggleConcluido() {
  const id = state.textoAtual;
  const i = state.concluidos.indexOf(id);
  if (i === -1) state.concluidos.push(id); else state.concluidos.splice(i, 1);
  saveState();
  renderSidebar();
  renderTexto();
}

// ── RENDER TEXTO ───────────────────────────────────────────────────────────────
function renderTexto() {
  const t = getTexto(state.textoAtual);
  const shadowOn = !!state.shadowing[t.id];

  let html = `
    <div class="txt-header">
      <div class="txt-eyebrow">
        <span class="txt-num">Texto ${t.id}</span>
        <span class="nivel-badge ${t.nivel}">${t.nivel === 'avancado' ? 'Avançado' : 'Intermediário'}</span>
      </div>
      <div class="txt-title">${t.emoji} ${t.tituloPT} <span style="color:var(--td);font-weight:600;font-size:.95rem;">(${t.tituloEN})</span></div>
      <div class="txt-tema">${t.tema}</div>
    </div>
    <div class="toolbar-row">
      <button class="shadow-btn ${shadowOn ? 'on' : ''}" onclick="toggleShadowing()">🎙️ ${shadowOn ? 'Ver texto completo' : 'Modo Shadowing'}</button>
    </div>
  `;

  if (shadowOn) {
    const frases = splitFrases(t.paragrafos);
    const idx = Math.min(state.shadowIndex[t.id] || 0, frases.length - 1);
    const pct = Math.round(((idx + 1) / frases.length) * 100);
    html += `
      <div class="shadow-card">
        <div class="shadow-instrucao">🗣️ Leia em voz alta esta frase, depois clique para avançar</div>
        <div class="shadow-frase">${frases[idx]}</div>
        <div class="shadow-prog-card">
          <div class="shadow-prog-track"><div class="shadow-prog-fill" style="width:${pct}%"></div></div>
          <div class="shadow-prog-label">Frase ${idx + 1} de ${frases.length}</div>
        </div>
        <div class="shadow-actions">
          <button class="shadow-exit-btn" onclick="shadowPrev()" ${idx === 0 ? 'disabled' : ''}>← Anterior</button>
          <button class="shadow-next-btn" onclick="shadowNext()" ${idx === frases.length - 1 ? 'disabled' : ''}>▶ Próxima frase</button>
        </div>
      </div>
    `;
  } else {
    html += `<div class="texto-card">`;
    t.paragrafos.forEach((p, pi) => {
      html += `<div class="texto-p">${highlightParagraph(p, t.vocab, t.id, pi)}</div>`;
    });
    html += `</div>`;
  }

  html += `<div class="vocab-title">📘 Vocabulário deste texto</div>`;
  html += `
    <div class="table-wrap">
      <table class="v-table">
        <thead><tr><th>Expressão</th><th>Definição</th></tr></thead>
        <tbody>
          ${t.vocab.map((v, idx) => {
            const open = (state.expandidas[t.id] || []).includes(idx);
            return `
              <tr class="v-row ${open ? 'active' : ''}" onclick="toggleExpressao(${t.id}, ${idx})">
                <td class="word-cell">${v.expr}</td>
                <td class="def-cell">${v.pt}</td>
              </tr>
              <tr class="exp-row ${open ? '' : 'hidden'}"><td colspan="2"><div class="exp-inner">"${getExemploTexto(t, v)}"</div></td></tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  html += `
    <div class="progresso-row">
      <label class="progresso-label">
        <input type="checkbox" ${state.concluidos.includes(t.id) ? 'checked' : ''} onchange="toggleConcluido()">
        Já pratiquei este texto ✓
      </label>
    </div>
  `;

  const curIdx = TEXTOS.findIndex(x => x.id === t.id);
  const next = TEXTOS[(curIdx + 1) % TEXTOS.length];
  html += `
    <div class="next-row">
      <button class="next-btn" onclick="selectTexto(${next.id})">Próximo texto: ${next.emoji} ${next.tituloPT} →</button>
    </div>
  `;

  document.getElementById('textoArea').innerHTML = html;
}

function render() {
  renderSidebar();
  renderTexto();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
render();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phrasal Verbs · Sistema 22</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--rd:#f87171;--gn:#5FD87A;--s22:#0F766E;--s22d:#134E4A;--s22l:#CCFBF1;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* LOCAL NAV / BREADCRUMB */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.nav-back{color:var(--s22);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.9;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

/* TOPBAR — TABS */
.topbar{position:fixed;top:96px;left:0;right:0;z-index:90;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.7rem 1.1rem;}
.topbar-inner{max-width:920px;margin:0 auto;}
.tabs-row{display:flex;gap:.4rem;overflow-x:auto;justify-content:center;}
.tab-group{display:flex;align-items:center;gap:.2rem;background:var(--sf);border:1px solid var(--bd);border-radius:.6rem;padding:.25rem;flex-wrap:nowrap;}
.tab-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.5rem 1rem;border-radius:.45rem;border:none;background:none;color:var(--td);cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.on{background:var(--s22);color:#fff;}

.wrap{padding-top:170px;max-width:920px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;}
.hidden{display:none!important;}

.grupo-header{margin-bottom:1.2rem;}
.grupo-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:800;color:var(--s22);}
.grupo-count{font-size:.8rem;color:var(--tm);margin-top:.3rem;}

.table-wrap{overflow-x:auto;background:var(--sf);border:1px solid var(--bd);border-radius:1rem;margin-bottom:1.6rem;}
.p-table{width:100%;min-width:560px;border-collapse:collapse;}
.p-table th{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--td);text-align:left;padding:.85rem 1rem;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15);}
.p-table td{padding:.9rem 1rem;border-bottom:1px solid var(--bd);vertical-align:top;font-size:.85rem;line-height:1.55;}
.p-table tr:last-child td{border-bottom:none;}
.p-table tr:hover td{background:rgba(255,255,255,.02);}
.pv-cell{font-family:'Space Grotesk',sans-serif;font-weight:800;color:var(--s22);min-width:130px;}
.sig-cell{color:var(--tx);min-width:170px;}
.ex-cell{color:var(--tm);min-width:220px;}
.ex-cell i{color:var(--s22);font-style:italic;font-weight:700;}

.exercicio-card{background:var(--sf);border:1px solid var(--bd);border-radius:.9rem;padding:1.2rem 1.4rem;margin-bottom:2.2rem;}
.exercicio-title{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--td);margin-bottom:.8rem;}
.exercicio-frase{font-family:'Space Grotesk',sans-serif;font-size:1rem;color:var(--tx);line-height:1.6;margin-bottom:.9rem;}
.exercicio-frase b{color:var(--s22);}
.exercicio-row{display:flex;gap:.6rem;flex-wrap:wrap;}
.exercicio-input{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--bd);border-radius:.55rem;padding:.7rem .9rem;color:var(--tx);font-size:.88rem;font-family:'Inter',sans-serif;outline:none;}
.exercicio-input:focus{border-color:rgba(15,118,110,.5);}
.exercicio-btn{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700;padding:.7rem 1.2rem;border-radius:.55rem;border:none;background:var(--s22);color:#fff;cursor:pointer;white-space:nowrap;}
.exercicio-btn:hover{filter:brightness(1.1);}
.exercicio-feedback{margin-top:.8rem;font-size:.85rem;line-height:1.55;padding:.7rem .9rem;border-radius:.6rem;display:none;}
.exercicio-feedback.show{display:block;}
.exercicio-feedback.ok{background:rgba(95,216,122,.1);border:1px solid rgba(95,216,122,.3);color:var(--gn);}
.exercicio-feedback.bad{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--rd);}
.exercicio-feedback b{color:inherit;}

@media(max-width:640px){
  .wrap{padding-top:150px;}
}
</style>
</head>
<body>
<script src="../../nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var params=new URLSearchParams(window.location.search);
  if(params.get('origem')==='jornada'){
    document.querySelectorAll('a').forEach(function(a){
      if(a.textContent.indexOf('Menu Principal')!==-1){
        a.setAttribute('href','../../jornada/index.html');
        a.textContent='← Jornada';
      }
    });
  }
});
</script>

<!-- LOCAL NAV / BREADCRUMB -->
<nav class="nav">
  <a href="../../sistema01/index.html" class="nav-back">← Início</a>
  <span class="nav-sep">/</span>
  <a href="../index.html" class="nav-link">Sistema 22</a>
  <span class="nav-sep">/</span>
  <div class="nav-title">🔄 Phrasal Verbs</div>
</nav>

<!-- TOPBAR — TABS -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="tabs-row">
      <div class="tab-group" id="tabGroup"></div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="grupo-header" id="grupoHeader"></div>
  <div class="table-wrap">
    <table class="p-table">
      <thead><tr><th>Phrasal Verb</th><th>Significado</th><th>Exemplo real</th></tr></thead>
      <tbody id="pvTableBody"></tbody>
    </table>
  </div>
  <div id="exercicioArea"></div>
</div>

<script>
// ── DATA: 6 GRUPOS × 50 PHRASAL VERBS ─────────────────────────────────────────
const GRUPOS = [
  {id:'A', nome:'Começar / Terminar / Continuar', verbos:[
    {pv:'bring up', sig:'mencionar / levantar um assunto', pre:'"She always ', it:'brings up', post:' interesting topics in our conversations."'},
    {pv:'call off', sig:'cancelar', pre:'"They had to ', it:'call off', post:' the meeting due to bad weather."'},
    {pv:'carry on', sig:'continuar', pre:'"', it:'Carry on', post:' with your work, I\'ll be back soon."'},
    {pv:'go on', sig:'continuar / prosseguir', pre:'"Please ', it:'go on', post:' and tell me the rest of the story."'},
    {pv:'keep on', sig:'continuar fazendo', pre:'"', it:'Keep on', post:' practicing and you\'ll improve."'},
    {pv:'give up', sig:'desistir', pre:'"Don\'t ', it:'give up', post:' on your dreams, keep pursuing them."'},
    {pv:'put off', sig:'adiar', pre:'"Don\'t ', it:'put off', post:' your tasks until the last minute."'},
    {pv:'break off', sig:'interromper', pre:'"He hung up the phone abruptly."', it:'', post:''}
  ]},
  {id:'B', nome:'Encontrar / Descobrir / Lidar', verbos:[
    {pv:'come across', sig:'encontrar por acaso', pre:'"I ', it:'came across', post:' an old friend at the mall."'},
    {pv:'find out', sig:'descobrir', pre:'"I want to ', it:'find out', post:' more about that new book."'},
    {pv:'get along', sig:'se dar bem', pre:'"They ', it:'get along', post:' well despite their differences."'},
    {pv:'get by', sig:'se virar / sobreviver', pre:'"I can ', it:'get by', post:' with some help from my friends."'},
    {pv:'look up', sig:'pesquisar / procurar', pre:'"You can ', it:'look up', post:' the definition online."'},
    {pv:'run into', sig:'encontrar inesperadamente', pre:'"I unexpectedly ', it:'ran into', post:' my old classmate."'},
    {pv:'come up with', sig:'criar / inventar', pre:'"She ', it:'came up with', post:' a brilliant idea for a project."'},
    {pv:'figure out', sig:'descobrir / resolver', pre:'"(relacionado: \'find out\')"', it:'', post:''}
  ]},
  {id:'C', nome:'Sair / Ir / Voltar', verbos:[
    {pv:'go out', sig:'sair', pre:'"Let\'s ', it:'go out', post:' for dinner tonight."'},
    {pv:'hang out', sig:'sair com alguém / passar tempo junto', pre:'"We like to ', it:'hang out', post:' at the park on weekends."'},
    {pv:'get out', sig:'sair de / escapar', pre:'"We need to ', it:'get out', post:' of this situation."'},
    {pv:'go back', sig:'voltar', pre:'"We need to ', it:'go back', post:' to the store to return this."'},
    {pv:'come over', sig:'vir até (alguém) / visitar', pre:'"Can you ', it:'come over', post:' to my place for dinner?"'},
    {pv:'drop by', sig:'dar uma passada', pre:'"Feel free to ', it:'drop by', post:' my office anytime."'},
    {pv:'show up', sig:'aparecer / chegar', pre:'"He didn\'t ', it:'show up', post:' for the event."'},
    {pv:'turn up', sig:'aparecer', pre:'"He didn\'t ', it:'turn up', post:' at the party as promised."'}
  ]},
  {id:'D', nome:'Cuidar / Controlar / Organizar', verbos:[
    {pv:'look after', sig:'cuidar de', pre:'"Can you ', it:'look after', post:' my cat while I\'m away?"'},
    {pv:'take care of', sig:'cuidar de', pre:'"She ', it:'takes care of', post:' her younger siblings."'},
    {pv:'set up', sig:'organizar / montar / criar', pre:'"Let\'s ', it:'set up', post:' a meeting for next week."'},
    {pv:'set aside', sig:'reservar / separar', pre:'"Please ', it:'set aside', post:' some time for our meeting."'},
    {pv:'pick up', sig:'buscar / pegar', pre:'"I\'ll ', it:'pick up', post:' some groceries on my way home."'},
    {pv:'put away', sig:'guardar (no lugar certo)', pre:'"Please ', it:'put away', post:' your toys when you\'re done."'},
    {pv:'clean up', sig:'limpar / organizar', pre:'"We need to ', it:'clean up', post:' the house before the guests arrive."'},
    {pv:'check out', sig:'ver / dar uma olhada / fazer check-out', pre:'"You should ', it:'check out', post:' the new restaurant in town."'}
  ]},
  {id:'E', nome:'Problemas & Soluções', verbos:[
    {pv:'break down', sig:'quebrar / ter pane', pre:'"My car ', it:'broke down', post:' on the way to work."'},
    {pv:'break in', sig:'arrombar / entrar ilegalmente', pre:'"Someone tried to ', it:'break in', post:' last night."'},
    {pv:'break up', sig:'terminar relacionamento / separar', pre:'"They decided to ', it:'break up', post:' after a long relationship."'},
    {pv:'run out of', sig:'ficar sem / acabar', pre:'"We\'ve ', it:'run out of', post:' milk — we need to buy more."'},
    {pv:'put up with', sig:'aguentar / tolerar', pre:'"I can\'t ', it:'put up with', post:' his rude behavior anymore."'},
    {pv:'give in', sig:'ceder / desistir', pre:'"Don\'t ', it:'give in', post:' to peer pressure."'},
    {pv:'fall apart', sig:'desmoronar / se deteriorar', pre:'"The old house is ', it:'falling apart', post:'."'},
    {pv:'get over', sig:'superar', pre:'"It takes time to ', it:'get over', post:' a breakup."'}
  ]},
  {id:'F', nome:'Ações do Dia a Dia', verbos:[
    {pv:'wake up', sig:'acordar', pre:'"I usually ', it:'wake up', post:' early on weekends."'},
    {pv:'work out', sig:'malhar / se exercitar / funcionar', pre:'"I ', it:'work out', post:' at the gym three times a week."'},
    {pv:'turn on', sig:'ligar (aparelho)', pre:'"Can you ', it:'turn on', post:' the lights, please?"'},
    {pv:'turn off', sig:'desligar', pre:'"Remember to ', it:'turn off', post:' the oven when you\'re done."'},
    {pv:'pick out', sig:'escolher / selecionar', pre:'"Can you ', it:'pick out', post:' your favorite color?"'},
    {pv:'put on', sig:'vestir / colocar', pre:'"', it:'Put on', post:' your jacket, it\'s cold outside."'},
    {pv:'try on', sig:'experimentar (roupa)', pre:'"You should ', it:'try on', post:' the shoes before buying them."'},
    {pv:'take off', sig:'decolar / tirar (roupa)', pre:'"The plane will ', it:'take off', post:' in an hour."'},
    {pv:'take up', sig:'começar (hobby)', pre:'"She decided to ', it:'take up', post:' painting as a hobby."'},
    {pv:'show off', sig:'se exibir', pre:'"He likes to ', it:'show off', post:' his new car."'}
  ]}
];

// ── EXERCÍCIOS (1 por grupo) ──────────────────────────────────────────────────
const EXERCICIOS = {
  A: {frase:'Don\'t _____ on your dreams, keep pursuing them.', respostas:['give up']},
  B: {frase:'I _____ an old friend at the mall.', respostas:['came across', 'come across']},
  C: {frase:'Let\'s _____ for dinner tonight.', respostas:['go out']},
  D: {frase:'We need to _____ the house before the guests arrive.', respostas:['clean up']},
  E: {frase:'My car _____ on the way to work.', respostas:['broke down', 'break down']},
  F: {frase:'Can you _____ the lights, please?', respostas:['turn on']}
};

// ── STATE ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 's22_phrasal_progresso';
let state = {
  grupoAtual: 'A',
  exercicios: {}
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/[.!?]+$/, '').replace(/\s+/g, ' ');
}

// ── RENDER TABS ────────────────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabGroup').innerHTML = GRUPOS.map(g => `
    <button class="tab-btn ${g.id === state.grupoAtual ? 'on' : ''}" onclick="selectGrupo('${g.id}')">${g.id}: ${g.nome}</button>
  `).join('');
}

function selectGrupo(id) {
  state.grupoAtual = id;
  saveState();
  render();
}

// ── RENDER GROUP ───────────────────────────────────────────────────────────────
function render() {
  renderTabs();
  const g = GRUPOS.find(x => x.id === state.grupoAtual);

  document.getElementById('grupoHeader').innerHTML = `
    <div class="grupo-title">Grupo ${g.id}: ${g.nome}</div>
    <div class="grupo-count">${g.verbos.length} phrasal verbs</div>
  `;

  document.getElementById('pvTableBody').innerHTML = g.verbos.map(v => `
    <tr>
      <td class="pv-cell">${v.pv}</td>
      <td class="sig-cell">${v.sig}</td>
      <td class="ex-cell">${v.it ? `${v.pre}<i>${v.it}</i>${v.post}` : v.pre}</td>
    </tr>
  `).join('');

  renderExercicio(g.id);
}

function renderExercicio(grupoId) {
  const ex = EXERCICIOS[grupoId];
  const salvo = state.exercicios[grupoId];
  document.getElementById('exercicioArea').innerHTML = `
    <div class="exercicio-card">
      <div class="exercicio-title">✏️ Exercício Rápido — Grupo ${grupoId}</div>
      <div class="exercicio-frase">${ex.frase}</div>
      <div class="exercicio-row">
        <input type="text" class="exercicio-input" id="exInput" placeholder="Complete com o phrasal verb..." value="${salvo ? salvo.valor.replace(/"/g,'&quot;') : ''}">
        <button class="exercicio-btn" onclick="verificarExercicio('${grupoId}')">Verificar</button>
      </div>
      <div class="exercicio-feedback ${salvo ? 'show ' + (salvo.correto ? 'ok' : 'bad') : ''}" id="exFeedback">
        ${salvo ? (salvo.correto ? '✓ Correto!' : `✗ Quase lá! Resposta esperada: <b>${ex.respostas[0]}</b>`) : ''}
      </div>
    </div>
  `;
}

function verificarExercicio(grupoId) {
  const input = document.getElementById('exInput');
  const valor = input.value;
  const ex = EXERCICIOS[grupoId];
  const correto = ex.respostas.some(r => normalize(r) === normalize(valor));
  state.exercicios[grupoId] = { valor, correto };
  saveState();

  const fb = document.getElementById('exFeedback');
  fb.classList.add('show');
  fb.classList.toggle('ok', correto);
  fb.classList.toggle('bad', !correto);
  fb.innerHTML = correto ? '✓ Correto!' : `✗ Quase lá! Resposta esperada: <b>${ex.respostas[0]}</b>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>

<style>
:root{
  --bg:#080c14;--sf:#0f1621;--sf2:#162030;--sf3:#1c2a3e;
  --tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;
  --cy:#64DFDF;--am:#F5C518;--gn:#5FD87A;--rd:#f87171;
  --bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden;padding-top:48px;}

/* GLOBAL NAV */
.gnav{position:fixed;top:0;left:0;right:0;z-index:999;height:48px;background:#080c14;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 1.25rem;gap:1rem;}
.gnav-logo{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:.45rem;margin-right:auto;}
.gnav-logo span{opacity:.55;font-size:1rem;}
.gnav-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-decoration:none;padding:.3rem .85rem;border-radius:.4rem;border:1px solid transparent;transition:all .18s;white-space:nowrap;}
.gnav-s1{color:#64DFDF;border-color:rgba(100,223,223,.35);background:rgba(100,223,223,.08);}
.gnav-s1:hover{background:rgba(100,223,223,.15);border-color:rgba(100,223,223,.6);}
.gnav-s1.active{color:#64DFDF;border-color:#64DFDF;background:rgba(100,223,223,.12);box-shadow:0 0 10px rgba(100,223,223,.2);}
.gnav-s2{color:#F5C518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.06);}
.gnav-s2:hover{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.55);}
.gnav-s2.active{color:#F5C518;border-color:#F5C518;background:rgba(245,197,24,.1);box-shadow:0 0 10px rgba(245,197,24,.2);}
.gnav-s3{color:#A78BFA;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08);}
.gnav-s3:hover{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.6);}
.gnav-s3.active{color:#A78BFA;border-color:#A78BFA;background:rgba(167,139,250,.12);box-shadow:0 0 10px rgba(167,139,250,.2);}
.gnav-s4{color:#FF6B6B;border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);}
.gnav-s4:hover{background:rgba(255,107,107,.15);}
.gnav-s4.active{color:#FF6B6B;border-color:#FF6B6B;background:rgba(255,107,107,.12);box-shadow:0 0 10px rgba(255,107,107,.2);}
.gnav-s5{color:#10B981;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.gnav-s5:hover{background:rgba(16,185,129,.18);}
.gnav-s5.active{border-color:#10B981;background:rgba(16,185,129,.16);box-shadow:0 0 10px rgba(16,185,129,.25);}
.gnav-jornada{background:linear-gradient(135deg,rgba(100,223,223,.12),rgba(245,197,24,.08),rgba(167,139,250,.12));border-color:rgba(255,255,255,.18);color:#fff;}
.gnav-jornada:hover{border-color:rgba(255,255,255,.32);background:linear-gradient(135deg,rgba(100,223,223,.18),rgba(245,197,24,.13),rgba(167,139,250,.18));}

/* PARTICLES */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
.p{position:absolute;border-radius:50%;background:var(--cy);opacity:0;}
@keyframes float-p{0%,100%{transform:translateY(0) scale(1);opacity:0;}10%{opacity:.15;}90%{opacity:.08;}50%{transform:translateY(-40px) scale(1.1);}}

/* NAV */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;}
.nav-back{color:var(--cy);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:600;opacity:.8;transition:opacity .2s;}
.nav-back:hover{opacity:1;}.nav-sep{color:var(--td);font-size:.75rem;opacity:.6;margin:0 .1rem;}.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:600;opacity:.7;transition:opacity .2s;}.nav-link:hover{opacity:1;color:var(--tx);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;color:var(--tx);}
.nav-sub{font-size:.75rem;color:var(--td);}
.nav-progress{margin-left:auto;display:flex;align-items:center;gap:.65rem;}
.nav-prog-bar{width:120px;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
.nav-prog-fill{height:100%;background:var(--cy);border-radius:3px;transition:width .5s ease;}
.nav-prog-label{font-size:.72rem;color:var(--td);white-space:nowrap;}

/* LAYOUT */
.layout{display:flex;min-height:100vh;padding-top:108px;position:relative;z-index:1;}

/* SIDEBAR */
.sidebar{width:280px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);padding:1.25rem .9rem;overflow-y:auto;height:calc(100vh - 108px);position:sticky;top:108px;}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.85rem;padding:0 .3rem;}
.cat-group{margin-bottom:1.1rem;}
.cat-label{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);padding:.2rem .5rem;margin-bottom:.3rem;}
.sit-btn{width:100%;text-align:left;background:none;border:1px solid transparent;border-radius:.55rem;padding:.6rem .75rem;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:.6rem;}
.sit-btn:hover{background:var(--sf2);border-color:var(--bd);}
.sit-btn.active{background:rgba(100,223,223,.08);border-color:rgba(100,223,223,.3);}
.sit-btn.done{opacity:.7;}
.sit-icon{font-size:1rem;flex-shrink:0;}
.sit-info{flex:1;min-width:0;}
.sit-num{font-size:.63rem;color:var(--td);font-weight:600;}
.sit-name{font-size:.82rem;color:var(--tx);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sit-check{flex-shrink:0;width:18px;height:18px;border-radius:50%;border:1.5px solid var(--td);display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .2s;}
.sit-btn.done .sit-check{background:var(--gn);border-color:var(--gn);color:#000;}
.sit-btn.active .sit-name{color:var(--cy);}

/* MAIN */
.main{flex:1;padding:2.5rem 2rem;max-width:680px;}

.sit-header{margin-bottom:2rem;}
.cat-badge{display:inline-block;padding:.25rem .75rem;background:rgba(100,223,223,.1);border:1px solid rgba(100,223,223,.25);border-radius:2rem;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cy);margin-bottom:.75rem;}
.sit-h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:var(--tx);margin-bottom:.5rem;}
.layer-bar{display:flex;align-items:center;gap:.5rem;}
.layer-dots{display:flex;gap:.3rem;}
.ldot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.1);transition:all .3s;}
.ldot.done{background:var(--cy);}
.ldot.current{background:var(--cy);box-shadow:0 0 6px var(--cy);}
.layer-label{font-size:.78rem;color:var(--td);}

/* SENTENCE DISPLAY */
.sentence-card{background:var(--sf);border:1px solid var(--bd);border-radius:1rem;padding:2rem;margin:1.5rem 0;min-height:120px;position:relative;overflow:hidden;}
.sentence-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(100,223,223,.04),transparent);pointer-events:none;}
.sentence-text{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;color:var(--tx);line-height:1.6;}
.sentence-text .hl{color:var(--cy);position:relative;display:inline;}
.sentence-text .hl::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--cy);opacity:.5;border-radius:1px;}
@keyframes hl-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sentence-text .hl{animation:hl-in .35s ease forwards;}

/* CONTROLS */
.controls{display:flex;gap:.75rem;margin-bottom:2rem;flex-wrap:wrap;}
.btn-next{background:var(--cy);color:#000;font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;border:none;padding:.7rem 1.5rem;border-radius:.6rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem;}
.btn-next:hover{opacity:.88;transform:translateY(-1px);}
.btn-next:disabled{background:rgba(255,255,255,.1);color:var(--td);cursor:default;transform:none;}
.btn-restart{background:none;border:1px solid var(--bd);color:var(--tm);font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:600;padding:.7rem 1.2rem;border-radius:.6rem;cursor:pointer;transition:all .2s;}
.btn-restart:hover{border-color:var(--bdh);color:var(--tx);}
.btn-complete{background:var(--gn);color:#000;font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;border:none;padding:.7rem 1.5rem;border-radius:.6rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem;}
.btn-complete:hover{opacity:.88;}

/* VOCAB */
.vocab-sec{margin-bottom:1.75rem;}
.sec-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.65rem;}
.vocab-grid{display:flex;flex-wrap:wrap;gap:.4rem;}
.vocab-chip{background:var(--sf2);border:1px solid var(--bd);border-radius:.45rem;padding:.35rem .7rem;display:flex;flex-direction:column;}
.vc-en{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;color:var(--cy);}
.vc-pt{font-size:.7rem;color:var(--td);}

/* SPOKEN */
.spoken-sec{background:rgba(245,197,24,.07);border:1px solid rgba(245,197,24,.2);border-radius:.75rem;padding:.9rem 1.1rem;}
.spoken-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--am);margin-bottom:.35rem;}
.spoken-text{font-size:.88rem;color:var(--tm);line-height:1.6;}
.spoken-text em{color:var(--am);font-style:normal;font-weight:600;}

/* COMPLETE OVERLAY */
.complete-overlay{display:none;position:absolute;inset:0;background:linear-gradient(135deg,rgba(95,216,122,.06),rgba(100,223,223,.04));border-radius:.95rem;align-items:center;justify-content:center;flex-direction:column;gap:.5rem;text-align:center;padding:1.5rem;}
.complete-overlay.show{display:flex;}
.co-icon{font-size:2rem;margin-bottom:.25rem;}
.co-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;color:var(--gn);}
.co-sub{font-size:.82rem;color:var(--tm);}

/* RESPONSIVE */
@media(max-width:700px){
  .layout{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:static;padding:.75rem;overflow-x:auto;white-space:nowrap;border-right:none;border-bottom:1px solid var(--bd);}
  .cat-group{display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap;margin-bottom:0;margin-right:.5rem;}
  .cat-label{display:none;}
  .sit-btn{display:inline-flex;width:auto;padding:.45rem .65rem;}
  .sit-name{display:none;}
  .main{padding:1.5rem 1rem;}
  .sentence-text{font-size:1.1rem;}
}
</style>

// ── STATE ──────────────────────────────────────────────────────────────────
const LS_KEY = 'p1_done';
let currentSit = null;
let currentLayer = 0;
let doneSets = new Set(JSON.parse(localStorage.getItem(LS_KEY) || '[]'));

// ── UTILS ─────────────────────────────────────────────────────────────────
function saveDone(){localStorage.setItem(LS_KEY, JSON.stringify([...doneSets]));}

function renderSentence(layer){
  const t = layer.t;
  const hl = layer.hl;
  // escape special regex chars
  const esc = hl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return t.replace(new RegExp(esc),'<span class="hl">'+hl+'</span>');
}

// ── PARTICLES ─────────────────────────────────────────────────────────────
(function(){
  const container = document.getElementById('particles');
  const colors = ['#64DFDF','#F5C518','#5FD87A'];
  for(let i=0;i<22;i++){
    const d = document.createElement('div');
    d.className = 'p';
    const size = 3 + Math.random()*5;
    const x = Math.random()*100;
    const y = Math.random()*100;
    const dur = 8 + Math.random()*12;
    const delay = Math.random()*8;
    const col = colors[Math.floor(Math.random()*colors.length)];
    d.style.cssText = `width:${size}px;height:${size}px;left:${x}%;top:${y}%;background:${col};animation:float-p ${dur}s ${delay}s infinite ease-in-out;`;
    container.appendChild(d);
  }
})();

// ── BUILD SIDEBAR ──────────────────────────────────────────────────────────
(function(){
  const cats = {};
  SITS.forEach(s=>{
    if(!cats[s.cat]) cats[s.cat]=[];
    cats[s.cat].push(s);
  });
  const list = document.getElementById('sitList');
  Object.entries(cats).forEach(([cat,sits])=>{
    const g = document.createElement('div');
    g.className = 'cat-group';
    const lbl = document.createElement('div');
    lbl.className = 'cat-label';
    lbl.textContent = cat;
    g.appendChild(lbl);
    sits.forEach(s=>{
      const btn = document.createElement('button');
      btn.className = 'sit-btn' + (doneSets.has(s.id)?' done':'');
      btn.id = 'sbtn-'+s.id;
      btn.onclick = ()=>loadSit(s.id);
      btn.innerHTML = `
        <span class="sit-icon">${s.icon}</span>
        <span class="sit-info">
          <span class="sit-num">Situação ${String(s.id).padStart(2,'0')}</span>
          <span class="sit-name">${s.title}</span>
        </span>
        <span class="sit-check">${doneSets.has(s.id)?'✓':''}</span>`;
      g.appendChild(btn);
    });
    list.appendChild(g);
  });
  updateNavProgress();
})();

// ── LOAD SITUATION ─────────────────────────────────────────────────────────
function loadSit(id){
  // deactivate old
  if(currentSit){
    const old = document.getElementById('sbtn-'+currentSit.id);
    if(old) old.classList.remove('active');
  }
  currentSit = SITS.find(s=>s.id===id);
  currentLayer = 0;

  // activate sidebar btn
  const btn = document.getElementById('sbtn-'+id);
  if(btn) btn.classList.add('active');

  // header
  document.getElementById('catBadge').textContent = currentSit.cat;
  document.getElementById('sitTitle').textContent = currentSit.title;

  // clear complete overlay
  document.getElementById('completeOverlay').classList.remove('show');

  // show controls
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('btnNext').style.display = 'flex';
  document.getElementById('btnComplete').style.display = 'none';
  document.getElementById('btnNext').disabled = false;

  // vocab
  const vg = document.getElementById('vocabGrid');
  vg.innerHTML = '';
  currentSit.vocab.forEach(([en,pt])=>{
    const chip = document.createElement('div');
    chip.className = 'vocab-chip';
    chip.innerHTML = `<span class="vc-en">${en}</span><span class="vc-pt">${pt}</span>`;
    vg.appendChild(chip);
  });
  document.getElementById('vocabSec').style.display = 'block';

  // spoken
  if(currentSit.spoken){
    document.getElementById('spokenText').innerHTML = currentSit.spoken;
    document.getElementById('spokenSec').style.display = 'block';
  } else {
    document.getElementById('spokenSec').style.display = 'none';
  }

  renderLayer();
}

// ── RENDER LAYER ──────────────────────────────────────────────────────────
function renderLayer(){
  if(!currentSit) return;
  const layer = currentSit.layers[currentLayer];
  document.getElementById('sentText').innerHTML = renderSentence(layer);
  document.getElementById('layerLabel').textContent = `Camada ${currentLayer+1} de ${currentSit.layers.length}`;

  // dots
  const dotsEl = document.getElementById('layerDots');
  dotsEl.innerHTML = '';
  currentSit.layers.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'ldot' + (i<currentLayer?' done':(i===currentLayer?' current':''));
    dotsEl.appendChild(d);
  });

  // buttons
  const isLast = currentLayer === currentSit.layers.length-1;
  const btnNext = document.getElementById('btnNext');
  const btnComplete = document.getElementById('btnComplete');
  if(isLast){
    btnNext.style.display = 'none';
    btnComplete.style.display = 'flex';
  } else {
    btnNext.style.display = 'flex';
    btnNext.disabled = false;
    btnComplete.style.display = 'none';
  }
}

// ── NEXT LAYER ────────────────────────────────────────────────────────────
document.getElementById('btnNext').onclick = function(){
  if(!currentSit) return;
  if(currentLayer < currentSit.layers.length-1){
    currentLayer++;
    renderLayer();
  }
};

// ── COMPLETE ──────────────────────────────────────────────────────────────
document.getElementById('btnComplete').onclick = function(){
  if(!currentSit) return;
  doneSets.add(currentSit.id);
  saveDone();

  // update sidebar
  const btn = document.getElementById('sbtn-'+currentSit.id);
  if(btn){
    btn.classList.add('done');
    btn.querySelector('.sit-check').textContent='✓';
  }

  // show complete overlay
  document.getElementById('coSub').textContent = currentSit.title + ' concluída!';
  document.getElementById('completeOverlay').classList.add('show');

  document.getElementById('btnComplete').style.display = 'none';
  updateNavProgress();

  // auto-advance to next sit after 1.5s
  const nextId = currentSit.id < 20 ? currentSit.id+1 : null;
  if(nextId){
    setTimeout(()=>{
      document.getElementById('completeOverlay').classList.remove('show');
      loadSit(nextId);
    }, 1800);
  }
};

// ── RESTART ───────────────────────────────────────────────────────────────
document.getElementById('btnRestart').onclick = function(){
  if(!currentSit) return;
  currentLayer = 0;
  document.getElementById('completeOverlay').classList.remove('show');
  document.getElementById('btnNext').style.display = 'flex';
  document.getElementById('btnComplete').style.display = 'none';
  renderLayer();
};

// ── PROGRESS ──────────────────────────────────────────────────────────────
function updateNavProgress(){
  const done = doneSets.size;
  const pct = Math.round(done/20*100);
  document.getElementById('navFill').style.width = pct+'%';
  document.getElementById('navLabel').textContent = done+' / 20';
}

// auto-load first
loadSit(1);
</script>

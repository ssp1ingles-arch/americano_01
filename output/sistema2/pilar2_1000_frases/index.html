// ── STATE ──────────────────────────────────────────────────────────────────
const LS_KEY='p2_learned';
let learned=new Set(JSON.parse(localStorage.getItem(LS_KEY)||'[]'));
let curLvl=1, curFilter='all', searchQ='', flashMode=false, flashIdx=0, flashRevealed=false;
let flashList=[];
function saveLearned(){localStorage.setItem(LS_KEY,JSON.stringify([...learned]));}
function phraseIdx(id){return id-1;}
function phrasesForLevel(lvl){const s=(lvl-1)*100;return P.slice(s,s+100);}
function learnedCountForLevel(lvl){let c=0;const s=(lvl-1)*100;for(let i=s;i<s+100;i++)if(learned.has(i))c++;return c;}
// ── PARTICLES ─────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('particles');
  ['#64DFDF','#F5C518','#5FD87A'].forEach(col=>{
    for(let i=0;i<7;i++){
      const d=document.createElement('div');d.className='p';
      const sz=2+Math.random()*4,x=Math.random()*100,y=Math.random()*100,dur=9+Math.random()*10,del=Math.random()*8;
      d.style.cssText=`width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;background:${col};animation:fp ${dur}s ${del}s infinite ease-in-out`;
      c.appendChild(d);
    }
  });
})();
// ── LEVEL TABS ─────────────────────────────────────────────────────────────
function buildTabs(){
  const el=document.getElementById('lvlTabs');
  el.innerHTML='';
  LVLS.forEach(l=>{
    const btn=document.createElement('button');
    btn.className='ltab'+(l.id===curLvl?' active':'');
    const lc=learnedCountForLevel(l.id);
    btn.innerHTML=`<span class="ltab-name">${l.name}</span><span class="ltab-prog">${lc}/100</span>`;
    btn.onclick=()=>{curLvl=l.id;flashIdx=0;flashRevealed=false;buildTabs();buildHdr();render();};
    el.appendChild(btn);
  });
}
function buildHdr(){
  const l=LVLS[curLvl-1];
  const lc=learnedCountForLevel(curLvl);
  const pct=lc;
  document.getElementById('lvlHdr').innerHTML=`
    <div class="lvl-hdr-name">${l.name}</div>
    <span class="lvl-hdr-desc">${l.desc}</span>
    <div class="lvl-hdr-bar"><div class="lvl-hdr-fill" style="width:${pct}%"></div></div>
    <span class="lvl-hdr-pct">${lc}/100</span>`;
  const total=[...learned].length;
  document.getElementById('navLearned').textContent=total;
}
// ── RENDER LIST ────────────────────────────────────────────────────────────
function render(){
  document.getElementById('phraseList').style.display=flashMode?'none':'block';
  document.getElementById('flashArea').className='flash-area'+(flashMode?' show':'');
  if(flashMode){renderFlash();return;}
  const phrases=phrasesForLevel(curLvl);
  const q=searchQ.toLowerCase();
  const list=document.getElementById('phraseList');
  list.innerHTML='';
  let count=0;
  phrases.forEach((ph,i)=>{
    const gid=(curLvl-1)*100+i;
    const isL=learned.has(gid);
    if(curFilter==='todo'&&isL)return;
    if(curFilter==='done'&&!isL)return;
    if(q&&!ph[0].toLowerCase().includes(q)&&!ph[1].toLowerCase().includes(q))return;
    count++;
    const card=document.createElement('div');
    card.className='pcard'+(isL?' learned':'');
    const noteHtml=ph[2]?`<div class="pc-note ${ph[2]}">${ph[2]==='F'?'🔊 Falado':'💡 Macete'}: ${ph[3]}</div>`:'';
    card.innerHTML=`
      <span class="pnum">${gid+1}</span>
      <div class="pc-body">
        <div class="pc-en">${ph[0]}</div>
        <div class="pc-pt">${ph[1]}</div>
        ${noteHtml}
      </div>
      <button class="star-btn ${isL?'on':''}" title="${isL?'Remover':'Marcar como aprendida'}" data-gid="${gid}">${isL?'★':'☆'}</button>`;
    card.querySelector('.star-btn').onclick=function(e){
      e.stopPropagation();
      const g=parseInt(this.dataset.gid);
      if(learned.has(g))learned.delete(g);else learned.add(g);
      saveLearned();buildTabs();buildHdr();render();
    };
    list.appendChild(card);
  });
  if(count===0)list.innerHTML='<div class="empty">Nenhuma frase encontrada.</div>';
}
// ── FLASHCARD ─────────────────────────────────────────────────────────────
function buildFlashList(){
  const phrases=phrasesForLevel(curLvl);
  flashList=[];
  phrases.forEach((ph,i)=>{
    const gid=(curLvl-1)*100+i;
    if(curFilter==='todo'&&learned.has(gid))return;
    if(curFilter==='done'&&!learned.has(gid))return;
    flashList.push({ph,gid});
  });
}
function renderFlash(){
  buildFlashList();
  if(flashList.length===0){
    document.getElementById('fcard').innerHTML='<div style="color:var(--td);font-size:.9rem">Nenhuma frase neste filtro.</div>';
    document.getElementById('fcMarkWrap').style.display='none';
    return;
  }
  if(flashIdx>=flashList.length)flashIdx=0;
  const {ph,gid}=flashList[flashIdx];
  flashRevealed=false;
  document.getElementById('fcNum').textContent=(gid+1)+' — '+LVLS[curLvl-1].name;
  document.getElementById('fcEn').textContent=ph[0];
  document.getElementById('fcPt').style.display='none';
  document.getElementById('fcPt').textContent=ph[1];
  document.getElementById('fcNote').style.display='none';
  document.getElementById('fcNote').textContent=ph[2]?(ph[2]==='F'?'🔊 ':''+'💡 ')+ph[3]:'';
  document.getElementById('fcHint').style.display='block';
  document.getElementById('fcPos').textContent=(flashIdx+1)+' / '+flashList.length;
  document.getElementById('fcMarkWrap').style.display='none';
}
function fcReveal(){
  if(flashRevealed)return;
  flashRevealed=true;
  document.getElementById('fcPt').style.display='block';
  const {ph}=flashList[flashIdx];
  if(ph[2]){document.getElementById('fcNote').style.display='block';}
  document.getElementById('fcHint').style.display='none';
  document.getElementById('fcMarkWrap').style.display='flex';
}
function fcNext(){if(!flashList.length)return;flashIdx=(flashIdx+1)%flashList.length;renderFlash();}
function fcPrev(){if(!flashList.length)return;flashIdx=(flashIdx-1+flashList.length)%flashList.length;renderFlash();}
function fcMark(yes){
  if(!flashList.length)return;
  const {gid}=flashList[flashIdx];
  if(yes)learned.add(gid);else learned.delete(gid);
  saveLearned();buildTabs();buildHdr();
  fcNext();
}
// ── EVENTS ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.fbtn').forEach(btn=>{
  btn.onclick=function(){
    curFilter=this.dataset.f;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    flashIdx=0;render();
  };
});
document.getElementById('searchBox').oninput=function(){searchQ=this.value;render();};
document.getElementById('modeBtn').onclick=function(){
  flashMode=!flashMode;
  flashIdx=0;flashRevealed=false;
  this.textContent=flashMode?'📋 Lista':'⚡ Flashcard';
  this.className='mode-btn'+(flashMode?' flash':'');
  render();
};
// ── INIT ──────────────────────────────────────────────────────────────────
buildTabs();buildHdr();render();

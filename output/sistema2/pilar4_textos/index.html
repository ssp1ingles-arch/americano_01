// ═══ BLOCO A — TRABALHO (1–25) ══════════════════════════════════════════
[1,'A',"Monday Morning",'I',["Tom wakes up at 7am. He is tired.","He goes to the kitchen and makes coffee.","The coffee is hot. Tom drinks it slowly.","He looks at the window. It is raining outside.","\"Not a great Monday,\" he thinks.","He gets his bag and goes to work anyway."],["wakes up","tired","kitchen","slowly","raining","anyway"],"Why does Tom think it's not a great Monday?"],
[2,'A',"The Email",'I',["Sarah sits at her desk. She opens her computer.","She has 47 new emails. She sighs.","\"Too many emails,\" she says.","She starts with the most important one.","It's from her boss. He wants a report by noon.","Sarah looks at the clock. It's 10am. She has two hours.","\"I can do this,\" she says. She starts writing."],["desk","sighs","important","report","noon","clock"],"How much time does Sarah have to write the report?"],
[3,'A',"The Meeting",'I',["The meeting starts at 2pm. Everyone sits down.","The manager speaks first. He talks for a long time.","Some people are bored. One man falls asleep.","Then someone asks a question. The room wakes up.","At 3:30, the meeting ends. People are relieved.","\"Finally!\" says one woman. They all laugh."],["meeting","manager","bored","falls asleep","relieved","finally"],"What time does the meeting end?"],
[4,'A',"Lunch Break",'I',["It's noon. Time for lunch.","Carlos goes to the restaurant near his office.","He orders a sandwich and a juice.","He sits alone and checks his phone.","He has a message from his wife: \"How's your day?\"","He smiles and writes back: \"Busy. But okay.\"","He finishes his lunch and goes back to work."],["orders","sandwich","checks","message","smiles","writes back"],"Who sends Carlos a message?"],
[5,'A',"Working Late",'M',["It's 7pm and the office is almost empty.","Ana is still at her desk. She has a deadline tomorrow.","She's been working on this project for three weeks.","Her eyes are tired. Her coffee is cold.","She thinks about going home, but the work isn't done.","She takes a deep breath and keeps typing.","An hour later, she finishes. She packs her bag.","Walking out, she feels exhausted but proud."],["deadline","project","exhausted","proud","packs","deep breath"],"How long has Ana been working on the project?"],
[6,'A',"The Job Interview",'M',["David is nervous. Today is his job interview.","He arrives 10 minutes early. Good sign.","He wears his best shirt. His hands are shaking a little.","The interviewer comes in. She shakes his hand firmly.","\"Tell me about yourself,\" she says.","David takes a breath and begins. He prepared for this.","The interview goes well. At the end, she smiles.","\"We'll be in touch,\" she says. He leaves feeling hopeful."],["nervous","shaking","interviewer","firmly","prepared","hopeful","be in touch"],"Why does David feel hopeful at the end?"],
[7,'A',"Remote Work Day",'M',["Laura works from home today. She loves remote days.","No commute. No office noise. Just her and her computer.","She makes breakfast properly — scrambled eggs and toast.","She starts work at 9am, focused and comfortable.","But by 2pm, she misses her coworkers.","She sends them a funny meme in the group chat.","They all react with laughing emojis.","She smiles. Remote work has its ups and downs."],["commute","scrambled","focused","coworkers","meme","react","ups and downs"],"What does Laura miss about the office?"],
[8,'A',"The Promotion",'M',["Mark has been at this company for four years.","He works hard. He never misses a deadline.","Today, his manager calls him into the office.","Mark's heart beats faster. Did he do something wrong?","\"Mark,\" says the manager, \"we're promoting you.\"","Mark blinks. He didn't expect this. \"Thank you,\" he says.","Walking back to his desk, he can't stop smiling.","He calls his wife. \"You won't believe what just happened.\""],["promoting","blinks","expect","deadline","beating","believe"],"How did Mark feel when his manager called him in?"],
[9,'A',"Difficult Coworker",'M',["Everyone in the office likes each other. Except Paulo.","Paulo talks too loud. He never listens in meetings.","He always takes credit for other people's work.","Today he did it again. He presented Linda's idea as his own.","Linda was furious, but she said nothing in the meeting.","Later, she went to her manager and explained everything.","The manager nodded. \"I know,\" he said. \"I've noticed.\"","Linda felt better. Sometimes patience pays off."],["credit","presented","furious","explained","nodded","noticed","patience","pays off"],"What does Paulo do that is unfair?"],
[10,'A',"End of the Year",'A',["It was the last working day of the year.","The team gathered in the conference room.","Someone brought a cake. Another brought sparkling water.","The manager made a short speech about the year's challenges.","He mentioned the project that almost failed — and then didn't.","He talked about the new clients, the long nights, the setbacks.","\"But we made it,\" he said. \"Together.\"","Everyone raised their glasses. Someone started clapping.","It wasn't a perfect year. But it was theirs."],["gathered","sparkling","speech","challenges","setbacks","raised","clapping"],"What does the manager say about the difficult project?"],
[11,'A',"The New Employee",'I',["It's Maria's first day at work.","She arrives early. She doesn't know where to sit.","A colleague sees her. \"You must be the new one!\" he says.","He shows her the desk, the kitchen, the bathroom.","He introduces her to everyone. So many names.","By lunchtime, she already feels a little less lost.","\"You'll be fine,\" he says. \"I was new once too.\""],["first day","arrives","colleague","introduces","lunchtime","lost","fine"],"Who helps Maria on her first day?"],
[12,'A',"The Presentation",'M',["James has been preparing for this presentation for a week.","He rehearsed it at home. Three times. In front of the mirror.","Now he's in the room. Twenty people are looking at him.","His mouth goes dry. He forgets his first sentence.","He breathes. He looks at his notes.","Then he starts again. Slowly, his voice becomes steady.","By the end, he even gets a question from the director.","He answers it well. He walks out proud."],["rehearsed","mirror","dry","notes","steady","director","proud"],"How does James feel when he first faces the audience?"],
[13,'A',"Coffee Break",'I',["It's 3pm. Time for a coffee break.","Ana goes to the kitchen. Pedro is already there.","\"Long day?\" he asks.","\"Very long,\" she says. \"You?\"","\"Don't ask.\"","They stand there in silence, drinking coffee.","Sometimes that's enough. Just five minutes and a colleague."],["coffee break","kitchen","already","silence","drinking","colleague","enough"],"What do Ana and Pedro do during the break?"],
[14,'A',"The Mistake",'M',["Carlos sent the wrong file to the client.","He realized it ten minutes after pressing send.","His stomach dropped. He called his manager immediately.","\"What do you want to do?\" she asked.","\"I'll call them and apologize,\" he said.","The client was annoyed but understanding.","The correction arrived in twenty minutes.","Carlos learned something that day: mistakes happen. What matters is what you do next."],["realized","pressing send","stomach dropped","immediately","apologize","annoyed","correction"],"What does Carlos do after realizing his mistake?"],
[15,'A',"The Long Meeting",'I',["The meeting was supposed to last one hour.","It lasted three.","People shifted in their chairs. Someone checked their phone under the table.","The agenda kept growing. New topics kept appearing.","At hour two, someone finally said: \"Can we focus?\"","The room went quiet. Then everyone nodded.","In the next thirty minutes, they finished everything.","Sometimes you just need someone to say what everyone is thinking."],["lasted","shifted","agenda","appearing","focus","nodded","finished"],"Why did the meeting take so long?"],
[16,'A',"Office Gossip",'I',["\"Did you hear about Paulo and the new contract?\" Lisa whispered.","\"No, what happened?\" said Ana.","\"I'm not sure. I heard something in the elevator.\"","\"Who told you?\"","\"I don't remember. But everyone is talking about it.\"","An hour later, Paulo walked by, smiling.","Nobody actually knew anything. But the story had traveled through three floors."],["whispered","contract","elevator","talking","traveled","floors","actually"],"How did the rumor about Paulo spread?"],
[17,'A',"Team Lunch",'I',["Every Friday, the team goes to lunch together.","They leave the office at noon and walk two blocks.","The restaurant is small and always busy.","They order quickly because they only have one hour.","The food is good. But the conversation is better.","They talk about everything except work.","By 1pm, they're back at their desks, a little happier."],["together","blocks","busy","order","conversation","everything","desks"],"What do the team members talk about at lunch?"],
[18,'A',"The Conference Call",'M',["The call was scheduled for 9am. It started at 9:14.","\"Can everyone hear me?\" asked the voice from London.","Half the room said yes. The other half was still muted.","\"You're on mute,\" someone said. It happened four times.","There were two connection drops and one echo.","By the time they finished, only thirty minutes remained.","In the end, they agreed on one thing: next time, email."],["scheduled","muted","connection drops","echo","remained","agreed","email"],"What problem happened most during the call?"],
[19,'A',"The Resignation",'A',["She wrote the resignation letter three times.","The first was too emotional. The second was too cold.","The third was exactly what she meant: grateful, clear, and final.","She sent it on a Tuesday. By Friday, the news had spread.","Her manager called her in. \"Are you sure?\" he asked.","\"I am,\" she said. She had never been more sure of anything.","She gave four weeks. She trained her replacement herself.","On her last day, she left quietly, without fanfare.","She didn't need the celebration. She had the next step."],["resignation","emotional","grateful","replacement","fanfare","quietly","celebration"],"Why did it take her three tries to write the letter?"],
[20,'A',"Performance Review",'A',["The performance review form asked twelve questions.","Rating your own work feels strange — everyone knows it.","Gabriel filled it in honestly. He mentioned his best project.","He also mentioned the deadline he had missed in March.","His manager read it in silence, then looked up.","\"You're the only person this quarter who admitted a mistake.\"","Gabriel didn't know how to respond. \"It happened,\" he said.","\"That's exactly the point,\" said his manager. \"It did. You didn't hide it.\"","The review ended with a raise. Not a big one. But real."],["performance","honestly","admitted","quarter","respond","hide","raise"],"What did Gabriel do that surprised his manager?"],
[21,'A',"The New Boss",'M',["The new manager arrived on Monday.","She introduced herself to everyone personally. No group email.","She asked each person the same question: \"What's working?\"","Some people were suspicious. They'd heard this before.","But she wrote everything down. And she remembered.","By her second week, she had already fixed three small things.","\"Small things matter,\" she said at the team meeting.","Nobody argued with that."],["introduced","personally","suspicious","remembered","fixed","matter","argued"],"What question did the new manager ask each person?"],
[22,'A',"Overtime",'M',["It was 8pm. Daniel was still at his desk.","Not because he had to be. Because he wanted to finish.","There's a difference, he told himself.","He put on headphones. Music helped him focus.","By 9pm, the report was done. Really done.","He saved it, closed his laptop, and put on his jacket.","The office was empty. The lights were on motion sensors.","They turned off as he walked out. He kind of liked that."],["overtime","headphones","focus","report","motion sensors","turned off","jacket"],"Why was Daniel still at the office at 8pm?"],
[23,'A',"The Office Party",'I',["The end-of-year party is today.","The office looks different — there are lights and music.","People wear normal clothes instead of work clothes.","They laugh more. They talk about different things.","Someone brings a karaoke machine. It's loud and wonderful.","The manager sings first. He's not good, but he tries.","Everyone claps. Even people who never clap in meetings."],["end-of-year","lights","normal clothes","karaoke","wonderful","claps","tries"],"What makes the office party different from a normal workday?"],
[24,'A',"Business Trip",'M',["He landed in São Paulo at 7am and had a meeting at 9.","No time for the hotel. He went straight to the client.","The meeting lasted two hours. It went better than expected.","At noon, someone took him to a local restaurant.","He ordered something he didn't recognize. It was delicious.","Back at the hotel by 5pm, he sat on the bed and stared at the ceiling.","Tired. But satisfied. That's what good days feel like."],["landed","straight","lasted","recognized","delicious","stared","satisfied"],"What did he do after his meeting ended?"],
[25,'A',"The Handover",'M',["Tomorrow was her last day. Today was the handover.","She spent six hours teaching her replacement everything.","Every system. Every shortcut. Every quirky client to be careful with.","The new person asked good questions. That was a good sign.","\"You'll be fine,\" she said. And she meant it.","At 6pm, she closed her laptop for the last time at that desk.","Her replacement looked at her. \"How do you feel?\"","\"Ready,\" she said. And that was true too."],["handover","replacement","shortcut","quirky","meant","closed","ready"],"What does she teach her replacement?"],
// ═══ BLOCO B — COMPRAS (26–50) ══════════════════════════════════════════
[26,'B',"At the Market",'I',["Maria goes to the market every Saturday.","She buys fruits, vegetables, and bread.","Today she sees a new fruit. It's called a persimmon.","She asks the vendor: \"Is it sweet?\"","\"Very sweet,\" he says. \"Try one.\"","She tries it. She loves it. She buys three."],["market","buys","persimmon","vendor","sweet","tries"],"What does Maria try for the first time?"],
[27,'B',"Too Expensive",'I',["Ben is at the shoe store. He needs new shoes.","He finds a pair he loves. He looks at the price.","$180. That's too expensive.","He puts them back. He looks for something cheaper.","He finds another pair. $45. Not as beautiful, but okay.","He buys them. He's not completely happy, but his wallet is."],["pair","expensive","cheaper","completely","wallet","beautiful"],"Why doesn't Ben buy the first pair of shoes?"],
[28,'B',"Online Shopping at 2am",'I',["It's 2am. Everyone is asleep. Except Lucas.","Lucas is on his phone, shopping online.","He doesn't need anything. But everything looks good.","He adds a jacket to his cart. Then a book. Then a lamp.","His total is $200. He stares at the screen.","He removes the lamp. Still $160.","He closes the app. He puts his phone down.","He opens the app again. He buys the jacket."],["cart","total","stares","removes","closes","buys"],"What does Lucas buy in the end?"],
[29,'B',"The Return",'M',["Sandra bought a dress last week. It doesn't fit.","Today she goes back to the store to return it.","She explains the situation to the cashier.","\"Do you have the receipt?\" the cashier asks.","Sandra searches her bag. She can't find it.","She searches again. There it is, at the bottom.","The cashier processes the return. Sandra gets her money back.","\"Always keep your receipts,\" she tells herself on the way out."],["return","fit","receipt","searches","processes","bottom","keep"],"What problem does Sandra have at first?"],
[30,'B',"Black Friday",'M',["It's 6am on Black Friday. The mall opens at 7.","Outside, there's already a long line.","People hold coffee cups and look at their phones.","They're all waiting for the same thing: the deals.","When the doors open, everyone moves fast.","It's loud, chaotic, and exciting all at once.","By noon, most of the best deals are gone.","But many people walk out happy, bags in both hands."],["mall","line","deals","chaotic","exciting","noon","walk out"],"What happens when the mall opens?"],
[31,'B',"The Grocery List",'I',["Elena looks at her grocery list before she goes to the store.","Milk. Eggs. Bread. Chicken. Tomatoes.","She always writes a list. Otherwise she forgets.","Inside the store, she follows the list carefully.","But she also buys chips and ice cream. Not on the list.","\"It was on sale,\" she tells herself.","She goes home with everything she needed. And a little extra."],["grocery","list","carefully","otherwise","sale","extra","follows"],"What does Elena buy that wasn't on her list?"],
[32,'B',"The Gift Shop",'I',["James needs to buy a gift for his mother's birthday.","He goes to the gift shop near his house.","There are candles, frames, and little decorations everywhere.","He picks up a blue candle. Then puts it back.","Then a picture frame. Also puts it back.","After twenty minutes, he buys the first candle he picked up.","Some decisions are circles."],["gift","birthday","candles","frames","decorations","picks up","decisions"],"What does James buy in the end?"],
[33,'B',"At the Pharmacy",'I',["Paul has a headache. He goes to the pharmacy.","He tells the pharmacist his symptoms.","\"How long have you had this headache?\" she asks.","\"Since this morning,\" he says.","She recommends a basic painkiller. \"Take two with water.\"","She also says to rest and drink plenty of fluids.","He buys the medicine and goes home.","By evening, the headache is mostly gone."],["pharmacy","pharmacist","symptoms","recommends","painkiller","fluids","evening"],"What does the pharmacist tell Paul to do?"],
[34,'B',"Window Shopping",'I',["On rainy days, Carla goes window shopping.","She walks through the mall with no intention of buying.","She looks at shoes, clothes, bags, and accessories.","She tries on a coat. It's beautiful. She checks the price.","Way too expensive. She takes it off and hangs it back.","But she keeps the feeling.","Window shopping isn't about buying. It's about dreaming."],["window shopping","intention","accessories","tries on","coat","checks","dreaming"],"Why does Carla go window shopping on rainy days?"],
[35,'B',"The Sale",'I',["There's a sale at Elena's favorite store.","Everything is 40% off today only.","She runs to the store after work.","The place is crowded. The fitting rooms have lines.","She finds three things she loves.","She can only afford two. She puts the shirt back.","She pays and walks out happy.","A good sale is its own kind of happiness."],["sale","crowded","fitting rooms","afford","puts back","pays","happiness"],"What does Elena do with the shirt?"],
[36,'B',"Supermarket Checkout",'I',["The checkout line is long. Always is on Sundays.","Tom puts his items on the belt.","He forgot to weigh the apples. He goes back.","When he returns, the line moved. Now there's someone in his spot.","\"Sorry,\" the person says, and steps aside.","Tom finishes paying and leaves.","Sunday shopping is a small exercise in patience."],["checkout","belt","weigh","moved","spot","steps aside","patience"],"What mistake does Tom make at the checkout?"],
[37,'B',"The Wrong Size",'M',["Ana ordered a jacket online. Size medium.","When it arrived, it was too small.","She checked the website. She had ordered the right size.","The company's sizing was just different.","She started the return process on the website.","Print label. Pack box. Drop at post office.","Five days later, the correct jacket arrived.","Online shopping: convenient, but not always simple."],["ordered","arrived","checked","sizing","process","label","convenient"],"Why didn't the jacket fit Ana?"],
[38,'B',"Price Comparison",'M',["Before she buys anything over $50, Marta compares prices.","She has three apps on her phone for this.","Today she wants to buy a blender.","She finds it for $89 in the first store.","The second app shows $72. The third shows $67 with free delivery.","She orders the cheapest one.","Twenty minutes of research. Twenty-two dollars saved.","She considers that a good return on time."],["compares","apps","blender","delivery","cheapest","research","return on time"],"How much money does Marta save by comparing prices?"],
[39,'B',"The Long Queue",'M',["The line at the electronics store is very long.","It's the day a new phone was released.","People camped outside since last night.","Marco arrived at 6am. He was number 43 in line.","By 10am, he had moved fifteen spots.","He read, listened to music, talked to the person behind him.","At noon, he finally reached the counter.","He held his new phone and thought: was it worth it?","For him, yes. But he wouldn't do it again."],["queue","released","camped","spots","reached","counter","worth it"],"How long had some people been waiting for the phone?"],
[40,'B',"Shopping with Kids",'M',["Shopping with a four-year-old is a different experience.","Everything takes three times longer.","Lucia's daughter wants to stop at every toy display.","She picks things up. She puts them in the cart.","Lucia puts them back. Her daughter cries a little.","They negotiate: one small toy, after the groceries.","The groceries take forty minutes. The toy aisle: ten seconds.","The small victory belongs to no one and everyone."],["experience","toy display","cart","negotiate","groceries","aisle","victory"],"What do Lucia and her daughter agree on?"],
[41,'B',"The Refund",'M',["The product broke after two weeks. It was supposed to last years.","Bruno took it back to the store with the receipt.","\"What happened?\" asked the attendant.","Bruno explained calmly. He had photos on his phone.","The attendant called a manager.","The manager looked at the photos and nodded.","\"Full refund or exchange?\" she asked.","\"Exchange,\" Bruno said. He still wanted the product. Just one that worked."],["broke","supposed to last","receipt","attendant","calmly","photos","exchange"],"What option does Bruno choose?"],
[42,'B',"Impulse Buy",'M',["She didn't plan to buy a lamp.","But there it was, near the checkout, with a 50% off sticker.","It matched her living room exactly.","She put it in her cart without thinking.","At home, she realized she already had four lamps.","She did not need this lamp. It was beautiful, though.","She kept it. Obviously."],["plan","checkout","sticker","matched","realized","obviously","though"],"Why does she decide to keep the lamp?"],
[43,'B',"The Subscription Box",'M',["Every month, a box arrives at Carol's door.","Inside: snacks, beauty products, or kitchen tools — she never knows.","That's the point. It's a surprise.","Some months she loves everything. Some months, nothing.","She almost cancelled it twice.","But then an amazing month came and she stayed.","\"It's like getting a gift from a stranger,\" she says.","\"A stranger who doesn't know you very well.\""],["subscription","arrives","snacks","surprise","cancelled","amazing","stranger"],"Why does Carol keep her subscription even when she doesn't like what she receives?"],
[44,'B',"At the Electronics Store",'A',["The sales associate asked the right questions.","Not \"what's your budget?\" but \"what do you actually use it for?\"","Rafael explained: mostly travel, some editing, video calls.","The associate nodded and skipped three models immediately.","\"These are built for things you don't do,\" he said.","He showed two options. Clear differences. Real trade-offs.","Rafael asked technical questions. Got honest answers.","He left with a laptop he didn't expect to buy.","Not the cheapest. Not the most expensive. Exactly right."],["associate","budget","editing","skipped","trade-offs","technical","honest"],"What made this shopping experience different from a typical one?"],
[45,'B',"Second Hand Shopping",'M',["Gabriel goes to the thrift store every few months.","He doesn't know what he'll find. That's the appeal.","Today: a leather jacket from the 90s, barely worn.","He tries it on. It fits perfectly.","The price: $12. He checks it twice.","\"That's the price,\" says the cashier. \"Everything is tagged.\"","He pays and walks out feeling like he found treasure.","Someone else's story. Now his."],["thrift store","appeal","leather jacket","barely worn","tagged","treasure","cashier"],"Why does Gabriel enjoy shopping at the thrift store?"],
[46,'B',"The Delivery",'I',["She ordered the package on Monday.","On Wednesday, she got a notification: \"Out for delivery.\"","She stayed home all day, waiting.","At 4pm, her phone buzzed: \"Delivered.\"","She ran to the door. Nothing there.","She checked the photo. It showed her neighbor's mat.","She knocked on the door next door.","\"Oh! This came while you were out,\" the neighbor said.","She had been home the whole time."],["package","notification","delivery","buzzed","mat","neighbor","knocked"],"Why does the package end up with the neighbor?"],
[47,'B',"Market Day",'I',["The outdoor market is open every Thursday.","It has vegetables, cheese, honey, and handmade crafts.","Old people come early. Young people come at noon.","The seller of the honey always gives free samples.","\"Just try it,\" he says. Nobody says no to free honey.","Carla buys two jars. Same as every week.","Markets make a city feel alive."],["outdoor","cheese","handmade crafts","samples","jars","alive","seller"],"Who comes to the market early?"],
[48,'B',"The Clearance Rack",'I',["At the back of every store, there's a clearance rack.","The clothes there are often strange. Last season. Odd sizes.","But sometimes there's gold hidden in there.","Today Daniel finds a perfect white shirt. 70% off.","He checks for stains. Checks the buttons. Everything fine.","He buys it and wears it to work the next day.","\"Nice shirt,\" says a colleague. \"Thanks,\" says Daniel. \"Good deal.\""],["clearance rack","last season","hidden","stains","buttons","wears","deal"],"How does Daniel feel about his purchase?"],
[49,'B',"Loyalty Points",'M',["Renata has been collecting loyalty points for two years.","She has 3,400 points. She never uses them.","Today, the store sends an email: \"Points expire Friday.\"","She logs into her account and looks at what she can get.","A travel bag: 3,000 points. She clicks it.","She didn't need a travel bag. But she wasn't letting those points die.","Two days later, a very nice travel bag arrived.","Use your points. They don't earn interest."],["loyalty points","collecting","expire","logs in","travel bag","clicks","earn interest"],"Why does Renata finally use her points?"],
[50,'B',"Shopping Addiction",'A',["She had seventeen unread packages at home. Unopened.","The joy was in the ordering, not the having.","She recognized this, intellectually. She had read about it.","Still, on Tuesday night, she found herself browsing again.","She put three things in her cart. Then sat with them for a while.","Eventually, she closed the tab without buying.","It wasn't a cure. But it was a Tuesday night victory.","She texted a friend: 'I didn't buy the thing.' Her friend responded: 'Legend.'"],["unread packages","ordering","recognized","intellectually","browsing","tab","victory"],"What does she realize about her shopping habit?"],
// ═══ BLOCO C — FAMÍLIA (51–75) ══════════════════════════════════════════
[51,'C',"Sunday Lunch",'I',["Every Sunday, the family has lunch together.","Grandma cooks. It always smells amazing.","The table is full of food. Everyone eats a lot.","The kids run around after the meal.","The adults talk and drink coffee.","At 5pm, everyone starts to leave.","Hugs. Kisses. See you next Sunday."],["together","smells","meal","adults","hugs","kisses"],"What do the adults do after the meal?"],
[52,'C',"The First Day of School",'I',["Today is the first day of school for little Emma.","She's five years old. She has a new backpack.","Her mom holds her hand as they walk in.","Emma sees other kids. She feels shy.","But then a girl smiles at her. \"I'm Lily,\" she says.","Emma smiles back. \"I'm Emma.\"","By the end of the day, they're already friends."],["backpack","holds","shy","smiles","already","friends"],"How does Emma feel at first?"],
[53,'C',"The Phone Call",'I',["Rafael calls his mother every Sunday.","They talk for about an hour.","She tells him about her week. He listens.","He tells her about his work. She listens.","Sometimes they don't have much to say.","But they stay on the phone anyway.","That's how love sounds sometimes — like comfortable silence."],["calls","hour","tells","listens","comfortable","silence"],"How long do Rafael and his mother usually talk?"],
[54,'C',"Growing Up Too Fast",'M',["Maya looks at her son's old photos. He was so small.","In the photos, he fits in her arms completely.","Now he's 15. Almost as tall as her husband.","He has his own music. His own opinions. His own world.","She knocks on his door: \"Can I come in?\"","He looks up from his phone. \"Sure, Mom.\"","They talk for a while. About nothing important.","But for Maya, these small moments are everything."],["fits","completely","opinions","knocks","looks up","moments"],"How old is Maya's son now?"],
[55,'C',"The Argument",'M',["Ana and her sister had a fight last month.","It was over something small. Now neither remembers what.","But the silence has lasted four weeks.","Today, Ana picks up her phone. She dials her sister's number.","It rings twice. Then: \"Hello?\"","Ana's voice shakes a little. \"Hi. I miss you.\"","Silence. Then: \"I miss you too.\"","They talk for two hours. The argument is forgotten."],["argument","silence","lasted","picks up","dials","shakes","forgotten"],"Who makes the first move to end the silence?"],
[56,'C',"Breakfast Together",'I',["On school days, there's no time for family breakfast.","But on Saturdays, they all eat together.","Mom makes eggs. Dad makes toast. The kids set the table.","Everyone has a job. It feels like a team.","They talk about the week. They laugh about small things.","The breakfast takes forty minutes. The memories last longer."],["school days","toast","set the table","team","week","memories","longer"],"Why do they eat breakfast together on Saturdays?"],
[57,'C',"The Bedtime Story",'I',["Every night, Lucas reads to his daughter.","Tonight the story is about a brave little rabbit.","She listens with her eyes wide open.","\"Does the rabbit get home?\" she asks, halfway through.","\"You have to wait and see,\" he says.","She waits. The rabbit gets home.","She smiles and closes her eyes. \"Same story tomorrow?\"","He says yes. He always says yes."],["bedtime","brave","rabbit","listens","halfway","waits","closes"],"What does the daughter ask at the end of the story?"],
[58,'C',"Grandpa's Visit",'I',["Grandpa comes to visit twice a year.","He always brings something: candy, a game, a book.","The kids run to the door before he even knocks.","This visit, he brings a puzzle — five hundred pieces.","\"It's too hard,\" says the boy.","\"We'll do it together,\" says Grandpa.","They spend the whole afternoon on the floor, building it.","Not everything gets finished. But they're already planning the next visit."],["visits","candy","puzzle","pieces","floor","building","planning"],"What does Grandpa bring this visit?"],
[59,'C',"The Holiday Dinner",'I',["The whole family arrives for the holiday dinner.","There are cousins and aunts and uncles from far away.","The table is too small for everyone. They add a second one.","The food is too much. They eat too much.","Someone tells a story that everyone has heard before.","Everyone laughs anyway. That's tradition.","At the end, they all promise to do this more often.","They say that every year."],["cousins","aunts","uncles","tradition","promise","arrives","laughs"],"Why do they add a second table?"],
[60,'C',"Sibling Rivalry",'M',["Tomas and his brother argue about everything.","Who sits in the front seat. Who gets the last slice.","Who has to do the dishes tonight.","Their mother is tired of it. \"You're brothers,\" she says. \"Act like it.\"","One evening, Tomas falls off his bike.","His brother is the first one there. Before their mother. Before anyone.","\"You okay?\" he asks, kneeling down.","Some bonds are stronger than the arguments about pizza."],["sibling","argues","front seat","dishes","tired","kneeling","bonds"],"How does the brother react when Tomas falls off his bike?"],
[61,'C',"The Road Trip",'M',["The family decided to drive to the beach instead of flying.","Eight hours in a car. With two children under ten.","Hour one: music and games. Hour two: snacks.","Hour three: \"Are we there yet?\" Hour four: napping.","Hour five: someone spilled juice on the seat.","Hour six: stop at a gas station for more snacks.","Hours seven and eight: beautiful silence.","When they arrived, the kids ran to the sea.","They all agreed: the trip was part of the vacation."],["decided","instead of","snacks","napping","spilled","gas station","vacation"],"What happens in hour five of the trip?"],
[62,'C',"Moving Out",'M',["Her daughter moved out last Saturday.","She helped pack the boxes. She didn't cry. Not then.","She drove behind the moving truck to the new apartment.","They arranged the furniture together for four hours.","At the end, they hugged at the door.","\"Text me when you're settled in,\" the mother said.","\"Always,\" said her daughter.","On the drive home, alone, she finally cried.","Happy tears. Proud ones."],["moved out","pack","moving truck","arranged","furniture","settled in","proud"],"When does the mother finally cry?"],
[63,'C',"The Birthday Party",'I',["It's Leo's seventh birthday.","There are balloons everywhere. And a cake shaped like a car.","Seven friends from school come.","They play games. They eat too much cake. They run around.","At the end, Leo opens his presents.","He gets a toy he already has. He smiles anyway.","\"That's the right thing to do,\" his dad says quietly.","Leo doesn't know what his dad means. But he will, someday."],["balloons","cake","presents","toy","quietly","someday","right thing"],"What does Leo do when he gets a duplicate present?"],
[64,'C',"Video Call with Family",'I',["Every two weeks, the family has a video call.","There are eight people on the screen.","Everyone talks at the same time.","Someone has a bad connection. Their face freezes.","The youngest cousin shows her new toy to the camera.","Someone's dog appears for three seconds and disappears.","They laugh a lot. They don't solve anything.","They hang up. They feel closer anyway."],["video call","connection","freezes","cousin","camera","hangs up","closer"],"What problems happen during the video call?"],
[65,'C',"The Family Photo",'I',["Every five years, the family takes a formal photo.","This year, there are twenty-three people.","Getting everyone to look at the camera takes eleven minutes.","Someone always blinks.","The photographer tries five times.","In the end, one photo has everyone's eyes open.","One. Out of forty-seven.","They print it and hang it on the wall.","Next time they'll do better. They say that every five years."],["formal","photographer","blinks","tries","print","wall","someday"],"How many good photos does the photographer get?"],
[66,'C',"Baby's First Word",'I',["The baby said his first word today.","It wasn't \"mama\" or \"dada.\"","It was \"no.\"","His parents looked at each other.","\"That's... something,\" said the father.","The baby said it again. Proudly.","\"Well,\" said the mother, \"at least he knows what he wants.\""],["first word","mama","dada","proudly","least","parents","knows"],"What is the baby's first word?"],
[67,'C',"Homework Help",'M',["\"Dad, I need help with math,\" said Sofia.","Her father sat down with confidence. He was good at math.","In school. Thirty years ago.","He looked at the problem. He read it twice.","He did not understand the problem.","\"Let's search for it online,\" he said.","They found a tutorial. They watched it together.","At the end, Sofia understood. Her father, somewhat.","\"Maybe ask your teacher tomorrow,\" he said."],["homework","confidence","problem","tutorial","understood","somewhat","teacher"],"Why can't Sofia's father help her directly?"],
[68,'C',"Parents' Anniversary",'M',["Their parents' anniversary was this weekend.","The two siblings planned a surprise dinner.","They reserved a table at the restaurant where the parents had their first date.","The parents walked in expecting a regular night.","They found the table, the flowers, the old photos.","Mom's hand went to her mouth. Dad looked at his children.","\"How did you know it was this restaurant?\" he asked.","\"Grandma told us,\" they said.","He nodded, grateful for things that pass between generations."],["anniversary","planned","surprise","reserved","expecting","flowers","generations"],"How did the children know which restaurant to choose?"],
[69,'C',"The Sick Child",'M',["Clara woke up at 2am. Her son had a fever.","She checked his temperature: 39.2.","She gave him medicine and a cold cloth on his forehead.","He cried a little. Then he fell back asleep.","She stayed awake beside him.","At 6am, his temperature was lower. He was breathing calmly.","She finally closed her eyes.","There is a kind of tiredness that only parents know."],["fever","temperature","medicine","forehead","breathing","calmly","tiredness"],"What does Clara do when she discovers her son has a fever?"],
[70,'C',"Summer Vacation",'I',["This summer, the family rented a small house by the lake.","For two weeks, there was no schedule.","They swam in the morning. They read in the afternoon.","They grilled dinner outside every night.","The kids didn't ask for their tablets once.","On the last day, nobody wanted to leave.","The father took a photo of the house.","\"Next year?\" asked his daughter.","\"Next year,\" he said."],["rented","lake","schedule","swam","grilled","tablets","leave"],"What surprised the parents about the kids during the vacation?"],
[71,'C',"Teaching to Cook",'M',["\"I want to learn to cook,\" said Miguel to his grandmother.","She smiled. \"Good. Come Saturday.\"","Saturday arrived. She handed him an apron.","She didn't give him a recipe book. She showed him.","Each step, she explained the why — not just the how.","\"Cooking is chemistry,\" she said. \"Pay attention to what changes.\"","Miguel burned the onions once. She didn't say anything.","He tried again. This time, perfect.","The lesson wasn't just about cooking."],["apron","recipe book","chemistry","burned","onions","lesson","explained"],"What does the grandmother teach Miguel beyond cooking?"],
[72,'C',"The New Baby",'I',["The baby arrived on a Tuesday.","Everyone was tired and happy at the same time.","Grandparents came from two cities.","The older sister held the baby for the first time.","She held very still. Very carefully.","\"She's so small,\" she whispered.","\"So were you,\" said her father.","The older sister looked at him. Then at the baby.","Something changed in her face. Something softened."],["arrived","tired","grandparents","held","carefully","whispered","softened"],"How does the older sister feel when she holds the baby?"],
[73,'C',"Family Traditions",'A',["Every family has rituals they don't call rituals.","The Sunday phone call. The Christmas recipe that must be from that notebook.","The way everyone knows not to talk to Dad before his first coffee.","These things aren't written anywhere. They're passed down through living together.","Isabel realized this when she moved to another country.","She found herself recreating the rituals alone — the same songs, the same food.","Home is partly a place. Partly, it's a set of habits you carry with you."],["rituals","recipe","notebook","passed down","recreating","habits","carry"],"What does Isabel realize when she moves abroad?"],
[74,'C',"Dad's Retirement",'A',["After 38 years, he handed in his badge.","No fanfare. He had asked for that specifically.","On the drive home, he was quiet.","\"Are you okay?\" his wife asked.","\"I don't know what I am,\" he said honestly.","The question would take months to answer.","He started gardening. Then cooking. Then volunteering.","Three years later, his daughter asked how retirement felt.","\"Like finding out you're more than your job,\" he said.","\"It just takes a while to remember who that is.\""],["badge","fanfare","honestly","gardening","volunteering","retirement","remember"],"How does the father describe retirement three years later?"],
[75,'C',"The Old House",'A',["They sold the house he grew up in last spring.","He wasn't there when the new owners arrived. He couldn't be.","But he drove by once, a few weeks later.","Different color. New door. A trampoline in the backyard.","He sat in the car for a while, looking.","The house didn't remember him. Houses don't.","But he remembered every inch of it.","The loose step on the stairs. The way the light came in at 4pm.","He drove home. It was fine. And also not fine at all."],["sold","owners","trampoline","backyard","remember","loose step","inch"],"How does he feel when he sees the changes to his childhood home?"],
// ═══ BLOCO D — ROTINA (76–100) ══════════════════════════════════════════
[76,'D',"The Alarm",'I',["The alarm rings at 6am. Pedro hits snooze.","It rings again at 6:10. He hits snooze again.","At 6:20, he finally gets up.","He's late. He knows it. He rushes to the bathroom.","No time for breakfast. He grabs a banana.","He runs to the bus stop. The bus is just leaving.","He catches it. Just in time. He breathes. He made it."],["alarm","snooze","rushes","grabs","catches","just in time","breathes"],"Does Pedro make it to the bus?"],
[77,'D',"Evening Routine",'I',["After work, Julia always does the same things.","She changes her clothes. She makes tea.","She sits on the sofa and watches something light.","A comedy. A cooking show. Something relaxing.","At 10pm, she reads for 30 minutes.","Then she turns off the light. She's asleep in minutes.","Her routine is simple. But it makes her happy."],["changes","tea","sofa","comedy","relaxing","routine","asleep"],"What does Julia do before sleeping?"],
[78,'D',"The Gym",'M',["It's 6am and the gym is already busy.","People lift weights. People run on treadmills.","In the corner, Carlos is doing push-ups.","He comes here every morning. It wasn't always like this.","A year ago, he could barely do five.","Now he does fifty without stopping.","He remembers when getting up at 6am felt impossible.","Now it just feels like Tuesday."],["lift","treadmills","push-ups","barely","stopping","impossible","Tuesday"],"How many push-ups can Carlos do now compared to a year ago?"],
[79,'D',"Morning Coffee Ritual",'I',["She doesn't use a machine. She uses a pour-over.","The water must be exactly 93 degrees.","She grinds the beans fresh. Every morning.","It takes eight minutes. She doesn't mind.","Her husband bought her an expensive machine last year.","It's still in the box.","\"The ritual is the point,\" she explained once.","He nodded, not entirely understanding. She was fine with that."],["pour-over","degrees","grinds","fresh","expensive","ritual","explained"],"Why doesn't she use the coffee machine her husband bought?"],
[80,'D',"The Workout",'I',["Marc goes for a run every morning at 7am.","He doesn't run far. Just three kilometers.","But he goes every day. Rain or sun.","Some mornings he doesn't want to go.","He goes anyway. Once he's outside, it feels right.","By the time he gets back, he's awake. Really awake.","The day starts better when it starts outside."],["run","kilometers","rain","outside","awake","mornings","starts"],"How far does Marc run each morning?"],
[81,'D',"Meal Prep Sunday",'I',["Every Sunday afternoon, Lisa cooks for the week.","She makes rice, chicken, and three kinds of vegetables.","She puts everything in containers.","Lunch for Monday. Lunch for Tuesday. And so on.","It takes two hours. But it saves her an hour every day.","On weekdays, she just opens the fridge.","\"I don't have time to cook,\" she used to say.","Now she cooks for five days in two hours."],["meal prep","containers","vegetables","weekdays","fridge","saves","two hours"],"How much time does Lisa save each weekday by doing meal prep?"],
[82,'D',"The Commute",'I',["Every day, Daniel takes the subway to work.","The ride is 35 minutes.","He uses this time for podcasts.","He has finished six audiobooks this year.","On the platform, people look at their phones.","Daniel looks at his too. But he's listening to something useful.","The commute used to feel like lost time.","Now it feels like learning time."],["subway","ride","podcasts","audiobooks","platform","useful","learning"],"How does Daniel use his commute time?"],
[83,'D',"Screen-Free Night",'M',["Every Wednesday, they have a screen-free night.","No phones. No TV. No laptop.","The first time, they didn't know what to do with themselves.","They played a board game. They talked.","The game was old. The conversation was new.","Now they look forward to it.","\"Wednesday is my favorite day,\" said their daughter.","For a family in the 21st century, that felt like a small revolution."],["screen-free","phones","board game","conversation","look forward to","revolution","century"],"What do they do during screen-free night?"],
[84,'D',"The Habit Tracker",'M',["Paulo uses a habit tracker on his phone.","Every day, he marks: exercise, water, reading, no junk food.","Some days, he marks all four. He feels good.","Some days, he marks two. He marks them honestly.","He doesn't skip days on the app even when he fails.","\"The data is only useful if it's true,\" he told a friend.","He has 94 days of honest data now.","What he learned: he's better on days that start with exercise."],["habit tracker","marks","junk food","honestly","fails","data","useful"],"What has Paulo learned from his habit tracker data?"],
[85,'D',"Meditation Morning",'M',["She started meditating because she couldn't sleep.","Ten minutes, every morning, before anything else.","At first, she thought it wasn't working.","She still had anxious thoughts. She still worried.","But slowly — over weeks — she noticed something.","The thoughts came. But they passed faster.","She wasn't controlling her mind. She was watching it.","That turned out to be enough."],["meditating","anxious","thoughts","noticed","passed","controlling","watching"],"What change did she notice after weeks of meditating?"],
[86,'D',"The Walk",'I',["After lunch, he walks for twenty minutes.","He doesn't listen to anything. No headphones.","He just walks and looks.","A pigeon. A yellow flower in a crack. An old man reading.","His mind wanders. He lets it.","By the time he gets back to his desk, something has cleared.","He doesn't know what exactly. But something."],["lunch","headphones","pigeon","flower","wanders","cleared","exactly"],"What is special about the way he takes his walk?"],
[87,'D',"Laundry Day",'I',["Nobody likes laundry day.","But it has to happen.","Rosa does it on Thursday evenings.","She puts everything in. She waits.","She folds while watching a show.","It's not exciting. But by the end, everything is clean.","There's something quietly satisfying about an empty laundry basket."],["laundry","folds","watching","exciting","clean","satisfying","basket"],"When does Rosa do her laundry?"],
[88,'D',"Grocery Shopping Day",'I',["He does his grocery shopping on Monday mornings.","The store is quiet at that hour. Almost nobody there.","He walks the aisles slowly. He reads labels.","He compares prices without feeling rushed.","By 9am, he's back home with everything he needs for the week.","Monday grocery shopping is a small luxury.","He discovered it by accident. He kept it on purpose."],["grocery","quiet","aisles","labels","rushed","luxury","discovered"],"Why does he prefer Monday mornings for shopping?"],
[89,'D',"The Weekend Plan",'I',["On Friday evening, Leo makes a plan for the weekend.","He writes it in his notebook.","This weekend: gym Saturday morning, call his parents, finish reading his book.","He doesn't always finish everything on the list.","But he usually does two out of three.","That's not failure. That's realistic.","The list is less about control and more about intention."],["notebook","gym","finish","realistic","failure","control","intention"],"What does Leo do every Friday evening?"],
[90,'D',"Digital Detox",'M',["She put her phone in a drawer for the weekend.","All of it: no social media, no news, no email.","The first hours were uncomfortable. She kept reaching for a phone that wasn't there.","By Saturday afternoon, the urge had weakened.","She read a whole book. She baked something.","On Sunday night, she got her phone back.","Forty-seven notifications. Nothing urgent.","She felt both better and worse knowing that."],["drawer","social media","uncomfortable","urge","weakened","notifications","urgent"],"How did she feel during the first hours of the digital detox?"],
[91,'D',"Early Riser",'M',["He started waking up at 5:30am six months ago.","Not because he had to. Because he wanted that quiet hour.","Before emails. Before obligations. Before the world woke up.","He makes coffee. He reads. Sometimes he just sits.","By 7am, he's been awake for ninety minutes.","Those ninety minutes are the best part of his day.","\"It's not that I sleep less,\" he explains.","\"It's that I moved the important part of my day earlier.\""],["waking up","obligations","quiet hour","moved","important","explains","awake"],"Why does he wake up early?"],
[92,'D',"The Night Owl",'M',["She's been a night owl her whole life.","She can't fall asleep before midnight. Her brain won't allow it.","She's tried everything. Earlier dinner. No screens. Warm milk.","She finally stopped fighting it.","From 11pm to 1am, she is at her most creative.","She writes. She plans. She solves problems.","She just needs two hours of quiet darkness to herself.","Society says mornings are better. Her results say otherwise."],["night owl","midnight","screens","creative","fighting","results","darkness"],"What happens when she stops fighting her sleep schedule?"],
[93,'D',"Meal at Desk",'I',["Lunch at the desk again.","It's the third time this week.","He tells himself it's just this week. He said that last week too.","He eats a sandwich without tasting it.","His screen glows. His inbox fills.","Thirty minutes later, he can't remember what he ate.","Somewhere, someone is sitting outside, eating slowly.","He doesn't envy them. He knows he should."],["desk","sandwich","glows","inbox","envy","slowly","screen"],"What does he notice about how he eats his lunch?"],
[94,'D',"The Dentist Appointment",'I',["She hadn't been to the dentist in three years.","She knew she should go. She kept not going.","Today, she finally made the appointment.","The dentist was kind. The cavity was small.","\"If you'd waited another year, it would be much worse,\" the dentist said.","She nodded, embarrassed.","On the way home, she booked her next appointment.","Six months. Before she could change her mind."],["dentist","appointment","cavity","waited","nodded","embarrassed","booked"],"What does she do immediately after leaving the dentist?"],
[95,'D',"Cleaning Day",'I',["Saturday morning: cleaning day.","He puts on music and starts.","Kitchen first. Then bathroom. Then floors.","Two hours later, the apartment is clean.","He makes coffee and sits in the clean living room.","The sun is coming in. It looks different when things are tidy.","Cleaning is annoying before. Satisfying after.","He never enjoys the process. He always enjoys the result."],["cleaning","bathroom","floors","apartment","tidy","satisfying","result"],"How does he feel about cleaning?"],
[96,'D',"Podcast Walk",'M',["She listens to podcasts while she walks.","It's how she stays informed. It's also how she exercises.","Two problems, one solution.","She walks forty minutes every day.","In a year, that's almost 250 hours of content.","She's learned about science, history, psychology, cooking.","Her favorite podcast is about people who changed their minds.","\"Changing your mind is a skill,\" the host says.","She agrees. She's still practicing."],["podcasts","informed","exercises","solution","content","psychology","changing"],"What is her favorite podcast about?"],
[97,'D',"The Budget Review",'A',["On the last day of each month, he reviews his finances.","He looks at every expense. Categories, trends, surprises.","This month: two unexpected vet bills. One forgotten subscription.","The subscription had been running for nine months unnoticed.","\"Twelve dollars a month doesn't feel like anything,\" he thought.","\"Until it's been a year and it's a hundred and forty-four dollars.\"","He cancelled it. He booked the vet for a checkup.","Monthly reviews feel like small maintenance. They prevent large repairs."],["finances","expense","categories","subscription","unnoticed","cancelled","maintenance"],"What does he discover during his monthly review?"],
[98,'D',"No-Phone Morning",'A',["He decided to stop looking at his phone until 9am.","Not a rule — an experiment.","The first morning, he reached for it at 6:58 and caught himself.","By the second week, he had stopped reaching.","Without the phone, mornings felt longer. In the good way.","He noticed things: the quality of the light, the sound of the neighborhood.","He was bored sometimes. He sat with the boredom.","By 9am, he was ready for the world in a way he hadn't been before.","\"I didn't know I was bracing for it every morning,\" he said."],["experiment","caught himself","reached for","quality","neighborhood","boredom","bracing"],"What does he notice about his mornings without the phone?"],
[99,'D',"The Productivity System",'A',["She had tried every productivity system.","The four-hour workweek. The one-minute rule. Time-blocking. Pomodoro.","Each one worked. For a while.","The problem wasn't the system. The problem was her belief that a perfect system existed.","Eventually she made her own: three priorities, a short list, no guilt.","It wasn't elegant. It didn't have a name.","But it fit her actual life, not a version of her life she imagined.","She got things done. That was the only metric that mattered."],["productivity","time-blocking","Pomodoro","priorities","elegant","metric","imagined"],"What was the real problem with her previous productivity systems?"],
[100,'D',"One Year of Habits",'A',["He kept a journal for the whole year.","He wrote in it every morning. One page. Always.","By December, he had 365 pages.","He read them over the holidays.","He was surprised: not by how much had changed, but by how gradually.","There was no dramatic turning point. No single day that made the difference.","Just small choices, compounded.","He closed the journal. He started a new one.","\"Who will I be in another year?\" he wrote on the first page."],["journal","gradually","dramatic","turning point","compounded","choices","December"],"What surprised him when he re-read his journal?"],
// ═══ BLOCO E — EMOÇÕES E SITUAÇÕES (101–150) ═════════════════════════════
[101,'E',"The Good News",'I',["Carla gets a message. She reads it twice.","She got the job. The one she really wanted.","She stares at the screen. She can't believe it.","Then she screams. Then she laughs.","She calls her mom. Her mom cries.","\"I'm so proud of you,\" her mom says.","Carla cries too. Happy tears."],["message","got","stares","screams","cries","proud","tears"],"How does Carla feel when she gets the message?"],
[102,'E',"The Bad Day",'I',["Everything went wrong today.","First, it rained and Ricardo forgot his umbrella.","Then he spilled coffee on his shirt.","In the meeting, he forgot his presentation.","He missed lunch because of a call.","He got home late, wet and hungry.","He sat on the sofa and sighed.","Then his dog came and sat on his lap. And he felt better."],["forgot","spilled","missed","wet","hungry","sighed","lap","better"],"What makes Ricardo feel better in the end?"],
[103,'E',"The Apology",'M',["They hadn't spoken in three days.","It started with a small argument that got bigger.","Both thought the other should apologize first.","On the third day, he knocked on the bedroom door.","\"Can we talk?\" he asked.","She opened it. \"I was going to knock first,\" she said.","They both laughed. The tension broke.","They talked for an hour. They went to bed holding hands.","Some problems aren't solved — they're softened by love."],["spoken","argument","apologize","knocked","tension","broke","softened"],"Who apologizes first?"],
[104,'E',"Starting Over",'A',["At 42, Fernanda decided to go back to university.","Everyone thought she was crazy. She thought so too, sometimes.","She sat in classrooms full of 20-year-olds, her notebook open.","In the beginning, she felt out of place. Invisible. Old.","But she raised her hand one day. She answered correctly.","The professor nodded. A student next to her smiled.","\"Good answer,\" the student said.","That was the day she stopped feeling like she didn't belong.","Two years later, she graduated. Her daughter cheered from the crowd."],["decided","classrooms","invisible","raised","correctly","belong","graduated","cheered"],"What moment made Fernanda feel like she belonged?"],
[105,'E',"The Last Day",'A',["It was her last day at the company. Fifteen years.","She had packed her desk into two cardboard boxes.","A plant. Some photos. A mug that said \"Boss.\"","Her team gathered around her desk at 5pm.","They gave her a card signed by everyone. And a gift.","She opened it: a journal with a note inside.","\"For the next chapter,\" it said.","She cried a little. Then laughed. Then hugged everyone.","Walking out for the last time, she didn't look back.","The next chapter was already waiting."],["packed","cardboard","gathered","signed","journal","chapter","hugged","waiting"],"What does the note in the gift say?"],
[106,'E',"The Rejection",'M',["He applied for the scholarship three times.","The first rejection was devastating.","The second, he expected.","The third, he almost didn't apply.","But he did. And this time, the answer was different.","He read the email standing in the kitchen.","He had to read it again to believe it.","Sometimes persistence looks like stubbornness, until it doesn't."],["applied","scholarship","rejection","devastating","expected","persistence","stubbornness"],"How many times did he apply for the scholarship?"],
[107,'E',"Second Chance",'M',["They broke up two years ago. It wasn't pretty.","She moved cities. He changed jobs.","They ran into each other at a bookstore, of all places.","\"Coffee?\" he said.","She said yes without thinking.","They talked for three hours.","Some things had changed. Some things hadn't.","At the end, he asked for her number again.","This time, she gave it."],["broke up","moved","ran into","bookstore","thinking","changed","number"],"Where do they meet again?"],
[108,'E',"The Unexpected Gift",'I',["It wasn't her birthday. There was no occasion.","He just left a book on the kitchen table with a sticky note.","\"Thought of you when I saw this.\"","She picked it up. It was exactly the kind of book she loves.","She stood in the kitchen for a moment.","Then she went to find him.","\"Thank you,\" she said. And meant it in a big way.","The best gifts aren't for occasions."],["occasion","sticky note","thought of","exactly","moment","meant","gifts"],"What made the gift special?"],
[109,'E',"Impostor Syndrome",'A',["She had just been named head of the department.","Everyone congratulated her. She smiled and thanked them.","Inside: 'They'll figure out I don't know what I'm doing.'","She had thought this before — when she got her last promotion.","And the one before that.","Each time, she did know what she was doing.","She was just always the last to realize it.","At some point, she thought, the evidence would outweigh the doubt.","She was still waiting for that point."],["named","department","congratulated","impostor","promotion","evidence","outweigh","doubt"],"What does she fear every time she gets promoted?"],
[110,'E',"The Compliment",'I',["A stranger stopped her on the street.","\"Excuse me — I love your jacket.\"","\"Thank you,\" she said, surprised.","She had almost not worn it today.","She had stood in front of the mirror for five minutes, unsure.","Now she was glad she'd put it on.","One sentence from a stranger can change the tone of a whole day."],["stranger","jacket","surprised","mirror","unsure","tone","whole day"],"How did the compliment affect her day?"],
[111,'E',"First Love",'M',["He was sixteen. She sat two rows in front of him in chemistry class.","He spent three months trying to work up the courage.","He finally asked if she wanted to study together.","She said yes. They studied. They also talked for four hours.","They dated for eight months. Then went separate ways.","He's 34 now. He still thinks of it sometimes.","Not with sadness. With something gentler.","First love doesn't have to last to matter."],["chemistry","courage","separate ways","dated","matter","gentler","sadness"],"How long did they date?"],
[112,'E',"The Breakup",'M',["It wasn't dramatic. That made it harder somehow.","They sat at the kitchen table. Both knew.","\"I think we both know this isn't working,\" he said.","She nodded. \"I know.\"","They divided things calmly. Who keeps the plants. The streaming accounts.","They hugged at the door. It was a long hug.","Outside, she walked to the corner and stopped.","She didn't cry right away. The crying came later, all at once."],["dramatic","divided","streaming","accounts","hugged","corner","crying"],"What did they do after the conversation?"],
[113,'E',"Grief",'A',["People say it comes in waves. They're right.","Some days you're fine and then a song plays.","Or a smell. Or a day of the week.","She had been doing well. Seven weeks. Then: a voicemail she hadn't deleted.","His voice. Twenty seconds.","She sat on the bathroom floor for thirty minutes.","Then she got up, washed her face, and made coffee.","Grief doesn't end. It changes shape. You learn to carry the new shape."],["grief","waves","voicemail","deleted","shape","carry","bathroom"],"How does the text describe grief?"],
[114,'E',"Gratitude Journal",'M',["Every night, before sleeping, Beatriz writes three things.","Things she's grateful for that day.","Some days it's big: good news, a breakthrough, a kind gesture.","Some days it's small: good coffee, no traffic, a funny video.","The small ones matter too, she thinks.","Maybe more.","You can't wait for big days to be grateful.","There are more Tuesdays than Christmases."],["grateful","breakthrough","gesture","traffic","Tuesdays","Christmases","matter"],"What does Beatriz write in her journal every night?"],
[115,'E',"The Panic Attack",'A',["It happened in the middle of the supermarket.","Her heart raced. The aisle felt too narrow. The lights too bright.","She left her cart and walked outside.","She sat on a bench and focused on five things she could see.","A tree. A parking sign. A woman with a red bag. A cloud. Her own hands.","Slowly, her breathing returned to normal.","She went back inside. She finished the shopping.","That was the bravest thing she did all week.","Not the big things. The going back in."],["panic attack","raced","aisle","focused","breathing","normal","bravest"],"What technique does she use to calm down?"],
[116,'E',"Finding Calm",'M',["He used to be angry at traffic. At queues. At slow internet.","He noticed this about himself at 30 and didn't like it.","He started practicing one thing: waiting without frustration.","At the queue: observe. At the traffic: listen to something.","At slow internet: breathe. Look at something real.","One year later, he still got annoyed. But less. And less.","Calm isn't a state you arrive at. It's something you practice."],["angry","traffic","queues","frustration","observe","practicing","arrive"],"What does he practice when he is waiting?"],
[117,'E',"The Reunion",'M',["They hadn't seen each other in twelve years.","Same restaurant. Different faces.","The first five minutes were awkward. What do you say after twelve years?","Then she laughed at something. The old laugh.","And suddenly it wasn't twelve years. It was just two friends catching up.","They talked for four hours. About everything and nothing.","At the end: \"We should do this more often.\"","\"Yes,\" they both said. And this time, they meant it."],["reunion","awkward","catching up","suddenly","faces","talked","meant it"],"What broke the awkwardness at the beginning?"],
[118,'E',"New City, New Life",'A',["He moved to a new city at 28, knowing no one.","The first month was lonelier than he'd expected.","He joined a running club. Not because he liked running.","Because he needed somewhere to be on Saturday mornings.","He met people there. Not instantly — slowly.","After six months, he had four people he could call a friend.","That was enough. More than enough.","\"Home,\" he realized, \"isn't where you start. It's what you build.\""],["moved","lonelier","running club","instantly","slowly","realized","build"],"Why did he join the running club?"],
[119,'E',"The Fear of Failure",'A',["She had a plan. She had a backup plan. She had a backup for the backup.","She called it preparation. Sometimes it was. Sometimes it was fear.","The project was due. She kept revising.","\"Not ready,\" she told herself.","But at some point, she sent it.","It wasn't perfect. It never would be.","The feedback came back: mostly good. A few things to fix.","The fear of failure is louder than the failure itself.","Sending imperfect work is often braver than waiting for perfect."],["backup","preparation","revising","feedback","imperfect","braver","louder"],"What does the story say about the fear of failure?"],
[120,'E',"Joy in Small Things",'I',["Today, good things happened.","The coffee was exactly right. Not too hot. Not too bitter.","On the street, a stranger held the door open and smiled.","The sun was at the right angle for twenty minutes.","A song she forgot she loved came on.","Her cat sat in her lap for an hour without moving.","Some days don't have big victories.","But they have enough small ones, if you notice."],["coffee","bitter","stranger","angle","lap","victories","notice"],"What does the story say about small joys?"],
[121,'E',"The Waiting Room",'M',["Waiting rooms are their own kind of world.","Everyone is here for something. Nobody says what.","Magazines from two years ago. A TV no one watches.","He's been here for forty minutes.","He watches the others: the nervous woman, the bored teenager, the old man reading.","He wonders what their reasons are.","His name is called.","He stands. Takes a breath. Goes in.","Whatever it is, he's ready."],["waiting room","magazines","nervous","teenager","wonders","reasons","called"],"What does he do while he waits?"],
[122,'E',"Therapy Session",'A',["\"What's been on your mind this week?\" she asked.","He had prepared an answer on the way there.","Inside the room, he forgot it.","Instead, something else came out — something he hadn't planned to say.","That's often how it works.","The thing you came in to talk about isn't always the thing that needs talking.","He left an hour later, surprised by what had surfaced.","Not fixed. But less buried."],["prepared","surfaced","buried","instead","planned","inside","surprised"],"What surprised him about the therapy session?"],
[123,'E',"The Old Friend",'M',["They hadn't talked in two years. Life, mostly.","She sent a message on a Tuesday: \"Thinking of you.\"","He replied within minutes: \"Feeling it.\"","They video-called that night for two hours.","Some friendships are low-maintenance by agreement.","You can pause them for years and press play and the connection is still there.","That's the kind of friendship worth keeping.","Those don't need daily watering.","They just need you to show up when you remember."],["low-maintenance","agreement","pause","connection","daily","watering","show up"],"What kind of friendship does the story describe?"],
[124,'E',"Letting Go",'A',["She had been angry at him for two years.","She rehearsed arguments in the shower. She had imagined conversations.","One afternoon, she realized the anger was taking more energy than the original hurt.","She didn't forgive him because he deserved it.","She forgave him because she was tired of carrying it.","Forgiveness isn't always for the other person.","Sometimes it's just setting down something heavy.","She felt lighter. Not immediately. But over the following weeks."],["angry","rehearsed","imagined","original hurt","deserved","lighter","forgiveness"],"Why does she decide to forgive him?"],
[125,'E',"The Dream",'I',["Last night she dreamed she was flying.","Not in a plane. Just flying.","Over her city. Over the buildings and the trees.","It felt real. Very real.","She woke up slowly, not wanting to stop flying.","For a few seconds, she forgot she was in bed.","Then the alarm rang. The day started.","She smiled anyway. Sometimes dreams leave something behind."],["dreamed","flying","buildings","slowly","stopped","alarm","behind"],"How did she feel when she woke up?"],
[126,'E',"Nostalgia",'M',["He found an old playlist from ten years ago.","He pressed play without thinking.","The first song hit him immediately. He had to sit down.","Not with sadness. With something more complicated.","The music reminded him of who he was at 22.","The city he lived in. The people. The specific energy of that time.","He listened to the whole thing.","Nostalgia is a strange feeling: you miss something you can't return to.","But the missing proves it was real."],["playlist","hit him","sadness","complicated","reminded","nostalgia","missing"],"What feeling does nostalgia give him?"],
[127,'E',"The Anniversary",'I',["Today is their tenth anniversary.","They go to the same restaurant where they had their first date.","The menu has changed. The waiter is new.","But the corner table is the same.","They order the same things they ordered ten years ago.","\"Do you remember what we talked about?\" she asks.","\"Everything,\" he says.","He doesn't remember. She knows.","She smiles anyway. Some things don't need to be accurate to be true."],["anniversary","restaurant","waiter","corner","ordered","accurate","remember"],"What do they order at the restaurant?"],
[128,'E',"Moving Forward",'A',["He stayed in the same job for six years after it stopped being right.","Security, he told himself. Stability.","But security isn't a feeling — it's a story you tell yourself.","One day, he updated his resume. Just to see.","He sent it to two places. One called back.","The interview felt easy in a way his current job never had.","He accepted the offer. He was terrified.","That terror, he recognized, was how it felt to move toward something real.","He had spent years moving away from discomfort. This time, toward possibility."],["security","stability","resume","terrified","recognized","discomfort","possibility"],"Why did he stay in his job for so long after it stopped being right?"],
[129,'E',"The Stranger's Kindness",'I',["She was lost. Her phone had died.","She stopped a man on the street. \"Excuse me — I need to get to the museum.\"","He looked at her. Then at the street. \"I'm going that way. I'll walk with you.\"","Ten minutes. He showed her the way and said goodbye.","She never learned his name.","But she thought about him for the rest of the day.","One act of kindness from a stranger. Just like that."],["lost","died","museum","alongside","kindness","stranger","thought about"],"How does the man help her?"],
[130,'E',"Feeling Invisible",'A',["There are days when nobody seems to see her.","She talks in meetings. Nobody responds.","She walks into a room. Conversation doesn't stop for her.","She knows it isn't intentional. That doesn't make it easier.","She went home and called her mother.","\"Tell me something I did well,\" she said.","Her mother talked for twenty minutes.","It wasn't a cure. But it was a counterbalance.","Sometimes you need someone to see you when you feel unseen."],["invisible","meetings","responds","intentional","counterbalance","cure","unseen"],"What does she do when she feels invisible?"],
[131,'E',"The Comeback",'A',["She took eighteen months off. Not by choice.","An injury. Then recovery. Then something that looked like depression but wasn't quite.","During that time, she barely left the house.","Then, slowly, she started walking again. Then running a little.","The day she returned to the gym, she almost turned around at the door.","She didn't.","She completed the workout at half the weight she used to lift.","She drove home, parked, and sat in the car for a while.","Not sad. Just absorbing what it meant to come back."],["injury","recovery","depression","barely","returned","absorbing","completed"],"Why did she almost turn around at the gym door?"],
[132,'E',"Homesick",'M',["She'd been away for eight months.","She liked her new city. She was building something there.","But sometimes, for no clear reason, the feeling came.","A specific light in the afternoon. The smell of bread.","She would have paid any amount of money to be home for one hour.","Not forever. Just one hour.","She video-called her mother.","It helped. It always helped.","Not as much as being there. But enough."],["homesick","specific","afternoon","amount","video-called","helped","enough"],"What triggers the homesick feeling?"],
[133,'E',"The Mentor",'A',["He didn't ask to be a mentor. He just started saying yes to coffee.","Young people from his field who wanted to talk.","He listened more than he spoke. He asked questions rather than giving answers.","\"What do you actually want?\" was his favorite.","Because most people hadn't been asked it clearly before.","The question would stop them. Then something honest would come out.","He learned as much from them as they from him.","Mentorship, he decided, isn't a direction. It's a conversation."],["mentor","field","listened","questions","honestly","mentorship","conversation"],"What question does he always ask?"],
[134,'E',"Forgiveness",'A',["He didn't know how to forgive his father. He'd tried.","He'd read about it. Talked to a therapist about it.","The anger stayed, quieter but present.","Then his father got sick. Not seriously. But enough.","He flew home. They sat in the same room for the first time in years.","His father looked smaller than he remembered.","They didn't talk about the old things.","They talked about the weather. About food. About nothing.","It wasn't forgiveness. But it was a beginning.","Sometimes that's what forgiveness looks like at first."],["forgiveness","therapist","quieter","flew home","smaller","beginning","present"],"What happens when he visits his father?"],
[135,'E',"The Last Chapter",'A',["She had been working on the novel for four years.","On a Thursday evening, she typed the last sentence.","She sat very still. She didn't know what she'd expected to feel.","Relief, maybe. Or triumph.","She felt neither. Just a very specific kind of empty.","The story was done. The characters no longer needed her.","She made tea. She sat with the empty feeling.","Then she opened a new document.","She didn't know what it would be yet. That was the point.","The blank page is not an ending. It's the best kind of beginning."],["novel","typed","relief","triumph","empty","characters","blank page"],"How does she feel when she finishes the novel?"],
[136,'E',"Sunday Fear",'M',["It arrives every Sunday around 5pm.","A low-grade anxiety. The week ahead, pressing in.","He recognizes it now. He's had it since school.","The face of Monday.","He used to fight it. Now he works with it.","He makes a plan for Monday morning. A small one.","Just the first thing. The first task.","When Monday arrives, he does that one thing.","The rest follows.","The fear of the week is worse than the week itself."],["anxiety","pressing in","recognizes","Monday","plan","follows","task"],"What does he do now when Sunday fear arrives?"],
[137,'E',"Overcame",'A',["She used to shake before every presentation.","Visibly. People could see it.","She tried breathing exercises. She tried preparation.","What finally worked was doing it again and again.","Not getting better. Just getting more familiar with the feeling.","\"It never completely goes away,\" she tells new speakers now.","\"You just stop being surprised by it.\"","After two hundred presentations, she still shakes a little.","She goes ahead anyway. That's the only thing that changed."],["shake","visibly","preparation","familiar","completely","surprised","presentations"],"What changed after two hundred presentations?"],
[138,'E',"The Kind Word",'I',["He was having a bad week.","On Friday, a colleague stopped him in the hall.","\"Hey — I just wanted to say, your work on that report was really solid.\"","He blinked. \"Oh. Thank you.\"","He thought about it all weekend.","Not in an obsessive way. Just gently.","One sentence. From someone who didn't have to say it.","He decided to start telling people when they did good work.","It cost nothing. It clearly meant something."],["bad week","colleague","solid","blinked","obsessive","gently","meant something"],"What decision does he make because of the compliment?"],
[139,'E',"Starting Over at 30",'A',["She had built the career she was supposed to want.","At 30, she admitted she didn't want it anymore.","This admission took two years.","She retrained in something completely different.","The first year was hard financially. Harder emotionally.","She was the oldest student in most of her classes.","The youngest ones didn't know how lucky they were to be there early.","She didn't resent them. She envied them a little, and wished them well.","By 32, she was doing work that felt like hers.","She had the clarity that only a wrong turn can give you."],["admission","retrained","financially","emotionally","resented","envied","clarity"],"What gave her the clarity to find the right career?"],
[140,'E',"The Unexpected",'M',["He had planned the week carefully. Every hour.","Monday: the project. Tuesday: the meeting. Wednesday: travel.","On Monday morning, the project needed to be completely redone.","The plan didn't survive contact with reality.","He spent Monday in triage mode: what's critical, what can wait.","By evening, the most important things were handled.","The rest: rescheduled.","He updated his list for Tuesday and slept well.","Flexibility isn't the opposite of planning. It's part of it."],["planned","carefully","redone","survive","triage","critical","flexibility"],"What happens to his careful plan?"],
[141,'E',"One More Try",'M',["She had failed the driving test twice.","The third time, she almost didn't go.","\"What's the point?\" she thought.","Her sister drove her there.","She got in the car with the examiner. Her hands were shaking.","She drove anyway.","At the end, the examiner said: \"Congratulations.\"","She couldn't speak for a moment.","Then: \"Really?\"","\"Really,\" he said.","She passed. After two failures. Because she went back."],["failed","examiner","shaking","congratulations","passed","failures","point"],"What almost stopped her from going a third time?"],
[142,'E',"The Long Way Around",'A',["He took the long way to everything.","The wrong school. The wrong job. The wrong city for a few years.","He didn't see these as mistakes exactly.","Each thing taught him something the direct path wouldn't have.","He knew how to talk to people who had failed.","He knew how to start over. He had practice.","When young people asked for advice, he said: \"Don't panic if you're off track.\"","\"Sometimes the long way is the only way you were ever going.\""],["direct path","mistakes","failed","start over","practice","advice","panic"],"What does he say to young people who feel off track?"],

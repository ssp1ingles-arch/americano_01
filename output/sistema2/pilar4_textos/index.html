[143,'E',"Good Enough",'M',["She was a perfectionist. Everyone knew it.","Herself most of all.","She rewrote emails. She redid presentations.","She stayed late to fix things that were already fine.","Then one day, her manager said something quiet: \"You know, good enough usually is.\"","She didn't agree. Not at first.","But over time, she tested it.","She sent the email without the seventh revision.","The world didn't end.","Slowly, she learned that 'good enough' is its own kind of excellence."],["perfectionist","rewrote","presentations","revision","excellence","manager","tested"],"What does her manager say that changes her thinking?"],
[144,'E',"The Turning Point",'A',["He couldn't point to a single moment.","There was no morning when he woke up transformed.","It was more like water and stone.","Years of small decisions. Small refusals. Small choices to try again.","People would ask: \"When did things change for you?\"","He couldn't answer that honestly.","What he could say was: \"I just kept showing up.\"","\"Even on days when I had no idea what I was doing.\"","Looking back, those days were often the most important ones."],["transformed","refusals","honestly","showing up","decisions","stone","important"],"How does he describe his turning point?"],
[145,'E',"Small Victories",'I',["Today, she did four things.","She sent the email she'd been avoiding.","She washed the dishes after every meal.","She called her dentist and made an appointment.","She went to bed at a reasonable hour.","Not a dramatic day. Not a bad one.","Just four things done that needed doing.","That's enough.","That's actually quite a lot, some days."],["avoided","dishes","dentist","appointment","reasonable","dramatic","quite"],"What four things does she do?"],
[146,'E',"The Right Words",'M',["She needed to tell her friend the truth.","Not a mean truth. A kind one. But still hard.","She practiced what to say. Many times.","In the end, she sat down and said: \"I love you, and because I do, I have to tell you something.\"","Her friend listened. Then was quiet for a long time.","Then said: \"I've been waiting for someone to say that.\"","The right words, said with love, tend to land softly."],["truth","kind","practiced","listening","quiet","softly","waiting"],"How does the friend react to the truth?"],
[147,'E',"Quiet Courage",'A',["Not all courage is loud.","Some of it is the phone call you make after weeks of putting it off.","The doctor's appointment you finally book.","The conversation you have even though your voice shakes.","The apology you deliver when you're not sure it'll be received.","She did all of these things this month.","Nobody gave her an award. Nobody saw.","But she knew. And she carried that forward.","Quiet courage is still courage.","Maybe the most important kind."],["courage","putting it off","appointment","shakes","apology","received","carried"],"What examples of quiet courage are mentioned?"],
[148,'E',"Better Days",'M',["There were months when she couldn't see forward.","The days felt like walls. Not like steps.","She didn't know how it would get better.","She just kept doing the next small thing.","One morning, she realized the walls were lower.","She could see over them a little.","That was the turning point, if there was one.","Not a day everything changed.","Just a morning when she could see a little further.","Better days don't arrive. They grow."],["walls","steps","turning point","lower","realized","further","grow"],"How does the story describe better days arriving?"],
[149,'E',"The Choice",'A',["There are moments that divide time into before and after.","She recognized this one when it came.","She could say yes or no. Both were real options. Both had cost.","She stood with the choice for three days.","Talked to no one. Just thought.","On the third day, she called and said yes.","She didn't know if it was right.","You can't know in advance.","What she knew was that she was choosing it.","That mattered. The active choice. Not the drift."],["divide","recognized","options","advance","drift","active","choosing"],"How long does she take to make her decision?"],
[150,'E',"The Beginning",'A',["She stood at the start of the new thing.","Whatever it was.","The job. The city. The relationship. The version of herself she hadn't tried yet.","She felt the familiar mix: excitement and fear, together, indistinguishable.","She had felt this before. She knew what it meant.","It meant she was about to do something real.","The absence of fear is not courage.","It's just comfortable.","She stepped forward anyway.","That's the only beginning there is."],["familiar","excitement","indistinguishable","absence","courage","comfortable","stepped"],"What does the story say about the feeling at the beginning of something new?"]
];
// ── STATE ──────────────────────────────────────────────────────────────────
const LS='p4_read';
let read=new Set(JSON.parse(localStorage.getItem(LS)||'[]'));
let curBlock='A', lvlFilter='all', statusFilter='all', curIdx=0;
function save(){localStorage.setItem(LS,JSON.stringify([...read]));}
const BLOCKS=[
  {k:'A',name:'A — Trabalho',sub:'textos 1–25'},
  {k:'B',name:'B — Compras',sub:'textos 26–50'},
  {k:'C',name:'C — Família',sub:'textos 51–75'},
  {k:'D',name:'D — Rotina',sub:'textos 76–100'},
  {k:'E',name:'E — Emoções',sub:'textos 101–150'}
];
const LVL_MAP={I:'Iniciante',M:'Intermediário',A:'Avançado'};
// ── PARTICLES ─────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('parts');
  [['#64DFDF',7],['#F5C518',5],['#5FD87A',4]].forEach(([col,n])=>{
    for(let i=0;i<n;i++){
      const d=document.createElement('div');d.className='p';
      const sz=2+Math.random()*4,x=Math.random()*100,y=Math.random()*100,dur=8+Math.random()*10,del=Math.random()*8;
      d.style.cssText=`width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;background:${col};animation:fp ${dur}s ${del}s infinite`;
      c.appendChild(d);
    }
  });
})();
// ── TABS ──────────────────────────────────────────────────────────────────
function buildTabs(){
  const el=document.getElementById('btabs');el.innerHTML='';
  BLOCKS.forEach(b=>{
    const btn=document.createElement('button');btn.className='btab'+(b.k===curBlock?' on':'');
    const bTexts=TEXTS.filter(t=>t[1]===b.k);
    const bRead=bTexts.filter(t=>read.has(t[0])).length;
    btn.innerHTML=`<span>${b.name}</span><span class="btab-sub">${bRead}/${bTexts.length} lidos</span>`;
    btn.onclick=()=>{curBlock=b.k;buildTabs();renderGrid();};
    el.appendChild(btn);
  });
}
// ── GRID ──────────────────────────────────────────────────────────────────
function filtered(){
  return TEXTS.filter(t=>{
    if(t[1]!==curBlock)return false;
    if(lvlFilter!=='all'&&t[3]!==lvlFilter)return false;
    if(statusFilter==='read'&&!read.has(t[0]))return false;
    if(statusFilter==='unread'&&read.has(t[0]))return false;
    return true;
  });
}
function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  const items=filtered();
  if(!items.length){g.innerHTML='<div class="empty-msg">Nenhum texto neste filtro.</div>';return;}
  items.forEach(t=>{
    const isRead=read.has(t[0]);
    const card=document.createElement('div');
    card.className='tcard'+(isRead?' read':'');
    card.innerHTML=`
      <div class="tc-top">
        <span class="tc-id">Texto ${String(t[0]).padStart(3,'0')}</span>
        <span class="lvl-badge lvl-${t[3]}">${LVL_MAP[t[3]]}</span>
        <span class="read-dot"></span>
      </div>
      <div class="tc-title">${t[2]}</div>
      <div class="tc-preview">${t[4][0]} ${t[4][1]||''}</div>`;
    card.onclick=()=>openModal(t[0]);
    g.appendChild(card);
  });
  updateNav();
}
// ── MODAL ─────────────────────────────────────────────────────────────────
let openId=0;
function openModal(id){
  openId=id;
  const t=TEXTS.find(x=>x[0]===id);
  document.getElementById('mNum').textContent=`Texto ${String(id).padStart(3,'0')} · Bloco ${t[1]}`;
  document.getElementById('mTitle').textContent=t[2];
  const lb=document.getElementById('mLvl');
  lb.textContent=LVL_MAP[t[3]];lb.className='lvl-badge lvl-'+t[3];
  document.getElementById('mText').innerHTML=t[4].map(s=>`<p>${s}</p>`).join('');
  document.getElementById('mVocab').innerHTML=t[5].map(v=>`<span class="vtag">${v}</span>`).join('');
  document.getElementById('mQ').textContent=t[6];
  const isRead=read.has(id);
  const btn=document.getElementById('btnMark');
  btn.textContent=isRead?'✓ Marcar como não lido':'✓ Marcar como lido';
  btn.className='btn-mark'+(isRead?' unmark':'');
  document.getElementById('overlay').className='overlay open';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('overlay')||e.target.classList.contains('modal-close')){
    document.getElementById('overlay').className='overlay';
  }
}
function toggleRead(){
  if(read.has(openId))read.delete(openId);else read.add(openId);
  save();renderGrid();buildTabs();openModal(openId);
}
function navModal(dir){
  const items=filtered();
  const fi=items.findIndex(t=>t[0]===openId);
  const ni=fi+dir;
  if(ni>=0&&ni<items.length)openModal(items[ni][0]);
}
function updateNav(){
  document.getElementById('navN').textContent=read.size;
}
// ── FILTER EVENTS ──────────────────────────────────────────────────────────
document.querySelectorAll('[data-lf]').forEach(btn=>{
  btn.onclick=function(){
    lvlFilter=this.dataset.lf;
    document.querySelectorAll('[data-lf]').forEach(b=>{b.className='flvl';});
    const cls={all:'flvl on-all',I:'flvl on-i',M:'flvl on-m',A:'flvl on-a'}[lvlFilter];
    this.className=cls;
    renderGrid();
  };
});
document.querySelectorAll('[data-sf]').forEach(btn=>{
  btn.onclick=function(){
    statusFilter=this.dataset.sf;
    document.querySelectorAll('[data-sf]').forEach(b=>{b.style.color='var(--td)';});
    this.style.color='var(--cy)';
    renderGrid();
  };
});
document.addEventListener('keydown',e=>{
  if(document.getElementById('overlay').classList.contains('open')){
    if(e.key==='Escape')closeModal();
    if(e.key==='ArrowRight')navModal(1);
    if(e.key==='ArrowLeft')navModal(-1);
  }
});
// ── INIT ──────────────────────────────────────────────────────────────────
buildTabs();renderGrid();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estruturas Fixas · Sistema 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--vl:#A78BFA;--gn:#5FD87A;--am:#F5C518;--rd:#f87171;--cy:#64DFDF;--co:#FF6B6B;--em:#10B981;--s6:#0EA5E9;--s7:#D946EF;--s8:#F97316;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* GLOBAL NAV */
.gnav{position:fixed;top:0;left:0;right:0;z-index:999;height:48px;background:#080c14;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 1.25rem;gap:.6rem;overflow-x:auto;}
.gnav-logo{font-family:'Space Grotesk',sans-serif;font-size:.88rem;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:.45rem;margin-right:auto;flex-shrink:0;}
.gnav-logo span{opacity:.55;font-size:1rem;}
.gnav-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-decoration:none;padding:.3rem .75rem;border-radius:.4rem;border:1px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0;}
.gnav-s1{color:#64DFDF;border-color:rgba(100,223,223,.35);background:rgba(100,223,223,.08);}
.gnav-s1:hover{background:rgba(100,223,223,.15);}
.gnav-s2{color:#F5C518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.06);}
.gnav-s2:hover{background:rgba(245,197,24,.12);}
.gnav-s3{color:#A78BFA;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08);}
.gnav-s3:hover{background:rgba(167,139,250,.15);}
.gnav-s4{color:#FF6B6B;border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);}
.gnav-s4:hover{background:rgba(255,107,107,.15);}
.gnav-s5{color:#10B981;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.gnav-s5:hover{background:rgba(16,185,129,.18);}
.gnav-s6{color:var(--s6);border-color:rgba(14,165,233,.4);background:rgba(14,165,233,.1);}
.gnav-s6:hover{background:rgba(14,165,233,.18);}
.gnav-s7{color:var(--s7);border-color:rgba(217,70,239,.4);background:rgba(217,70,239,.1);}
.gnav-s7:hover{background:rgba(217,70,239,.18);}
.gnav-s8{color:var(--s8);border-color:rgba(249,115,22,.4);background:rgba(249,115,22,.1);}
.gnav-s8:hover{background:rgba(249,115,22,.18);}
.gnav-s8.active{border-color:var(--s8);background:rgba(249,115,22,.16);box-shadow:0 0 10px rgba(249,115,22,.25);}
.gnav-jornada{background:linear-gradient(135deg,rgba(100,223,223,.12),rgba(245,197,24,.08),rgba(167,139,250,.12));border-color:rgba(255,255,255,.18);color:#fff;}
.gnav-jornada:hover{border-color:rgba(255,255,255,.32);background:linear-gradient(135deg,rgba(100,223,223,.18),rgba(245,197,24,.13),rgba(167,139,250,.18));}

/* LOCAL NAV */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.nav-back{color:var(--s8);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.85;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

/* TOPBAR */
.topbar{position:fixed;top:96px;left:0;right:0;z-index:90;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.7rem 1.1rem;}
.topbar-inner{max-width:980px;margin:0 auto;}
.controls-row{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.55rem;}
.ctrl-group{display:flex;align-items:center;gap:.2rem;background:var(--sf);border:1px solid var(--bd);border-radius:.5rem;padding:.2rem;flex-wrap:wrap;}
.ctrl-btn{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:700;padding:.4rem .75rem;border-radius:.4rem;border:none;background:none;color:var(--td);cursor:pointer;transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:.3rem;}
.ctrl-btn:hover{color:var(--tx);}
.ctrl-btn .dotm{width:7px;height:7px;border-radius:50%;border:1.5px solid currentColor;}
.ctrl-btn.on{background:var(--s8);color:#080c14;}
.ctrl-btn.on .dotm{background:#080c14;border-color:#080c14;}

.progress-row{display:flex;align-items:center;gap:.7rem;}
.progress-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--s8),#fdba74);border-radius:3px;transition:width .4s ease;}
.progress-text{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:700;color:var(--s8);white-space:nowrap;}

/* STRUCTURE STRIP */
.struct-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;max-width:980px;margin:.75rem auto 0;padding:0 1.1rem;}
.struct-tab{background:var(--sf);border:1px solid var(--bd);border-radius:.6rem;padding:.55rem .4rem;cursor:pointer;transition:all .18s;text-align:center;}
.struct-tab:hover{border-color:var(--bdh);}
.struct-tab.on{border-color:var(--s8);background:rgba(249,115,22,.12);box-shadow:0 0 12px rgba(249,115,22,.2);}
.struct-tab-icon{font-size:.95rem;}
.struct-tab-label{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:700;color:var(--tm);line-height:1.3;margin-top:.15rem;}
.struct-tab.on .struct-tab-label{color:var(--s8);}
.struct-tab-check{color:var(--gn);font-size:.62rem;}

.wrap{padding-top:340px;max-width:820px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;}
.hidden{display:none!important;}

/* AUX TABLE */
.tbl-wrap{overflow-x:auto;border-radius:.7rem;border:1px solid var(--bd);}
table.dtbl{width:100%;border-collapse:collapse;font-size:.85rem;min-width:420px;}
table.dtbl th{text-align:left;font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--td);background:var(--bg);padding:.6rem .8rem;border-bottom:1px solid var(--bd);}
table.dtbl td{padding:.65rem .8rem;border-bottom:1px solid var(--bd);vertical-align:top;}
table.dtbl tr:last-child td{border-bottom:none;}
table.dtbl td.en{color:var(--tx);font-weight:600;font-family:'Space Grotesk',sans-serif;}
table.dtbl td.pt{color:var(--td);}

/* STUDY CARD (APRENDER) */
.study-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.1rem;overflow:hidden;}
.study-head{padding:1.1rem 1.4rem .8rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);gap:.5rem;flex-wrap:wrap;}
.study-tag{font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--s8);}
.study-pos{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--td);}
.study-body{padding:1.3rem 1.4rem;}
.formula-box{background:var(--s8);color:#080c14;border-radius:.9rem;padding:1.4rem 1.2rem;text-align:center;margin-bottom:1.1rem;}
.formula-en{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:.01em;margin-bottom:.4rem;word-break:break-word;}
.formula-pt{font-size:.9rem;opacity:.85;font-weight:600;}
.sec{margin-bottom:1.1rem;}
.sec-label{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.5rem;display:flex;align-items:center;gap:.35rem;}
.note-box{background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.2);border-radius:.6rem;padding:.7rem .9rem;font-size:.85rem;color:var(--tm);line-height:1.6;}
.errs-list{display:flex;flex-direction:column;gap:.4rem;}
.err-row{font-size:.85rem;line-height:1.5;}
.err-wrong{color:var(--rd);}
.err-right{color:var(--gn);}
.var-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;}
.var-list li{font-size:.85rem;color:var(--tm);padding-left:1.1rem;position:relative;}
.var-list li::before{content:'→';position:absolute;left:0;color:var(--s8);}

.card-actions{display:flex;gap:.6rem;padding:1rem 1.4rem 1.3rem;border-top:1px solid var(--bd);flex-wrap:wrap;}
.act-btn{flex:1;font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700;padding:.7rem 1rem;border-radius:.55rem;border:1px solid var(--bd);background:none;color:var(--tm);cursor:pointer;transition:all .18s;min-width:110px;}
.act-btn:hover{border-color:var(--bdh);color:var(--tx);}
.act-btn:disabled{opacity:.35;cursor:default;}
.act-btn.learned{border-color:rgba(95,216,122,.5);color:var(--gn);background:rgba(95,216,122,.1);}
.act-btn.next{background:var(--s8);color:#080c14;border:none;}
.act-btn.next:hover{filter:brightness(1.1);}

/* PRATICAR MODE */
.pz-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;padding:1.75rem 1.5rem;}
.pz-tag{font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--s8);text-align:center;margin-bottom:.3rem;}
.pz-formula{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;color:var(--tx);margin-bottom:1.3rem;}
.pz-formula .blank{color:var(--s8);}
.pz-instr{text-align:center;font-size:.82rem;color:var(--tm);margin-bottom:.9rem;}
.pz-verbs{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:1.3rem;}
.pz-verb-btn{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;padding:.55rem .95rem;border-radius:2rem;border:1px solid var(--bd);background:var(--bg);color:var(--tx);cursor:pointer;transition:all .15s;}
.pz-verb-btn:hover{border-color:var(--s8);color:var(--s8);}
.pz-verb-btn.picked{border-color:var(--s8);background:rgba(249,115,22,.14);color:var(--s8);}
.pz-result{min-height:70px;background:var(--bg);border:1px solid var(--bd);border-radius:.9rem;padding:1.1rem 1.2rem;text-align:center;display:flex;align-items:center;justify-content:center;}
.pz-result-txt{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:800;color:var(--gn);}
.pz-result-empty{font-size:.85rem;color:var(--td);}

/* DESAFIO MODE */
.df-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;padding:1.75rem 1.5rem;}
.df-tag{font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--s8);text-align:center;margin-bottom:.3rem;}
.df-sub{text-align:center;font-size:.72rem;color:var(--td);margin-bottom:1.1rem;}
.df-pt-box{background:var(--s8);color:#080c14;border-radius:.9rem;padding:1.2rem 1.25rem;text-align:center;margin-bottom:1.2rem;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;line-height:1.5;}
.df-instr{text-align:center;font-size:.8rem;color:var(--tm);margin-bottom:.6rem;}
.df-input{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:.6rem;padding:.85rem 1rem;color:var(--tx);font-size:16px;font-family:'Inter',sans-serif;outline:none;margin-bottom:1rem;}
.df-input:focus{border-color:rgba(249,115,22,.5);}
.df-reveal-row{text-align:center;margin-bottom:1rem;}
.df-reveal-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.7rem 1.4rem;border-radius:.6rem;border:none;background:var(--s8);color:#080c14;cursor:pointer;}
.df-reveal-btn:hover{filter:brightness(1.1);}
.df-answer-box{border-radius:.9rem;padding:1.1rem 1.2rem;margin-bottom:1rem;background:rgba(95,216,122,.08);border:1px solid rgba(95,216,122,.3);opacity:0;max-height:0;overflow:hidden;transition:all .3s;}
.df-answer-box.show{opacity:1;max-height:200px;}
.df-answer-label{font-size:.6rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--gn);margin-bottom:.35rem;}
.df-answer-txt{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--tx);font-size:1.05rem;}
.df-nav-row{display:flex;gap:.6rem;}

/* QUIZ MODE */
.quiz-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;padding:1.75rem 1.5rem;}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;}
.quiz-score{font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:700;color:var(--s8);}
.timer-toggle{font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:700;padding:.3rem .7rem;border-radius:.4rem;border:1px solid var(--bd);background:none;color:var(--td);cursor:pointer;}
.timer-toggle.on{border-color:var(--am);color:var(--am);background:rgba(245,197,24,.08);}
.timer-track{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:1rem;display:none;}
.timer-track.show{display:block;}
.timer-fill{height:100%;background:var(--am);border-radius:2px;width:100%;}
.quiz-qn{text-align:center;font-size:.68rem;font-weight:700;color:var(--td);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;}
.quiz-prompt-box{background:var(--s8);color:#080c14;border-radius:.9rem;padding:1.2rem 1.25rem;margin-bottom:1.2rem;font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;text-align:center;line-height:1.5;}
.quiz-options{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.1rem;}
.quiz-opt{text-align:left;background:var(--bg);border:1px solid var(--bd);border-radius:.6rem;padding:.8rem .95rem;font-size:.88rem;color:var(--tx);cursor:pointer;transition:all .15s;}
.quiz-opt:hover{border-color:var(--bdh);}
.quiz-opt.correct{border-color:var(--gn);background:rgba(95,216,122,.1);color:var(--gn);}
.quiz-opt.wrong{border-color:var(--rd);background:rgba(248,113,113,.1);color:var(--rd);}
.quiz-opt:disabled{cursor:default;}
.quiz-next-row{text-align:center;}
.quiz-next-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.7rem 1.4rem;border-radius:.6rem;border:none;background:var(--s8);color:#080c14;cursor:pointer;}
.quiz-next-btn:hover{filter:brightness(1.1);}
.quiz-next-btn:disabled{opacity:.4;cursor:default;}
.quiz-result{text-align:center;padding:2rem 1rem;}
.quiz-result-score{font-family:'Space Grotesk',sans-serif;font-size:2.6rem;font-weight:800;color:var(--s8);margin-bottom:.5rem;}
.quiz-result-label{font-size:.85rem;color:var(--tm);margin-bottom:1.5rem;}
.quiz-restart-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.7rem 1.4rem;border-radius:.6rem;border:1px solid var(--bd);background:none;color:var(--tx);cursor:pointer;}
.quiz-restart-btn:hover{border-color:var(--bdh);}

/* MOBILE FLOATING BUTTONS */
.fab{display:none;position:fixed;z-index:200;width:46px;height:46px;border-radius:50%;background:var(--sf);border:1px solid var(--bdh);color:var(--tx);align-items:center;justify-content:center;font-size:1.1rem;text-decoration:none;box-shadow:0 6px 20px rgba(0,0,0,.4);cursor:pointer;}
.fab-back{left:1rem;bottom:1rem;}
.fab-top{right:1rem;bottom:1rem;background:var(--s8);color:#080c14;border:none;}

@media(max-width:900px){
  .wrap{padding-top:360px;}
}
@media(max-width:640px){
  .fab{display:flex;}
  .struct-strip{grid-template-columns:repeat(2,1fr);}
  .wrap{padding-top:420px;}
  .topbar{top:96px;}
}
</style>
</head>

 ],

 ],

// ── DESAFIO: 15 frases dos grupos 1, 2, 3 (estruturas 1-3) ──────────────────────
const DESAFIO = [1,2,3].flatMap(id => {
  const s = STRUCTURES.find(x => x.id === id);
  return s.examples.map(e => ({en: e.en, pt: e.pt, label: s.label}));
});

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function loadProgress() {
  let p;
  try { p = JSON.parse(localStorage.getItem('s8_progress')); } catch(e) { p = null; }
  if (!p || !Array.isArray(p.learned)) p = { learned: new Array(8).fill(false) };
  return p;
}
function saveProgress() { localStorage.setItem('s8_progress', JSON.stringify(progress)); }
let progress = loadProgress();

function toggleLearned(id) {
  progress.learned[id-1] = !progress.learned[id-1];
  saveProgress();
  renderStructStrip();
  updateTopProgress();
}
function updateTopProgress() {
  const n = progress.learned.filter(Boolean).length;
  document.getElementById('progressFill').style.width = (n/8*100) + '%';
  document.getElementById('progressText').textContent = `${n}/8 estruturas aprendidas`;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let structureId = 1;
let mode = 'aprender';
let pzPicked = null;
let dfIdx = 0, dfRevealed = false;
let quizIdx = 0, quizScore = 0, quizAnswers = [], quizAnswered = false, quizTimerEnabled = false, quizTimerInterval = null, quizTimeLeft = 15;

function currentStruct() { return STRUCTURES.find(s => s.id === structureId); }

// ── STRUCTURE STRIP ───────────────────────────────────────────────────────────
function renderStructStrip() {
  const strip = document.getElementById('structStrip');
  strip.innerHTML = STRUCTURES.map(s => `
    <div class="struct-tab ${structureId===s.id?'on':''}" onclick="selectStructure(${s.id})">
      <span class="struct-tab-icon">${s.icon}</span>
      <div class="struct-tab-label">${s.label}${progress.learned[s.id-1]?' <span class="struct-tab-check">✓</span>':''}</div>
    </div>`).join('');
}
function selectStructure(id) {
  structureId = id;
  pzPicked = null;
  renderStructStrip();
  renderAll();
}

// ── MODE SWITCH ───────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  stopQuizTimer();
  document.querySelectorAll('#modeGroup .ctrl-btn').forEach(b => b.classList.toggle('on', b.dataset.mode === m));
  const panelMap = {aprender:'panelAprender',praticar:'panelPraticar',desafio:'panelDesafio',quiz:'panelQuiz'};
  Object.values(panelMap).forEach(p => document.getElementById(p).classList.add('hidden'));
  document.getElementById(panelMap[m]).classList.remove('hidden');
  const dim = (m === 'desafio' || m === 'quiz');
  document.getElementById('structStrip').style.opacity = dim ? '.35' : '1';
  document.getElementById('structStrip').style.pointerEvents = dim ? 'none' : 'auto';
  renderAll();
}
function renderAll() {
  if (mode === 'aprender') renderAprender();
  else if (mode === 'praticar') renderPraticar();
  else if (mode === 'desafio') renderDesafio();
  else if (mode === 'quiz') renderQuiz();
}

// ── MODO APRENDER ──────────────────────────────────────────────────────────────
function renderAprender() {
  const s = currentStruct();
  const learned = progress.learned[s.id-1];
  const idx = STRUCTURES.findIndex(x => x.id === s.id);

  const macNuance = [s.macete, s.nuance].filter(Boolean);
  const noteHTML = macNuance.length ? `<div class="sec">${macNuance.map(n => `<div class="note-box" style="margin-bottom:.5rem;">💡 ${n}</div>`).join('')}</div>` : '';

  const exRows = s.examples.map(e => `<tr><td class="pt">${e.pt}</td><td class="en">${e.en}</td></tr>`).join('');
  const exHTML = `<div class="sec"><div class="sec-label">📖 Exemplos</div><div class="tbl-wrap"><table class="dtbl"><thead><tr><th>Português</th><th>English</th></tr></thead><tbody>${exRows}</tbody></table></div></div>`;

  const verbRows = s.verbs.map(v => `<tr><td class="en">${s.prefix} ${v}${/[.?!]$/.test(v)?'':'.'}</td></tr>`).join('');
  const verbHTML = `<div class="sec"><div class="sec-label">💬 Verbos para Praticar</div><div class="tbl-wrap"><table class="dtbl"><tbody>${verbRows}</tbody></table></div></div>`;

  const errsHTML = s.errors.length ? `<div class="sec"><div class="sec-label">❌ Erros Clássicos</div><div class="errs-list">${s.errors.map(e => `<div class="err-row"><span class="err-wrong">❌ ${e.wrong}</span> → <span class="err-right">✅ ${e.right}</span></div>`).join('')}</div></div>` : '';

  const varHTML = s.variations.length ? `<div class="sec"><div class="sec-label">🔀 Variações Úteis</div><ul class="var-list">${s.variations.map(v => `<li>${v}</li>`).join('')}</ul></div>` : '';

  document.getElementById('panelAprender').innerHTML = `
    <div class="study-card">
      <div class="study-head">
        <span class="study-tag">${s.icon} Estrutura ${String(s.id).padStart(2,'0')} · ${s.label}</span>
        <span class="study-pos">${idx+1}/${STRUCTURES.length}</span>
      </div>
      <div class="study-body">
        <div class="formula-box">
          <div class="formula-en">${s.formula}</div>
          <div class="formula-pt">${s.formulapt}</div>
        </div>
        ${noteHTML}
        ${exHTML}
        ${verbHTML}
        ${errsHTML}
        ${varHTML}
      </div>
      <div class="card-actions">
        <button class="act-btn" onclick="prevStruct()" ${idx===0?'disabled':''}>← Anterior</button>
        <button class="act-btn ${learned?'learned':''}" onclick="toggleLearned(${s.id});renderAprender();">${learned?'✓ Aprendida':'Marcar Aprendida'}</button>
        <button class="act-btn next" onclick="nextStruct()" ${idx===STRUCTURES.length-1?'disabled':''}>Próxima →</button>
      </div>
    </div>`;
}
function prevStruct() { const idx = STRUCTURES.findIndex(x=>x.id===structureId); if (idx>0) selectStructure(STRUCTURES[idx-1].id); }
function nextStruct() { const idx = STRUCTURES.findIndex(x=>x.id===structureId); if (idx<STRUCTURES.length-1) selectStructure(STRUCTURES[idx+1].id); }

// ── MODO PRATICAR ──────────────────────────────────────────────────────────────
function renderPraticar() {
  const s = currentStruct();
  document.getElementById('panelPraticar').innerHTML = `
    <div class="pz-card">
      <div class="pz-tag">Praticar</div>
      <div class="pz-formula">${s.formula}</div>
      <div class="pz-instr">Clique em um verbo para montar a frase completa:</div>
      <div class="pz-verbs" id="pzVerbs">${s.verbs.map(v => `<button class="pz-verb-btn ${pzPicked===v?'picked':''}" onclick="pzPick('${v.replace(/'/g,"\\'")}')">${v}</button>`).join('')}</div>
      <div class="pz-result" id="pzResult">${pzPicked ? `<span class="pz-result-txt">${s.prefix} ${pzPicked}${/[.?!]$/.test(pzPicked)?'':'.'} ✓</span>` : `<span class="pz-result-empty">A frase montada aparece aqui</span>`}</div>
    </div>`;
}
function pzPick(v) {
  pzPicked = v;
  renderPraticar();
}

// ── MODO DESAFIO ───────────────────────────────────────────────────────────────
function renderDesafio() {
  const item = DESAFIO[dfIdx];
  document.getElementById('panelDesafio').innerHTML = `
    <div class="df-card">
      <div class="df-tag">Desafio PT → EN</div>
      <div class="df-sub">${item.label} · Frase ${dfIdx+1}/${DESAFIO.length}</div>
      <div class="df-pt-box">${item.pt}</div>
      <div class="df-instr">Digite a tradução em inglês:</div>
      <input class="df-input" id="dfInput" type="text" placeholder="Type in English..." autocomplete="off">
      <div class="df-reveal-row"><button class="df-reveal-btn" onclick="dfReveal()">👁 Ver Resposta</button></div>
      <div class="df-answer-box ${dfRevealed?'show':''}" id="dfAnswerBox">
        <div class="df-answer-label">Resposta Correta</div>
        <div class="df-answer-txt">${item.en}</div>
      </div>
      <div class="df-nav-row">
        <button class="act-btn" onclick="dfPrev()" ${dfIdx===0?'disabled':''}>← Anterior</button>
        <button class="act-btn next" onclick="dfNext()" ${dfIdx===DESAFIO.length-1?'disabled':''}>Próxima →</button>
      </div>
    </div>`;
}
function dfReveal() { dfRevealed = true; document.getElementById('dfAnswerBox').classList.add('show'); }
function dfPrev() { if (dfIdx>0) { dfIdx--; dfRevealed=false; renderDesafio(); } }
function dfNext() { if (dfIdx<DESAFIO.length-1) { dfIdx++; dfRevealed=false; renderDesafio(); } }

// ── MODO QUIZ ─────────────────────────────────────────────────────────────────
function shuffledOpts(item) {
  const arr = [...item.opts];
  for (let i = arr.length-1; i>0; i--) { const j = Math.floor((item.pt.charCodeAt(0)+i*7)%(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function renderQuiz() {
  if (quizIdx >= QUIZ.length) { renderQuizResult(); return; }
  quizAnswered = false;
  const q = QUIZ[quizIdx];
  const opts = shuffledOpts(q);
  document.getElementById('panelQuiz').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-top">
        <span class="quiz-score">Pontuação: ${quizScore}/${QUIZ.length}</span>
        <button class="timer-toggle ${quizTimerEnabled?'on':''}" onclick="toggleQuizTimer()">⏱ Timer 15s</button>
      </div>
      <div class="timer-track ${quizTimerEnabled?'show':''}" id="timerTrack"><div class="timer-fill" id="timerFill"></div></div>
      <div class="quiz-qn">Questão ${quizIdx+1} de ${QUIZ.length}</div>
      <div class="quiz-prompt-box">${q.pt}</div>
      <div class="quiz-options" id="quizOptions">${opts.map(o => `<button class="quiz-opt" onclick="quizAnswer(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}</div>
      <div class="quiz-next-row"><button class="quiz-next-btn" id="quizNextBtn" onclick="quizNext()" disabled>→ Próxima Questão</button></div>
    </div>`;
  if (quizTimerEnabled) startQuizTimer();
}
function quizAnswer(btn, v) {
  if (quizAnswered) return;
  quizAnswered = true;
  stopQuizTimer();
  const q = QUIZ[quizIdx];
  const correct = (v === q.a);
  if (correct) quizScore++;
  quizAnswers.push({pt:q.pt, correct, given:v, right:q.a});
  document.querySelectorAll('#quizOptions .quiz-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.a) b.classList.add('correct');
    else if (b === btn && !correct) b.classList.add('wrong');
  });
  document.querySelector('.quiz-score').textContent = `Pontuação: ${quizScore}/${QUIZ.length}`;
  document.getElementById('quizNextBtn').disabled = false;
}
function quizNext() { quizIdx++; renderQuiz(); }
function startQuizTimer() {
  quizTimeLeft = 15;
  const fill = document.getElementById('timerFill');
  if (fill) fill.style.width = '100%';
  quizTimerInterval = setInterval(() => {
    quizTimeLeft -= 0.1;
    const pct = Math.max(0, (quizTimeLeft/15)*100);
    if (fill) fill.style.width = pct + '%';
    if (quizTimeLeft <= 0) { stopQuizTimer(); if (!quizAnswered) quizAnswer(null, '__timeout__'); }
  }, 100);
}
function stopQuizTimer() { if (quizTimerInterval) { clearInterval(quizTimerInterval); quizTimerInterval = null; } }
function toggleQuizTimer() { quizTimerEnabled = !quizTimerEnabled; renderQuiz(); }
function renderQuizResult() {
  const pct = Math.round((quizScore/QUIZ.length)*100);
  document.getElementById('panelQuiz').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-result">
        <div class="quiz-result-score">${quizScore}/${QUIZ.length}</div>
        <div class="quiz-result-label">${pct}% de acerto ${pct>=80?'— Excelente! 🎉':pct>=50?'— Bom trabalho, continue praticando.':'— Revise as estruturas e tente de novo.'}</div>
        <button class="quiz-restart-btn" onclick="restartQuiz()">↺ Refazer Quiz</button>
      </div>
    </div>`;
}
function restartQuiz() { quizIdx = 0; quizScore = 0; quizAnswers = []; renderQuiz(); }

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  const params = new URLSearchParams(window.location.search);
  const modoParam = params.get('modo');
  renderStructStrip();
  updateTopProgress();
  if (modoParam && ['aprender','praticar','desafio','quiz'].includes(modoParam)) setMode(modoParam);
  else renderAll();
})();
</script>

body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;}

.gnav{position:fixed;top:0;left:0;right:0;z-index:999;height:48px;background:#080c14;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 1.25rem;gap:1rem;overflow-x:auto;}

.gnav-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-decoration:none;padding:.3rem .85rem;border-radius:.4rem;border:1px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0;}

.gnav-s2{color:#F5C518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.06);}
.gnav-s2:hover{background:rgba(245,197,24,.12);}
.gnav-s3{color:#A78BFA;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08);}
.gnav-s3:hover{background:rgba(167,139,250,.15);}
.gnav-s4{color:var(--co);border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);}
.gnav-s4:hover{background:rgba(255,107,107,.15);}
.gnav-s4.active{border-color:var(--co);background:rgba(255,107,107,.15);box-shadow:0 0 10px rgba(255,107,107,.2);}
.gnav-s5{color:#10B981;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.gnav-s5:hover{background:rgba(16,185,129,.18);}

.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.nav-back{color:var(--co);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.85;}

.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

.nav-right{margin-left:auto;display:flex;align-items:center;gap:.6rem;}

.wrap{padding-top:96px;max-width:820px;margin:0 auto;padding-left:1.25rem;padding-right:1.25rem;padding-bottom:3rem;}

/* PROGRESS */
.progress-bar{padding:1rem 0 .25rem;}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;}

.prog-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--co),#ffa07a);border-radius:3px;transition:width .4s ease;}

/* FLASHCARD MODE */

.fc-count{position:absolute;top:1rem;left:1.25rem;font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:700;color:var(--td);}

.fc-reveal-hint{font-size:.72rem;color:var(--td);opacity:.7;margin-top:.5rem;}
.fc-pt{display:none;margin-top:1.1rem;padding-top:1.1rem;border-top:1px solid var(--bd);width:100%;}
.fc-pt.show{display:block;}
.fc-pt-flag{font-size:1.4rem;margin-bottom:.6rem;}
.fc-pt-text{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:var(--co);margin-bottom:.9rem;}
.fc-context{font-size:.78rem;color:var(--tm);line-height:1.6;}
.fc-context b{color:var(--tx);}

.fc-controls{display:flex;align-items:center;gap:.6rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center;}
.fc-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.6rem 1.1rem;border-radius:.55rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.fc-btn:hover{color:var(--tx);border-color:var(--bdh);}
.fc-btn.primary{background:var(--co);color:#080c14;border:none;}
.fc-btn.primary:hover{background:#ff8787;}
.fc-btn.learned{background:rgba(95,216,122,.12);border-color:rgba(95,216,122,.4);color:var(--gn);}

/* LIST MODE */
.list-toolbar{display:flex;flex-wrap:wrap;gap:.5rem;padding:1rem 0;}
.theme-btn{font-family:'Space Grotesk',sans-serif;font-size:.7rem;font-weight:700;padding:.32rem .8rem;border-radius:.4rem;border:1px solid var(--bd);background:var(--sf);color:var(--td);cursor:pointer;transition:all .18s;}
.theme-btn:hover{color:var(--tx);}

.list-grid{display:flex;flex-direction:column;gap:.55rem;}

.list-theme{font-size:.6rem;font-weight:700;color:var(--td);background:var(--bg);border:1px solid var(--bd);border-radius:2rem;padding:.15rem .5rem;flex-shrink:0;white-space:nowrap;}

.hidden{display:none!important;}

@media(max-width:560px){.fc-en{font-size:1.1rem;}.flashcard{padding:1.5rem 1.1rem;}}

{id:45,en:'Which do you like better?',pt:'Qual você prefere?',ctx:'Perguntando uma preferência',cena:'Cena 19 — Festa de Aniversário',theme:'Trabalho em Equipe'},
{id:46,en:'___ it is!',pt:'Decidido: ___!',ctx:'Fechando uma decisão',cena:'Cena 19 — Festa de Aniversário',theme:'Trabalho em Equipe'},
{id:47,en:'How are we ever going to agree?',pt:'Como vamos chegar a um acordo?',ctx:'Expressando frustração numa negociação',cena:'Cena 20 — Planejando o Casamento',theme:'Casamento'},
{id:48,en:'Sounds okay to me.',pt:'Parece bom pra mim.',ctx:'Concordando com uma proposta',cena:'Cena 20 — Planejando o Casamento',theme:'Casamento'},
{id:49,en:'We did it!',pt:'Conseguimos!',ctx:'Comemorando uma conquista',cena:'Cena 20 — Planejando o Casamento',theme:'Casamento'},
{id:50,en:'Everything will be all right.',pt:'Tudo vai ficar bem.',ctx:'Tranquilizando alguém',cena:'Música 01 — Everything Will Be All Right',theme:'Músicas'},
];

const THEMES = ['Todas', ...Array.from(new Set(FRASES.map(f => f.theme)))];

// ── STATE ─────────────────────────────────────────────────────────────────────
let current = 1;
let revealed = false;
let viewMode = 'fc';
let activeTheme = 'Todas';
let learned = new Set(JSON.parse(localStorage.getItem('s4_frases_aprendidas') || '[]'));

// ── FLASHCARD RENDER ──────────────────────────────────────────────────────────
function renderCard() {
  const f = FRASES.find(x => x.id === current);
  document.getElementById('fcCount').textContent = `Frase ${String(f.id).padStart(2,'0')} / 50`;
  document.getElementById('fcEn').textContent = `"${f.en}"`;
  document.getElementById('fcPtText').textContent = f.pt;
  document.getElementById('fcContext').innerHTML = `📍 Contexto: <b>${f.ctx}</b><br>🎬 ${f.cena}`;
  document.getElementById('fcPt').classList.toggle('show', revealed);
  document.getElementById('fcHint').style.display = revealed ? 'none' : 'block';
  document.getElementById('fcLearnedBadge').classList.toggle('show', learned.has(f.id));
  const btn = document.getElementById('learnBtn');
  btn.textContent = learned.has(f.id) ? '✓ Aprendida' : '✓ Aprendi';
  updateProgress();
}

function revealCard() {
  revealed = true;
  renderCard();
}

function goCard(dir) {
  let next = current + dir;
  if (next < 1) next = 1;
  if (next > 50) next = 50;
  current = next;
  revealed = false;
  renderCard();
}

function randomCard() {
  let next;
  do { next = 1 + Math.floor(Math.random() * 50); } while (next === current && 50 > 1);
  current = next;
  revealed = false;
  renderCard();
}

function toggleLearned() {
  const f = FRASES.find(x => x.id === current);
  if (learned.has(f.id)) learned.delete(f.id);
  else learned.add(f.id);
  localStorage.setItem('s4_frases_aprendidas', JSON.stringify([...learned]));
  renderCard();
}

function updateProgress() {
  const n = learned.size;
  document.getElementById('progNum').textContent = `${n} de 50 aprendidas`;
  document.getElementById('progFill').style.width = `${(n/50)*100}%`;
}

// ── LIST MODE ─────────────────────────────────────────────────────────────────
function renderListToolbar() {
  document.getElementById('listToolbar').innerHTML = THEMES.map(t => `
    <button class="theme-btn ${t === activeTheme ? 'on' : ''}" onclick="filterTheme('${t}')">${t}</button>
  `).join('');
}

function renderList() {
  const visible = FRASES.filter(f => activeTheme === 'Todas' || f.theme === activeTheme);
  document.getElementById('listGrid').innerHTML = visible.map(f => `
    <div class="list-item">
      <span class="list-n">${String(f.id).padStart(2,'0')}</span>
      <div class="list-content">
        <div class="list-en">${learned.has(f.id) ? '✓ ' : ''}"${f.en}"</div>
        <div class="list-pt">→ ${f.pt}</div>
      </div>
      <span class="list-theme">${f.theme}</span>
    </div>
  `).join('');
}

function filterTheme(t) {
  activeTheme = t;
  renderListToolbar();
  renderList();
}

// ── MODE SWITCH ───────────────────────────────────────────────────────────────
function setViewMode(m) {
  viewMode = m;
  document.getElementById('fcModeBtn').classList.toggle('on', m === 'fc');
  document.getElementById('listModeBtn').classList.toggle('on', m === 'list');
  document.getElementById('fcArea').classList.toggle('hidden', m !== 'fc');
  document.getElementById('listArea').classList.toggle('hidden', m !== 'list');
  if (m === 'list') { renderListToolbar(); renderList(); }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderCard();
</script>
</body>
</html>

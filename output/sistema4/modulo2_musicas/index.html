body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;}

.gnav-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;text-decoration:none;padding:.3rem .85rem;border-radius:.4rem;border:1px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0;}

.gnav-s2{color:#F5C518;border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.06);}
.gnav-s2:hover{background:rgba(245,197,24,.12);}
.gnav-s3{color:#A78BFA;border-color:rgba(167,139,250,.35);background:rgba(167,139,250,.08);}
.gnav-s3:hover{background:rgba(167,139,250,.15);}
.gnav-s4{color:var(--co);border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08);}
.gnav-s4:hover{background:rgba(255,107,107,.15);}
.gnav-s4.active{border-color:var(--co);background:rgba(255,107,107,.15);box-shadow:0 0 10px rgba(255,107,107,.2);}
.gnav-s5{color:#10B981;border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.1);}
.gnav-s5:hover{background:rgba(16,185,129,.18);}
.gnav-s5.active{border-color:#10B981;background:rgba(16,185,129,.16);box-shadow:0 0 10px rgba(16,185,129,.25);}

.gnav-jornada:hover{border-color:rgba(255,255,255,.32);background:linear-gradient(135deg,rgba(100,223,223,.18),rgba(245,197,24,.13),rgba(167,139,250,.18));}

.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.6rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
.nav-back{color:var(--co);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.85;}

.wrap{padding-top:96px;max-width:820px;margin:0 auto;padding-left:1.25rem;padding-right:1.25rem;padding-bottom:3rem;}

.song-tab{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.4rem .9rem;border-radius:.5rem;border:1px solid var(--bd);background:var(--sf);color:var(--td);cursor:pointer;transition:all .18s;}

.verse{margin-bottom:1.1rem;}
.verse:last-child{margin-bottom:0;}
.lyric-line{margin-bottom:.55rem;}
.lyric-en{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:var(--tx);line-height:1.5;}
.lyric-pt{font-size:.8rem;color:var(--co);line-height:1.5;margin-top:.15rem;display:none;}
.lyric-line.pt-only .lyric-en{display:none;}
.lyric-line.pt-only .lyric-pt{display:block;color:var(--tx);font-weight:600;font-size:1rem;font-family:'Space Grotesk',sans-serif;}
.lyric-line.bilingue .lyric-pt{display:block;}

.section{padding:1.25rem 1.5rem;border-bottom:1px solid var(--bd);}
.section:last-child{border-bottom:none;}
.sec-label{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--td);margin-bottom:.75rem;}
.vocab-list{display:flex;flex-wrap:wrap;gap:.5rem;}
.vocab-chip{background:var(--bg);border:1px solid var(--bd);border-radius:.5rem;padding:.4rem .75rem;font-size:.78rem;}
.vocab-en{font-weight:700;color:var(--tx);}
.vocab-pt{color:var(--co);}

.phrase-item{padding:.55rem 0;border-bottom:1px dashed var(--bd);}
.phrase-item:last-child{border-bottom:none;}
.phrase-en{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;color:var(--tx);}
.phrase-en .n{color:var(--co);margin-right:.4rem;}

let current = 1;
let mode = 'en'; // en | pt | bi

function renderNav() {
  document.getElementById('songNav').innerHTML = SONGS.map(s => `
    <button class="song-tab ${s.id === current ? 'on' : ''}" onclick="selectSong(${s.id})">🎵 Música ${String(s.id).padStart(2,'0')}</button>
  `).join('');
}

function renderSong() {
  const s = SONGS.find(x => x.id === current);
  const versesHTML = s.verses.map(v => `
    <div class="verse">
      ${v.map(l => `
        <div class="lyric-line ${mode === 'pt' ? 'pt-only' : ''} ${mode === 'bi' ? 'bilingue' : ''}">
          <div class="lyric-en">${l.en}</div>
          <div class="lyric-pt">${l.pt}</div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const vocabHTML = s.vocab.map(v => `
    <div class="vocab-chip"><span class="vocab-en">${v.en}</span> = <span class="vocab-pt">${v.pt}</span></div>
  `).join('');

  const phrasesHTML = s.phrases.map((p,i) => `
    <div class="phrase-item">
      <div class="phrase-en"><span class="n">${i+1}.</span>"${p.en}"</div>
      <div class="phrase-pt">→ ${p.pt}</div>
    </div>
  `).join('');

  document.getElementById('songCard').innerHTML = `
    <div class="song-header">
      <div class="song-tag">🎵 Música ${String(s.id).padStart(2,'0')}</div>
      <div class="song-title">"${s.title}"</div>
      <div class="song-meta">Tema: ${s.tema} · Estilo: ${s.estilo}</div>
    </div>
    <div class="mode-bar">
      <button class="mode-btn ${mode==='en'?'on':''}" onclick="setMode('en')">🇺🇸 Inglês</button>
      <button class="mode-btn ${mode==='pt'?'on':''}" onclick="setMode('pt')">🇧🇷 PT</button>
      <button class="mode-btn ${mode==='bi'?'on':''}" onclick="setMode('bi')">🌐 Bilíngue</button>
    </div>
    <div class="lyrics-box">${versesHTML}</div>
    <div class="section">
      <div class="sec-label">Vocabulário da Música</div>
      <div class="vocab-list">${vocabHTML}</div>
    </div>
    <div class="section">
      <div class="sec-label">Frases para Usar no Dia a Dia</div>
      ${phrasesHTML}
    </div>
  `;
  document.getElementById('navCount').textContent = `Música ${current} / 5`;
}

function selectSong(id) {
  current = id;
  renderNav();
  renderSong();
}

function setMode(m) {
  mode = m;
  renderSong();
}

renderNav();
renderSong();
</script>
</body>
</html>

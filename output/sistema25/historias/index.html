<style>

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* LOCAL NAV / BREADCRUMB */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.nav-back{color:var(--s25);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.9;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

.wrap{padding-top:64px;max-width:920px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;}
.hidden{display:none!important;}

/* ===== SELETOR DE HISTÓRIA ===== */
.picker-title{font-family:'Space Grotesk',sans-serif;font-size:.66rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--td);margin:1.2rem 0 .7rem;}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-bottom:1.4rem;}
.picker-btn{position:relative;background:var(--sf);border:1px solid var(--bd);border-radius:.8rem;padding:.8rem .7rem;cursor:pointer;transition:all .18s;text-align:center;font-family:'Space Grotesk',sans-serif;}
.picker-btn:hover{border-color:var(--bdh);}
.picker-btn.on{border-color:var(--s25);background:rgba(30,64,175,.14);box-shadow:0 0 14px rgba(30,64,175,.2);}
.picker-ep{font-size:.62rem;font-weight:800;color:var(--td);letter-spacing:.05em;}
.picker-btn.on .picker-ep{color:var(--s25);}
.picker-emoji{font-size:1.4rem;display:block;margin:.3rem 0;}
.picker-nome{font-size:.72rem;color:var(--tx);font-weight:700;line-height:1.3;}
.picker-check{position:absolute;top:.4rem;right:.5rem;font-size:.72rem;color:var(--gn);}

@media(max-width:720px){ .picker-grid{grid-template-columns:repeat(3,1fr);} }
@media(max-width:480px){ .picker-grid{grid-template-columns:repeat(2,1fr);} }

/* ===== TOOLBAR ===== */
.toolbar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.tool-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.6rem 1.05rem;border-radius:.6rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.tool-btn:hover{border-color:var(--bdh);color:var(--tx);}
.tool-btn.on{border-color:var(--s25);background:rgba(30,64,175,.16);color:var(--s25);}

/* ===== CABEÇALHO DA HISTÓRIA ===== */
.story-head{background:var(--sf);border:1px solid var(--bd);border-radius:1rem;padding:1.3rem 1.5rem;margin-bottom:1.3rem;text-align:center;}
.story-head-ep{font-family:'Space Grotesk',sans-serif;font-size:.64rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--s25);margin-bottom:.5rem;}
.story-head-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:800;line-height:1.35;margin-bottom:.5rem;}
.story-head-pt{font-size:.88rem;color:var(--tm);}

/* ===== NÍVEIS ===== */
.nivel-card{background:var(--sf);border:1px solid var(--bd);border-radius:1rem;padding:1.3rem 1.5rem;margin-bottom:1rem;}
.nivel-badge{display:inline-block;font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--s25d);background:var(--s25l);padding:.25rem .7rem;border-radius:2rem;margin-bottom:.8rem;}

.nivel-texto .blank{display:inline-block;color:var(--td);font-weight:800;border-bottom:2px dashed var(--bdh);padding:0 .15rem;}
.nivel-actions{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:1rem;align-items:center;position:relative;}
.speak-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.45rem .8rem;border-radius:.5rem;border:1px solid var(--bd);background:var(--bg);color:var(--tm);cursor:pointer;transition:all .18s;}

.reveal-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.45rem .8rem;border-radius:.5rem;border:1px solid rgba(30,64,175,.4);background:rgba(30,64,175,.12);color:var(--s25);cursor:pointer;transition:all .18s;}
.reveal-btn:hover{background:rgba(30,64,175,.2);}
.speak-tip{position:absolute;top:calc(100% + 8px);left:0;z-index:20;background:var(--sf2);border:1px solid var(--bdh);border-radius:.7rem;padding:.9rem 1rem;font-size:.78rem;color:var(--tm);min-width:240px;max-width:340px;box-shadow:0 12px 30px rgba(0,0,0,.4);}
.speak-tip-line{color:var(--tx);margin-bottom:.35rem;line-height:1.5;}

.next-level-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.8rem 1.6rem;border-radius:.7rem;border:none;background:var(--s25);color:#fff;cursor:pointer;transition:all .18s;}

.next-level-btn:disabled{opacity:.4;cursor:default;}
.done-badge{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;color:var(--gn);margin-bottom:1.5rem;}

/* ===== VOCAB TABLE ===== */
.vocab-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;color:var(--s25);margin:1.6rem 0 .8rem;}
.table-wrap{overflow-x:auto;background:var(--sf);border:1px solid var(--bd);border-radius:1rem;margin-bottom:1.5rem;}
.v-table{width:100%;min-width:560px;border-collapse:collapse;}
.v-table th{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--td);text-align:left;padding:.85rem 1rem;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15);}
.v-table td{padding:.85rem 1rem;border-bottom:1px solid var(--bd);vertical-align:top;font-size:.85rem;line-height:1.55;}
.v-table tr:last-child td{border-bottom:none;}
.v-table tr:hover td{background:rgba(255,255,255,.02);}
.word-cell{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--s25);min-width:170px;}
.def-cell{color:var(--tx);min-width:150px;}
.ex-cell{color:var(--tm);min-width:220px;font-style:italic;}

.next-story{display:flex;justify-content:center;padding-top:.5rem;}

// ── DIFF: PALAVRAS NOVAS EM RELAÇÃO AO NÍVEL ANTERIOR ─────────────────────────
function tokenize(str) { return str.trim().split(/\s+/); }

function diffWords(prevText, curText) {
  const oldW = prevText ? tokenize(prevText) : [];
  const newW = tokenize(curText);
  const m = oldW.length, n = newW.length;
  const dp = Array.from({length:m+1}, () => new Array(n+1).fill(0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
    dp[i][j] = oldW[i-1]===newW[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  }
  const isNew = new Array(n).fill(true);
  let i=m, j=n;
  while (i>0 && j>0) {
    if (oldW[i-1]===newW[j-1]) { isNew[j-1]=false; i--; j--; }
    else if (dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  return newW.map((w,idx) => ({ word:w, isNew:isNew[idx] }));
}

const STOP_WORDS = new Set(['a','an','the','to','of','in','on','your','her','his','it','out','up','my','and','but','for']);
function normWord(w) {
  w = w.toLowerCase().replace(/[^a-z']/g, '');
  if (w.length > 5 && w.endsWith('ing')) w = w.slice(0, -3);
  else if (w.length > 4 && w.endsWith('ed')) w = w.slice(0, -2);
  else if (w.length > 3 && w.endsWith('s') && !w.endsWith('ss')) w = w.slice(0, -1);
  return w;
}
function contentWords(s) {
  return s.replace(/[(),]/g, '').toLowerCase().split(/\s+/).map(normWord).filter(w => w && !STOP_WORDS.has(w));
}
function bestClauseIn(text, expr) {
  const primary = expr.split('/')[0].split('(')[0].trim().toLowerCase();
  const clauses = text.split(/(?<=[,.])\s+|\s+—\s+/);
  for (const c of clauses) { if (c.toLowerCase().indexOf(primary) !== -1) return { clause: c.trim(), literal: true }; }
  const need = contentWords(primary);
  if (!need.length) return null;
  let best = null, bestScore = 0;
  for (const c of clauses) {
    const cWords = new Set(c.replace(/[.,]/g, '').toLowerCase().split(/\s+/).map(normWord));
    const hits = need.filter(w => cWords.has(w)).length;
    const score = hits / need.length;
    if (score > bestScore) { bestScore = score; best = c; }
  }
  return best && bestScore >= 0.6 ? { clause: best.trim(), literal: false } : null;
}
function getExemplo(story, expr) {
  const niveis = story.niveis;
  const order = [...niveis.keys()].sort((a, b) => niveis[a].length - niveis[b].length);
  for (const idx of order) { const r = bestClauseIn(niveis[idx], expr); if (r && r.literal) return r.clause; }
  for (const idx of order) { const r = bestClauseIn(niveis[idx], expr); if (r) return r.clause; }
  return niveis[9];
}

function chunkForSpeech(text) {
  const parts = text.replace(/—/g, ',').split(',').map(s => s.trim()).filter(Boolean);
  const out = [];
  parts.forEach(p => {
    if (p.split(/\s+/).length > 11) {
      const pieces = p.split(/\s+(and|but)\s+/);
      let buf = '';
      pieces.forEach(piece => {
        if (piece === 'and' || piece === 'but') { if (buf) out.push(buf.trim()); buf = piece + ' '; }
        else buf += piece;
      });
      if (buf) out.push(buf.trim());
    } else out.push(p);
  });
  return out;
}

// ── STATE ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 's25_historias_progresso';
let state = {
  historiaAtual: STORIES[0].id,
  niveis: {},
  completadas: [],
  modoTreino: false,
  mostrarTodos: false,
  revelados: {}
};

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) Object.assign(state, JSON.parse(raw)); } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getStory(id) { return STORIES.find(s => s.id === id); }
function nivelAtual(id) { return state.niveis[id] || 3; }

// ── PICKER ─────────────────────────────────────────────────────────────────────
function renderPicker() {
  document.getElementById('pickerGrid').innerHTML = STORIES.map(s => `
    <div class="picker-btn ${s.id===state.historiaAtual?'on':''}" onclick="selectStory('${s.id}')">
      ${state.completadas.includes(s.id) ? '<span class="picker-check">✓</span>' : ''}
      <div class="picker-ep">EP${s.ep}</div>
      <span class="picker-emoji">${s.emoji}</span>
      <div class="picker-nome">${s.curto}</div>
    </div>
  `).join('');
}

function selectStory(id) {
  state.historiaAtual = id;
  saveState();
  renderAll();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── TOOLBAR ────────────────────────────────────────────────────────────────────
function toggleTreino() {
  state.modoTreino = !state.modoTreino;
  saveState();
  renderAll();
}
function toggleTodos() {
  state.mostrarTodos = !state.mostrarTodos;
  saveState();
  renderAll();
}

// ── STORY DISPLAY ──────────────────────────────────────────────────────────────
let openTip = null;

function toggleSpeakTip(levelIdx) {
  const el = document.getElementById('tip-' + levelIdx);
  if (!el) return;
  const willOpen = el.classList.contains('hidden');
  document.querySelectorAll('.speak-tip').forEach(t => t.classList.add('hidden'));
  if (willOpen) el.classList.remove('hidden');
}

function toggleReveal(id, levelIdx) {
  if (!state.revelados[id]) state.revelados[id] = {};
  state.revelados[id][levelIdx] = !state.revelados[id][levelIdx];
  saveState();
  renderStory();
}

function renderLevelText(story, levelIdx, id) {
  const cur = story.niveis[levelIdx];
  if (levelIdx === 0) return cur;
  const prev = story.niveis[levelIdx-1];
  const tokens = diffWords(prev, cur);
  const revelado = state.revelados[id] && state.revelados[id][levelIdx];
  return tokens.map(t => {
    if (!t.isNew) return t.word;
    if (state.modoTreino && !revelado) return '<span class="blank">[___]</span>';
    return `<span class="nova">${t.word}</span>`;
  }).join(' ');
}

function renderStory() {
  const id = state.historiaAtual;
  const story = getStory(id);
  const maxNivel = state.mostrarTodos ? 10 : nivelAtual(id);

  document.getElementById('treinoBtn').classList.toggle('on', state.modoTreino);
  document.getElementById('todosBtn').classList.toggle('on', state.mostrarTodos);
  document.getElementById('todosBtn').textContent = state.mostrarTodos ? 'Modo progressivo' : 'Mostrar todos os 10 níveis';

  let html = `
    <div class="story-head">
      <div class="story-head-ep">Episódio ${story.ep}</div>
      <div class="story-head-title">${story.niveis[0]}</div>
      <div class="story-head-pt">${story.traducao}</div>
    </div>
  `;

  for (let lvl = 1; lvl <= maxNivel; lvl++) {
    const idx = lvl - 1;
    const revelado = state.revelados[id] && state.revelados[id][idx];
    html += `
      <div class="nivel-card">
        <span class="nivel-badge">NÍVEL ${lvl}</span>
        <div class="nivel-texto">${renderLevelText(story, idx, id)}</div>
        <div class="nivel-actions">
          <button class="speak-btn" onclick="toggleSpeakTip(${idx})">🔊 Repetir em voz alta</button>
          ${(state.modoTreino && lvl > 1 && !revelado) ? `<button class="reveal-btn" onclick="toggleReveal('${id}', ${idx})">👁️ Revelar</button>` : ''}
          <div class="speak-tip hidden" id="tip-${idx}">
            ${chunkForSpeech(story.niveis[idx]).map(c => `<div class="speak-tip-line">→ <b>${c}</b></div>`).join('')}
            <div class="speak-tip-note">Fale cada grupo de uma vez, com uma pequena pausa entre eles — depois junte tudo em um único fôlego.</div>
          </div>
        </div>
      </div>
    `;
  }

  html += `<div class="level-nav">`;
  if (state.mostrarTodos) {
    html += `<div class="done-badge">🎉 Frase completa nos 10 níveis!</div>`;
  } else if (maxNivel < 10) {
    html += `<button class="next-level-btn" onclick="nextLevel()">Ver próximo nível →</button>`;
  } else {
    html += `<div class="done-badge">🎉 Frase completa! Você chegou ao nível 10.</div>`;
  }
  html += `</div>`;

  html += `<div class="vocab-title">📘 Vocabulário desta história</div>`;
  html += `
    <div class="table-wrap">
      <table class="v-table">
        <thead><tr><th>Expressão</th><th>Definição</th><th>Exemplo na história</th></tr></thead>
        <tbody>
          ${story.vocab.map(v => `
            <tr>
              <td class="word-cell">${v.expr}</td>
              <td class="def-cell">${v.pt}</td>
              <td class="ex-cell">"${getExemplo(story, v.expr)}"</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  const curIdxStory = STORIES.findIndex(s => s.id === id);
  const nextStory = STORIES[(curIdxStory + 1) % STORIES.length];
  html += `
    <div class="next-story">
      <button class="next-story-btn" onclick="selectStory('${nextStory.id}')">Próxima história: ${nextStory.emoji} ${nextStory.curto} →</button>
    </div>
  `;

  document.getElementById('storyArea').innerHTML = html;

  // marca como completada quando todos os 10 níveis já foram vistos
  const efetivo = state.mostrarTodos ? 10 : nivelAtual(id);
  if (efetivo >= 10 && !state.completadas.includes(id)) {
    state.completadas.push(id);
    saveState();
    renderPicker();
  }
}

function nextLevel() {
  const id = state.historiaAtual;
  const atual = nivelAtual(id);
  if (atual < 10) {
    state.niveis[id] = atual + 1;
    saveState();
    renderStory();
    window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
  }
}

function renderAll() {
  renderPicker();
  renderStory();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
renderAll();

document.addEventListener('click', function(e) {
  if (!e.target.closest('.nivel-actions')) {
    document.querySelectorAll('.speak-tip').forEach(t => t.classList.add('hidden'));
  }
});
</script>

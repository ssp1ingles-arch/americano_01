<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbos &amp; Tempos · Sistema 23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--rd:#f87171;--gn:#5FD87A;--am:#F5C518;--s23:#7C2D12;--s23d:#431407;--s23l:#FFF7ED;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* LOCAL NAV / BREADCRUMB */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.nav-back{color:var(--s23);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.9;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

/* TOPBAR — TABS */
.topbar{position:fixed;top:96px;left:0;right:0;z-index:90;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.7rem 1.1rem;}
.topbar-inner{max-width:920px;margin:0 auto;}
.tabs-row{display:flex;justify-content:center;}
.tab-group{display:flex;align-items:center;gap:.2rem;background:var(--sf);border:1px solid var(--bd);border-radius:.6rem;padding:.25rem;flex-wrap:wrap;}
.tab-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.5rem 1.1rem;border-radius:.45rem;border:none;background:none;color:var(--td);cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.on{background:var(--s23);color:#fff;}

.wrap{padding-top:170px;max-width:920px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;}
.hidden{display:none!important;}

/* ===== MODO 1 — TABELA DE TEMPOS ===== */
.info-card{background:rgba(124,45,18,.08);border:1px solid rgba(124,45,18,.3);border-radius:.9rem;padding:1.1rem 1.3rem;margin-bottom:1.2rem;}
.info-title{font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:800;color:var(--s23);margin-bottom:.7rem;}
.info-text{font-size:.85rem;color:var(--tm);line-height:1.6;margin-bottom:.7rem;}
.irreg-list{display:flex;flex-wrap:wrap;gap:.4rem;}
.irreg-chip{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;color:var(--s23);background:var(--sf);border:1px solid rgba(124,45,18,.35);border-radius:.4rem;padding:.25rem .55rem;}

.filter-row{display:flex;gap:.5rem;margin-bottom:1.1rem;}
.filter-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.6rem 1.1rem;border-radius:.6rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.filter-btn:hover{border-color:var(--bdh);color:var(--tx);}
.filter-btn.on{border-color:var(--s23);background:rgba(124,45,18,.15);color:var(--s23);}

.table-wrap{overflow-x:auto;background:var(--sf);border:1px solid var(--bd);border-radius:1rem;}
.v-table{width:100%;min-width:520px;border-collapse:collapse;}
.v-table th{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--td);text-align:left;padding:.85rem 1rem;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15);}
.v-table td{padding:.8rem 1rem;border-bottom:1px solid var(--bd);vertical-align:top;font-size:.85rem;line-height:1.5;}
.v-table tr:last-child td{border-bottom:none;}
.v-table tr:hover td{background:rgba(255,255,255,.02);}
.base-cell{font-family:'Space Grotesk',sans-serif;font-weight:800;color:var(--tx);min-width:90px;}
.fut-cell,.pres-cell{color:var(--tm);min-width:120px;}
.pass-cell{min-width:120px;color:var(--tm);}
.pass-cell.irregular{color:var(--s23);font-weight:800;}

/* ===== MODO 2 — VERBOS COM PRONOMES ===== */
.verbo-select{width:100%;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;padding:.85rem 1rem;border-radius:.7rem;border:1px solid var(--bd);background:var(--sf);color:var(--tx);margin-bottom:1.3rem;}

.pron-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.5rem;}
.pron-card{background:var(--sf);border:1px solid var(--bd);border-radius:.9rem;padding:1.1rem 1.2rem;position:relative;}
.pron-card.warn{border-color:rgba(245,197,24,.35);background:rgba(245,197,24,.05);}
.pron-tag{font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--s23);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.pron-warn-badge{font-size:.6rem;font-weight:800;color:var(--am);background:rgba(245,197,24,.12);border:1px solid rgba(245,197,24,.35);padding:.15rem .5rem;border-radius:2rem;}
.pron-frase{font-family:'Space Grotesk',sans-serif;font-size:.98rem;color:var(--tx);line-height:1.5;}
.pron-frase b{color:var(--s23);}

.exercicio-card{background:var(--sf);border:1px solid var(--bd);border-radius:.9rem;padding:1.2rem 1.4rem;}
.exercicio-title{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--td);margin-bottom:.8rem;}
.exercicio-prompt{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;color:var(--s23);margin-bottom:.9rem;}
.exercicio-row{display:flex;gap:.6rem;flex-wrap:wrap;}
.exercicio-input{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--bd);border-radius:.55rem;padding:.7rem .9rem;color:var(--tx);font-size:.88rem;font-family:'Inter',sans-serif;outline:none;}
.exercicio-input:focus{border-color:rgba(124,45,18,.6);}
.exercicio-btn{font-family:'Space Grotesk',sans-serif;font-size:.82rem;font-weight:700;padding:.7rem 1.2rem;border-radius:.55rem;border:none;background:var(--s23);color:#fff;cursor:pointer;white-space:nowrap;}
.exercicio-btn:hover{filter:brightness(1.15);}
.exercicio-feedback{margin-top:.8rem;font-size:.85rem;line-height:1.55;padding:.7rem .9rem;border-radius:.6rem;display:none;}
.exercicio-feedback.show{display:block;}
.exercicio-feedback.ok{background:rgba(95,216,122,.1);border:1px solid rgba(95,216,122,.3);color:var(--gn);}
.exercicio-feedback.bad{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--rd);}
.exercicio-feedback b{color:inherit;}
.exercicio-next-row{margin-top:.9rem;text-align:right;}
.exercicio-next-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;color:var(--s23);background:none;border:1px solid rgba(124,45,18,.4);border-radius:.5rem;padding:.5rem .9rem;cursor:pointer;}
.exercicio-next-btn:hover{background:rgba(124,45,18,.1);}

@media(max-width:560px){
  .pron-grid{grid-template-columns:1fr;}
}
@media(max-width:640px){
  .wrap{padding-top:150px;}
}
</style>
</head>
<body>
<script src="../../nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var params=new URLSearchParams(window.location.search);
  if(params.get('origem')==='jornada'){
    document.querySelectorAll('a').forEach(function(a){
      if(a.textContent.indexOf('Menu Principal')!==-1){
        a.setAttribute('href','../../jornada/index.html');
        a.textContent='← Jornada';
      }
    });
  }
});
</script>

<!-- LOCAL NAV / BREADCRUMB -->
<nav class="nav">
  <a href="../../sistema01/index.html" class="nav-back">← Início</a>
  <span class="nav-sep">/</span>
  <a href="../index.html" class="nav-link">Sistema 23</a>
  <span class="nav-sep">/</span>
  <div class="nav-title">⏳ Verbos &amp; Tempos</div>
</nav>

<!-- TOPBAR — TABS -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="tabs-row">
      <div class="tab-group" id="tabGroup">
        <button class="tab-btn on" data-modo="tabela" onclick="setModo('tabela')">Tabela de Tempos</button>
        <button class="tab-btn" data-modo="pronomes" onclick="setModo('pronomes')">Verbos com Pronomes</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- MODO 1 — TABELA DE TEMPOS -->
  <div class="panel" id="panelTabela">
    <div class="info-card">
      <div class="info-title">Regulares vs. Irregulares</div>
      <div class="info-text">Verbos regulares formam o passado com <b>-ed</b>. Os 22 verbos abaixo são irregulares — o passado muda de forma imprevisível e precisa ser memorizado.</div>
      <div class="irreg-list" id="irregList"></div>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="table-wrap">
      <table class="v-table">
        <thead><tr><th>Verbo Base</th><th>Futuro (will)</th><th>Presente</th><th>Passado</th></tr></thead>
        <tbody id="tempoTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- MODO 2 — VERBOS COM PRONOMES -->
  <div class="panel hidden" id="panelPronomes">
    <select class="verbo-select" id="verboSelect" onchange="selectVerbo(this.value)"></select>
    <div class="pron-grid" id="pronGrid"></div>
    <div class="exercicio-card">
      <div class="exercicio-title">✏️ Exercício — complete a frase</div>
      <div class="exercicio-prompt" id="exercicioPrompt"></div>
      <div class="exercicio-row">
        <input type="text" class="exercicio-input" id="exInput" placeholder="Digite a frase completa em inglês...">
        <button class="exercicio-btn" onclick="verificarExercicio()">Verificar</button>
      </div>
      <div class="exercicio-feedback" id="exFeedback"></div>
      <div class="exercicio-next-row"><button class="exercicio-next-btn" onclick="novoExercicio()">🔀 Novo pronome</button></div>
    </div>
  </div>

</div>

<script>
// ── DATA: MÓDULO 1 — 40 VERBOS × 3 TEMPOS ─────────────────────────────────────
const IRREGULARES = ['go','eat','see','run','write','speak','teach','buy','sell','make','take','give','find','bring','catch','drive','ride','swim','fly','draw','build','break'];

const TEMPOS = [
  ['go','I will go','I go','I went'], ['eat','I will eat','I eat','I ate'], ['see','I will see','I see','I saw'],
  ['run','I will run','I run','I ran'], ['read','I will read','I read','I read'], ['write','I will write','I write','I wrote'],
  ['speak','I will speak','I speak','I spoke'], ['listen','I will listen','I listen','I listened'], ['play','I will play','I play','I played'],
  ['work','I will work','I work','I worked'], ['learn','I will learn','I learn','I learned'], ['teach','I will teach','I teach','I taught'],
  ['buy','I will buy','I buy','I bought'], ['sell','I will sell','I sell','I sold'], ['make','I will make','I make','I made'],
  ['take','I will take','I take','I took'], ['give','I will give','I give','I gave'], ['find','I will find','I find','I found'],
  ['bring','I will bring','I bring','I brought'], ['catch','I will catch','I catch','I caught'], ['drive','I will drive','I drive','I drove'],
  ['ride','I will ride','I ride','I rode'], ['swim','I will swim','I swim','I swam'], ['fly','I will fly','I fly','I flew'],
  ['draw','I will draw','I draw','I drew'], ['build','I will build','I build','I built'], ['cook','I will cook','I cook','I cooked'],
  ['clean','I will clean','I clean','I cleaned'], ['wash','I will wash','I wash','I washed'], ['fix','I will fix','I fix','I fixed'],
  ['open','I will open','I open','I opened'], ['close','I will close','I close','I closed'], ['start','I will start','I start','I started'],
  ['stop','I will stop','I stop','I stopped'], ['wait','I will wait','I wait','I waited'], ['help','I will help','I help','I helped'],
  ['show','I will show','I show','I showed'], ['watch','I will watch','I watch','I watched'], ['call','I will call','I call','I called'],
  ['break','I will break','I break','I broke']
].map(([base, futuro, presente, passado]) => ({base, futuro, presente, passado, irregular: IRREGULARES.includes(base)}));

// ── DATA: MÓDULO 2 — 10 VERBOS × 6 PRONOMES ───────────────────────────────────
const PRONOMES_DATA = [
  {verbo:'drive', I:'I drive to work.', We:'We drive together.', You:'You drive well.', They:'They drive fast.', He:'He drives a taxi.', She:'She drives every day.'},
  {verbo:'ride', I:'I ride my bike.', We:'We ride horses.', You:'You ride the bus.', They:'They ride scooters.', He:'He rides a motorcycle.', She:'She rides with her friend.'},
  {verbo:'walk', I:'I walk to school.', We:'We walk together.', You:'You walk fast.', They:'They walk in the park.', He:'He walks home.', She:'She walks every morning.'},
  {verbo:'run', I:'I run every day.', We:'We run in the park.', You:'You run fast.', They:'They run together.', He:'He runs in the morning.', She:'She runs after work.'},
  {verbo:'eat', I:'I eat breakfast.', We:'We eat together.', You:'You eat slowly.', They:'They eat at home.', He:'He eats a lot.', She:'She eats salad.'},
  {verbo:'drink', I:'I drink water.', We:'We drink coffee.', You:'You drink tea.', They:'They drink juice.', He:'He drinks milk.', She:'She drinks water.'},
  {verbo:'work', I:'I work every day.', We:'We work together.', You:'You work hard.', They:'They work online.', He:'He works at night.', She:'She works from home.'},
  {verbo:'study', I:'I study English.', We:'We study together.', You:'You study well.', They:'They study a lot.', He:'He studies hard.', She:'She studies every day.'},
  {verbo:'speak', I:'I speak English.', We:'We speak slowly.', You:'You speak well.', They:'They speak fast.', He:'He speaks clearly.', She:'She speaks softly.'},
  {verbo:'live', I:'I live here.', We:'We live together.', You:'You live far.', They:'They live nearby.', He:'He lives alone.', She:'She lives with family.'}
];

const PRONOME_ORDEM = ['I','We','You','They','He','She'];

// ── STATE ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 's23_tempos_progresso';
let state = {
  modo: 'tabela',
  filtro: 'todos',
  verboAtual: 'drive',
  exercicioPronome: null
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function normalize(s) {
  return s.toLowerCase().trim().replace(/[.!?]+$/, '').replace(/\s+/g, ' ');
}

// ── MODE SWITCHING ────────────────────────────────────────────────────────────
function setModo(modo) {
  state.modo = modo;
  saveState();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.modo === modo));
  document.getElementById('panelTabela').classList.toggle('hidden', modo !== 'tabela');
  document.getElementById('panelPronomes').classList.toggle('hidden', modo !== 'pronomes');
  if (modo === 'tabela') renderTabela();
  if (modo === 'pronomes') renderPronomes();
}

// ── MODO 1 — TABELA DE TEMPOS ─────────────────────────────────────────────────
function renderIrregList() {
  document.getElementById('irregList').innerHTML = IRREGULARES.map(v => `<span class="irreg-chip">${v}</span>`).join('');
}

function renderFilterRow() {
  document.getElementById('filterRow').innerHTML = `
    <button class="filter-btn ${state.filtro === 'todos' ? 'on' : ''}" onclick="setFiltro('todos')">Todos</button>
    <button class="filter-btn ${state.filtro === 'regulares' ? 'on' : ''}" onclick="setFiltro('regulares')">Regulares</button>
    <button class="filter-btn ${state.filtro === 'irregulares' ? 'on' : ''}" onclick="setFiltro('irregulares')">Irregulares</button>
  `;
}

function setFiltro(f) {
  state.filtro = f;
  saveState();
  renderTabela();
}

function renderTabela() {
  renderIrregList();
  renderFilterRow();
  let lista = TEMPOS;
  if (state.filtro === 'regulares') lista = TEMPOS.filter(v => !v.irregular);
  if (state.filtro === 'irregulares') lista = TEMPOS.filter(v => v.irregular);

  document.getElementById('tempoTableBody').innerHTML = lista.map(v => `
    <tr>
      <td class="base-cell">${v.base}</td>
      <td class="fut-cell">${v.futuro}</td>
      <td class="pres-cell">${v.presente}</td>
      <td class="pass-cell ${v.irregular ? 'irregular' : ''}">${v.passado}</td>
    </tr>
  `).join('');
}

// ── MODO 2 — VERBOS COM PRONOMES ─────────────────────────────────────────────
function renderVerboSelect() {
  document.getElementById('verboSelect').innerHTML = PRONOMES_DATA.map(v => `
    <option value="${v.verbo}" ${v.verbo === state.verboAtual ? 'selected' : ''}>${v.verbo}</option>
  `).join('');
}

function selectVerbo(verbo) {
  state.verboAtual = verbo;
  state.exercicioPronome = null;
  saveState();
  renderPronomes();
}

function renderPronomes() {
  renderVerboSelect();
  const v = PRONOMES_DATA.find(x => x.verbo === state.verboAtual);

  document.getElementById('pronGrid').innerHTML = PRONOME_ORDEM.map(p => {
    const isWarn = p === 'He' || p === 'She';
    const frase = v[p];
    const fraseDestacada = frase.replace(new RegExp('^(' + p + ')\\s+(\\S+)'), '<b>$1</b> <b>$2</b>');
    return `
      <div class="pron-card ${isWarn ? 'warn' : ''}">
        <div class="pron-tag">${p}${isWarn ? '<span class="pron-warn-badge">⚠️ +s</span>' : ''}</div>
        <div class="pron-frase">${fraseDestacada}</div>
      </div>
    `;
  }).join('');

  if (!state.exercicioPronome) novoExercicio();
  else renderExercicio();
}

function novoExercicio() {
  const outros = PRONOME_ORDEM.filter(p => p !== state.exercicioPronome);
  state.exercicioPronome = outros[Math.floor(Math.random() * outros.length)];
  saveState();
  renderExercicio();
}

function renderExercicio() {
  document.getElementById('exercicioPrompt').textContent = `${state.exercicioPronome} + ${state.verboAtual} → ?`;
  document.getElementById('exInput').value = '';
  const fb = document.getElementById('exFeedback');
  fb.classList.remove('show', 'ok', 'bad');
  fb.innerHTML = '';
}

function verificarExercicio() {
  const v = PRONOMES_DATA.find(x => x.verbo === state.verboAtual);
  const esperado = v[state.exercicioPronome];
  const input = document.getElementById('exInput').value;
  const correto = normalize(input) === normalize(esperado);

  const fb = document.getElementById('exFeedback');
  fb.classList.add('show');
  fb.classList.toggle('ok', correto);
  fb.classList.toggle('bad', !correto);
  fb.innerHTML = correto ? '✓ Correto!' : `✗ Quase lá! Resposta esperada: <b>${esperado}</b>`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
setModo(state.modo);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frases Progressivas · Sistema 23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--rd:#f87171;--gn:#5FD87A;--s23:#7C2D12;--s23d:#431407;--s23l:#FFF7ED;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* LOCAL NAV / BREADCRUMB */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.nav-back{color:var(--s23);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.9;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

/* TOPBAR — TABS */
.topbar{position:fixed;top:96px;left:0;right:0;z-index:90;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:.7rem 1.1rem;}
.topbar-inner{max-width:820px;margin:0 auto;}
.tabs-row{display:flex;justify-content:center;}
.tab-group{display:flex;align-items:center;gap:.2rem;background:var(--sf);border:1px solid var(--bd);border-radius:.6rem;padding:.25rem;flex-wrap:wrap;}
.tab-btn{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:700;padding:.5rem 1.1rem;border-radius:.45rem;border:none;background:none;color:var(--td);cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.on{background:var(--s23);color:#fff;}

.wrap{padding-top:170px;max-width:820px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;}
.hidden{display:none!important;}

/* ===== MODO 1 — EXPANSÃO PROGRESSIVA ===== */
.prog-card{background:var(--sf);border:1px solid var(--bd);border-radius:.75rem;padding:.85rem 1.1rem;margin-bottom:1.2rem;}
.prog-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem;}
.prog-title{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--td);}
.prog-num{font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:800;color:var(--s23);}
.prog-track{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--s23),#C2410C);border-radius:3px;transition:width .5s ease;}

.expand-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;overflow:hidden;}
.expand-half{padding:1.6rem 1.6rem;}
.expand-half.a1{border-bottom:1px dashed var(--bd);}
.expand-label{font-family:'Space Grotesk',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:.7rem;}
.expand-text-a1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--tx);line-height:1.5;}
.expand-cover-btn{width:100%;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;padding:1.1rem;border-radius:.7rem;border:1px dashed var(--bd);background:var(--bg);color:var(--s23);cursor:pointer;transition:all .18s;}
.expand-cover-btn:hover{border-color:rgba(124,45,18,.5);background:rgba(124,45,18,.06);}
.expand-text-a2{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--tx);line-height:1.5;}
.expand-text-a2 b{color:var(--s23);}

.nav-controls{display:flex;gap:.6rem;margin-top:1.2rem;}
.nav-btn{flex:1;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.75rem 1rem;border-radius:.6rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.nav-btn:hover:not(:disabled){border-color:var(--bdh);color:var(--tx);}
.nav-btn:disabled{opacity:.35;cursor:default;}
.nav-btn.primary{background:var(--s23);color:#fff;border:none;}
.nav-btn.primary:hover{filter:brightness(1.15);}

@media(max-width:620px){
  .nav-controls{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:.7rem 1rem calc(.7rem + env(safe-area-inset-bottom));margin-top:0;}
  #panelExpansao{padding-bottom:5.5rem;}
}

/* ===== MODO 2 — FLASHCARD ===== */
.flash-stats{display:flex;justify-content:center;gap:.6rem;margin-bottom:1.1rem;}
.flash-stat{background:var(--sf);border:1px solid var(--bd);border-radius:.6rem;padding:.5rem 1rem;text-align:center;min-width:80px;}
.flash-stat-n{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;}
.flash-stat-n.ok{color:var(--gn);}
.flash-stat-n.bad{color:var(--rd);}
.flash-stat-l{font-size:.6rem;color:var(--td);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem;}

.flash-card{background:var(--sf);border:1px solid var(--bd);border-radius:1.2rem;padding:2.5rem 1.75rem;text-align:center;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.flash-tag{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:1.1rem;}
.flash-front-text{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--tx);line-height:1.5;}
.flash-reveal-btn{margin-top:1.3rem;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.7rem 1.3rem;border-radius:.6rem;border:none;background:var(--s23);color:#fff;cursor:pointer;}
.flash-reveal-btn:hover{filter:brightness(1.15);}
.flash-back{display:none;margin-top:1.3rem;padding-top:1.3rem;border-top:1px dashed var(--bd);width:100%;}
.flash-card.flip .flash-back{display:block;}
.flash-card.flip .flash-front-only{display:none;}
.flash-back-text{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:var(--tx);line-height:1.5;}
.flash-back-text b{color:var(--s23);}

.flash-actions{display:flex;gap:.6rem;margin-top:1.2rem;}
.flash-btn{flex:1;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.75rem 1rem;border-radius:.6rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.flash-btn:hover:not(:disabled){border-color:var(--bdh);color:var(--tx);}
.flash-btn:disabled{opacity:.35;cursor:default;}
.flash-btn.bad{border-color:rgba(248,113,113,.4);color:var(--rd);}
.flash-btn.bad:hover:not(:disabled){background:rgba(248,113,113,.1);}
.flash-btn.ok{border-color:rgba(95,216,122,.4);color:var(--gn);}
.flash-btn.ok:hover:not(:disabled){background:rgba(95,216,122,.1);}

.flash-done{text-align:center;padding:2.5rem 1.5rem;}
.flash-done-title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:800;color:var(--s23);margin-bottom:.6rem;}
.flash-done-sub{font-size:.88rem;color:var(--tm);margin-bottom:1.4rem;}
.flash-restart{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.75rem 1.5rem;border-radius:.6rem;border:none;background:var(--s23);color:#fff;cursor:pointer;}

@media(max-width:620px){
  #panelFlashcard .flash-actions{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(8,12,20,.97);backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:.7rem 1rem calc(.7rem + env(safe-area-inset-bottom));margin-top:0;}
  #panelFlashcard{padding-bottom:5.5rem;}
}
@media(max-width:640px){
  .wrap{padding-top:150px;}
}
</style>
</head>
<body>
<script src="../../nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  var params=new URLSearchParams(window.location.search);
  if(params.get('origem')==='jornada'){
    document.querySelectorAll('a').forEach(function(a){
      if(a.textContent.indexOf('Menu Principal')!==-1){
        a.setAttribute('href','../../jornada/index.html');
        a.textContent='← Jornada';
      }
    });
  }
});
</script>

<!-- LOCAL NAV / BREADCRUMB -->
<nav class="nav">
  <a href="../../sistema01/index.html" class="nav-back">← Início</a>
  <span class="nav-sep">/</span>
  <a href="../index.html" class="nav-link">Sistema 23</a>
  <span class="nav-sep">/</span>
  <div class="nav-title">📈 Frases Progressivas</div>
</nav>

<!-- TOPBAR — TABS -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="tabs-row">
      <div class="tab-group" id="tabGroup">
        <button class="tab-btn on" data-modo="expansao" onclick="setModo('expansao')">Expansão Progressiva</button>
        <button class="tab-btn" data-modo="flashcard" onclick="setModo('flashcard')">Flashcard</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- MODO 1 — EXPANSÃO PROGRESSIVA -->
  <div class="panel" id="panelExpansao">
    <div class="prog-card">
      <div class="prog-header">
        <span class="prog-title">Progresso</span>
        <span class="prog-num" id="progNum">Par 1 de 50</span>
      </div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:2%"></div></div>
    </div>
    <div class="expand-card" id="expandCard"></div>
    <div class="nav-controls">
      <button class="nav-btn" id="prevBtn" onclick="prevPar()">← Anterior</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextPar()">Próximo →</button>
    </div>
  </div>

  <!-- MODO 2 — FLASHCARD -->
  <div class="panel hidden" id="panelFlashcard">
    <div class="flash-stats">
      <div class="flash-stat"><div class="flash-stat-n ok" id="flashOkN">0</div><div class="flash-stat-l">Sabia</div></div>
      <div class="flash-stat"><div class="flash-stat-n bad" id="flashBadN">0</div><div class="flash-stat-l">Não sabia</div></div>
      <div class="flash-stat"><div class="flash-stat-n" id="flashPosN" style="color:var(--s23)">1/50</div><div class="flash-stat-l">Par</div></div>
    </div>
    <div id="flashArea"></div>
  </div>

</div>

<script>
// ── DATA: 50 PARES A1 → A2 (com parte nova pré-marcada) ───────────────────────
const FRASES = [
  {a1:"I am ready.", a2:'I am ready <b>for the exam</b>.'},
  {a1:"She is afraid.", a2:'She is afraid <b>of the dark</b>.'},
  {a1:"He is late.", a2:'He is late <b>for school</b>.'},
  {a1:"We are friends.", a2:'We are <b>good</b> friends <b>at school</b>.'},
  {a1:"They are tired.", a2:'They are tired <b>after the trip</b>.'},
  {a1:"I need help.", a2:'I need help <b>with my homework</b>.'},
  {a1:"She wants water.", a2:'She wants <b>a glass of</b> water.'},
  {a1:"He likes music.", a2:'He likes <b>loud</b> music.'},
  {a1:"We love our parents.", a2:'We love our parents <b>very much</b>.'},
  {a1:"They prefer coffee.", a2:'They prefer coffee <b>in the morning</b>.'},
  {a1:"We speak slowly.", a2:'We speak slowly <b>in class</b>.'},
  {a1:"He practices English.", a2:'He practices English <b>every day</b>.'},
  {a1:"She learns fast.", a2:'She learns fast <b>in class</b>.'},
  {a1:"We ask a question.", a2:'We ask a question <b>in class</b>.'},
  {a1:"He answers the phone.", a2:'He answers the phone <b>quickly</b>.'},
  {a1:"She sends a message.", a2:'She sends a message <b>to her mother</b>.'},
  {a1:"I call my friend.", a2:'I call my friend <b>after school</b>.'},
  {a1:"We feel excited.", a2:'We feel excited <b>about the trip</b>.'},
  {a1:"He seems tired.", a2:'He seems tired <b>after work</b>.'},
  {a1:"She looks happy.", a2:'She looks happy <b>today</b>.'},
  {a1:"I feel sick.", a2:'I feel sick <b>this morning</b>.'},
  {a1:"They arrive today.", a2:'They arrive today <b>by train</b>.'},
  {a1:"We leave early.", a2:'We leave early <b>in the morning</b>.'},
  {a1:"He comes home.", a2:'He comes home <b>late</b>.'},
  {a1:"She goes shopping.", a2:'She goes shopping <b>with her sister</b>.'},
  {a1:"I wake up.", a2:'I wake up <b>at 6:00</b>.'},
  {a1:"They bring food.", a2:'They bring food <b>to the picnic</b>.'},
  {a1:"We play a game.", a2:'We play a game <b>after dinner</b>.'},
  {a1:"He draws a picture.", a2:'He draws a picture <b>of his family</b>.'},
  {a1:"She listens to music.", a2:'She listens to music <b>in her room</b>.'},
  {a1:"I watch a movie.", a2:'I watch a movie <b>at night</b>.'},
  {a1:"They clean the house.", a2:'They clean the house <b>together</b>.'},
  {a1:"We cook rice.", a2:'We cook rice <b>for dinner</b>.'},
  {a1:"He washes the car.", a2:'He washes the car <b>on Saturday</b>.'},
  {a1:"I open my book.", a2:'I open my book <b>to page 10</b>.'},
  {a1:"They invite us.", a2:'They invite us <b>to the party</b>.'},
  {a1:"We visit grandma.", a2:'We visit grandma <b>on Sunday</b>.'},
  {a1:"I need some water.", a2:'I need some <b>cold</b> water <b>to drink</b>.'},
  {a1:"I meet a friend.", a2:'I meet a friend <b>after work</b>.'},
  {a1:"I greet people.", a2:'I greet people <b>with a smile</b>.'},
  {a1:"I shake hands.", a2:'I shake hands <b>with my teacher</b>.'},
  {a1:"I ask for help.", a2:'I ask for help <b>when I need it</b>.'},
  {a1:"I buy a book.", a2:'I buy a <b>new</b> book <b>today</b>.'},
  {a1:"They take photos.", a2:'They take photos <b>at the beach</b>.'},
  {a1:"We choose a gift.", a2:'We choose a gift <b>for our friend</b>.'},
  {a1:"He pays the bill.", a2:'He pays the bill <b>at the restaurant</b>.'},
  {a1:"She sells fruit.", a2:'She sells <b>fresh</b> fruit <b>at the market</b>.'},
  {a1:"He meets his teacher.", a2:'He meets his teacher <b>after class</b>.'},
  {a1:"She closes her bag.", a2:'She closes her bag <b>quickly</b>.'},
  {a1:"We visit grandma.", a2:'We visit grandma <b>on Sunday</b>.'}
];

// ── STATE ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 's23_frases_progresso';
let state = {
  modo: 'expansao',
  parAtual: 0,
  flashOrder: null,
  flashIndex: 0,
  flashAcertos: 0,
  flashErros: 0
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) Object.assign(state, JSON.parse(raw));
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── MODE SWITCHING ────────────────────────────────────────────────────────────
function setModo(modo) {
  state.modo = modo;
  saveState();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.modo === modo));
  document.getElementById('panelExpansao').classList.toggle('hidden', modo !== 'expansao');
  document.getElementById('panelFlashcard').classList.toggle('hidden', modo !== 'flashcard');
  if (modo === 'expansao') renderExpansao();
  if (modo === 'flashcard') renderFlash();
}

// ── MODO 1 — EXPANSÃO PROGRESSIVA ────────────────────────────────────────────
function renderExpansao() {
  const idx = state.parAtual;
  const f = FRASES[idx];

  document.getElementById('progNum').textContent = `Par ${idx + 1} de ${FRASES.length}`;
  document.getElementById('progFill').style.width = ((idx + 1) / FRASES.length * 100) + '%';

  document.getElementById('expandCard').innerHTML = `
    <div class="expand-half a1">
      <div class="expand-label">A1 — Frase Simples</div>
      <div class="expand-text-a1">${f.a1}</div>
    </div>
    <div class="expand-half a2" id="expandHalfA2">
      <div class="expand-label">A2 — Frase Expandida</div>
      <button class="expand-cover-btn" onclick="revelarA2()">Ver como fica →</button>
    </div>
  `;

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === FRASES.length - 1 ? 'Concluir ✓' : 'Próximo →';
}

function revelarA2() {
  const f = FRASES[state.parAtual];
  document.getElementById('expandHalfA2').innerHTML = `
    <div class="expand-label">A2 — Frase Expandida</div>
    <div class="expand-text-a2">${f.a2}</div>
  `;
}

function prevPar() {
  if (state.parAtual > 0) { state.parAtual--; saveState(); renderExpansao(); window.scrollTo({top:0,behavior:'smooth'}); }
}
function nextPar() {
  if (state.parAtual < FRASES.length - 1) { state.parAtual++; saveState(); renderExpansao(); window.scrollTo({top:0,behavior:'smooth'}); }
}

// ── MODO 2 — FLASHCARD ───────────────────────────────────────────────────────
let flashFlipped = false;

function ensureFlashOrder() {
  if (!Array.isArray(state.flashOrder) || state.flashOrder.length !== FRASES.length) {
    state.flashOrder = shuffle(FRASES.map((_, i) => i));
    state.flashIndex = 0;
    state.flashAcertos = 0;
    state.flashErros = 0;
    saveState();
  }
}

function renderFlash() {
  ensureFlashOrder();
  flashFlipped = false;
  updateFlashStats();

  if (state.flashIndex >= state.flashOrder.length) {
    document.getElementById('flashArea').innerHTML = `
      <div class="flash-done">
        <div class="flash-done-title">📈 Você revisou todos os 50 pares!</div>
        <div class="flash-done-sub">${state.flashAcertos} de ${FRASES.length} você já sabia de cara.</div>
        <button class="flash-restart" onclick="restartFlash()">↻ Praticar novamente</button>
      </div>
    `;
    return;
  }

  const f = FRASES[state.flashOrder[state.flashIndex]];
  document.getElementById('flashArea').innerHTML = `
    <div class="flash-card" id="flashCardEl">
      <div class="flash-front-only">
        <div class="flash-tag">Frase A1</div>
        <div class="flash-front-text">${f.a1}</div>
        <button class="flash-reveal-btn" onclick="flipFlash()">Ver expansão A2</button>
      </div>
      <div class="flash-back">
        <div class="flash-tag">Frase A2</div>
        <div class="flash-back-text">${f.a2}</div>
      </div>
    </div>
    <div class="flash-actions">
      <button class="flash-btn bad" id="flashBadBtn" onclick="markFlash(false)" disabled>✗ Não sabia</button>
      <button class="flash-btn ok" id="flashOkBtn" onclick="markFlash(true)" disabled>✓ Sabia!</button>
    </div>
  `;
}

function flipFlash() {
  flashFlipped = true;
  document.getElementById('flashCardEl').classList.add('flip');
  document.getElementById('flashBadBtn').disabled = false;
  document.getElementById('flashOkBtn').disabled = false;
}

function markFlash(soube) {
  if (!flashFlipped) return;
  if (soube) state.flashAcertos++; else state.flashErros++;
  state.flashIndex++;
  saveState();
  renderFlash();
}

function restartFlash() {
  state.flashOrder = shuffle(FRASES.map((_, i) => i));
  state.flashIndex = 0;
  state.flashAcertos = 0;
  state.flashErros = 0;
  saveState();
  renderFlash();
}

function updateFlashStats() {
  document.getElementById('flashOkN').textContent = state.flashAcertos;
  document.getElementById('flashBadN').textContent = state.flashErros;
  document.getElementById('flashPosN').textContent = Math.min(state.flashIndex + 1, FRASES.length) + '/' + FRASES.length;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
setModo(state.modo);
</script>
</body>
</html>

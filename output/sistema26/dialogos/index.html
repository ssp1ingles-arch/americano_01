<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Situações · Diálogos do Dia a Dia · Sistema 26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--sf:#0f1621;--sf2:#162030;--tx:#e4ddd4;--tm:#a0a8b8;--td:#6a7390;--rd:#f87171;--gn:#5FD87A;--s26:#6D28D9;--s26d:#4C1D95;--s26l:#EDE9FE;--bd:rgba(255,255,255,0.07);--bdh:rgba(255,255,255,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;padding-top:48px;font-size:16px;}

/* LOCAL NAV / BREADCRUMB */
.nav{position:fixed;top:48px;left:0;right:0;z-index:100;background:rgba(8,12,20,.95);backdrop-filter:blur(12px);padding:.55rem 1.25rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;border-bottom:1px solid var(--bd);}
.nav-back{color:var(--s26);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;opacity:.9;}
.nav-back:hover{opacity:1;}
.nav-link{color:var(--tm);text-decoration:none;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;opacity:.7;}
.nav-link:hover{opacity:1;color:var(--tx);}
.nav-sep{color:var(--td);}
.nav-title{font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;}

.wrap{padding-top:64px;max-width:1100px;margin:0 auto;padding-left:1.1rem;padding-right:1.1rem;padding-bottom:5rem;display:flex;gap:1.5rem;align-items:flex-start;}
.hidden{display:none!important;}

/* SIDEBAR (desktop) */
.sidebar{width:240px;flex-shrink:0;position:sticky;top:64px;display:flex;flex-direction:column;gap:.4rem;padding-top:1.2rem;max-height:calc(100vh - 80px);overflow-y:auto;}
.sit-btn{position:relative;display:flex;align-items:center;gap:.6rem;background:var(--sf);border:1px solid var(--bd);border-radius:.7rem;padding:.7rem .9rem;cursor:pointer;transition:all .18s;text-align:left;}
.sit-btn:hover{border-color:var(--bdh);}
.sit-btn.on{border-color:var(--s26);background:rgba(109,40,217,.14);box-shadow:0 0 12px rgba(109,40,217,.2);}
.sit-icon{font-size:1.1rem;flex-shrink:0;}
.sit-label{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;color:var(--tm);line-height:1.3;}
.sit-btn.on .sit-label{color:var(--s26);}
.sit-check{position:absolute;top:.4rem;right:.5rem;font-size:.7rem;color:var(--gn);}

/* MOBILE DROPDOWN */
.sit-select{display:none;width:100%;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.75rem .9rem;border-radius:.6rem;border:1px solid var(--bd);background:var(--sf);color:var(--tx);margin-top:1.2rem;margin-bottom:0;}

.main-col{flex:1;min-width:0;padding-top:1.2rem;}

/* CABEÇALHO */
.sit-header{background:var(--sf);border:1px solid var(--bd);border-radius:1rem;padding:1.3rem 1.5rem;margin-bottom:1.3rem;}
.sit-eyebrow{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--s26);margin-bottom:.5rem;}
.sit-title{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:800;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.sit-desc{font-size:.88rem;color:var(--tm);margin-top:.5rem;line-height:1.55;}

/* TOGGLE PRÁTICA EM DUPLA */
.dupla-row{display:flex;justify-content:center;margin-bottom:1.3rem;}
.dupla-btn{font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:700;padding:.7rem 1.2rem;border-radius:.7rem;border:1px solid var(--bd);background:var(--sf);color:var(--tm);cursor:pointer;transition:all .18s;}
.dupla-btn:hover{border-color:var(--bdh);color:var(--tx);}
.dupla-btn.on{border-color:var(--s26);background:rgba(109,40,217,.16);color:var(--s26);}

/* DIÁLOGOS */
.dialogo-card{background:var(--sf);border:1px solid var(--bd);border-radius:1rem;padding:1.3rem 1.5rem;margin-bottom:1.1rem;}
.dialogo-head{display:flex;align-items:center;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;}
.dialogo-badge{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--s26d);background:var(--s26l);padding:.25rem .7rem;border-radius:2rem;}
.dialogo-contexto{font-size:.78rem;color:var(--td);font-style:italic;}
.linha{display:flex;gap:.7rem;padding:.55rem 0;border-bottom:1px solid var(--bd);align-items:flex-start;}
.linha:last-child{border-bottom:none;}
.linha-spk{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;color:var(--s26);flex-shrink:0;width:22px;}
.linha-texto{font-size:18px;line-height:1.6;color:var(--tx);}
.linha-oculta .linha-texto{display:none;}
.linha-reveal-btn{font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:700;padding:.35rem .75rem;border-radius:.5rem;border:1px solid rgba(109,40,217,.4);background:rgba(109,40,217,.12);color:var(--s26);cursor:pointer;}
.linha-reveal-btn:hover{background:rgba(109,40,217,.2);}
.linha-placeholder{font-size:.82rem;color:var(--td);font-style:italic;}

/* EXPRESSÕES-CHAVE */
.vocab-title{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:800;color:var(--s26);margin:1.6rem 0 .8rem;}
.table-wrap{overflow-x:auto;background:var(--sf);border:1px solid var(--bd);border-radius:1rem;}
.v-table{width:100%;min-width:460px;border-collapse:collapse;}
.v-table th{font-family:'Space Grotesk',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--td);text-align:left;padding:.85rem 1rem;border-bottom:1px solid var(--bd);background:rgba(0,0,0,.15);}
.v-row{cursor:pointer;transition:background .15s;}
.v-row:hover td{background:rgba(109,40,217,.06);}
.v-row.active td{background:rgba(109,40,217,.1);}
.v-table td{padding:.85rem 1rem;border-bottom:1px solid var(--bd);vertical-align:top;font-size:.86rem;line-height:1.5;}
.word-cell{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--s26);min-width:190px;}
.def-cell{color:var(--tm);min-width:190px;}
.exp-row td{padding:0;border-bottom:1px solid var(--bd);}
.exp-row.hidden td{display:none;padding:0;border:none;}
.exp-inner{padding:.9rem 1.4rem;background:rgba(109,40,217,.07);font-size:.85rem;color:var(--tx);font-style:italic;line-height:1.55;}

/* PROGRESSO */
.progresso-row{margin-top:1.6rem;display:flex;justify-content:center;}
.progresso-label{display:flex;align-items:center;gap:.6rem;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;color:var(--tx);cursor:pointer;background:var(--sf);border:1px solid var(--bd);border-radius:.7rem;padding:.8rem 1.3rem;}
.progresso-label input{width:19px;height:19px;accent-color:var(--s26);cursor:pointer;}

/* PRÓXIMA SITUAÇÃO */
.next-row{display:flex;justify-content:center;margin-top:1.5rem;}
.next-btn{font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:700;padding:.8rem 1.5rem;border-radius:.7rem;border:1px solid var(--bd);background:var(--sf);color:var(--tx);cursor:pointer;transition:all .18s;}
.next-btn:hover{border-color:var(--s26);color:var(--s26);}

@media(max-width:900px){
  .sidebar{display:none;}
  .sit-select{display:block;}
  .wrap{flex-direction:column;}
}
</style>
</head>

// ── HELPERS: encontrar exemplo de uso dentro dos diálogos ────────────────────
const STOP_WORDS = new Set(['a','an','the','to','of','in','on','your','her','his','it','out','up','my','and','but','for','i']);
function normWord(w) {
  w = w.toLowerCase().replace(/[^a-z']/g, '');
  if (w.length > 5 && w.endsWith('ing')) w = w.slice(0, -3);
  else if (w.length > 4 && w.endsWith('ed')) w = w.slice(0, -2);
  else if (w.length > 3 && w.endsWith('s') && !w.endsWith('ss')) w = w.slice(0, -1);
  return w;
}
function contentWords(s) {
  return s.replace(/[[\](),.?!]/g, '').toLowerCase().split(/\s+/).map(normWord).filter(w => w && !STOP_WORDS.has(w));
}
function getExemploSituacao(situacao, expr) {
  const primary = expr.replace(/[.,]+$/, '').toLowerCase();
  const linhas = situacao.dialogos.flatMap(d => d.linhas.map(l => l.texto));
  for (const l of linhas) { if (l.toLowerCase().indexOf(primary) !== -1) return l; }
  const need = contentWords(primary);
  if (need.length) {
    let best = null, bestScore = 0;
    linhas.forEach(l => {
      const lWords = new Set(contentWords(l));
      const hits = need.filter(w => lWords.has(w)).length;
      const score = hits / need.length;
      if (score > bestScore) { bestScore = score; best = l; }
    });
    if (best && bestScore >= 0.6) return best;
  }
  return linhas[0];
}

// ── STATE ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 's26_dialogos_progresso';
let state = {
  situacaoAtual: 1,
  modoDupla: {},
  revelados: {},
  concluidas: [],
  expandidas: {}
};

function loadState() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) Object.assign(state, JSON.parse(raw)); } catch(e) {}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function getSituacao(id) { return SITUACOES.find(s => s.id === id); }

// ── SIDEBAR / SELECT ──────────────────────────────────────────────────────────
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = SITUACOES.map(s => `
    <div class="sit-btn ${s.id === state.situacaoAtual ? 'on' : ''}" onclick="selectSituacao(${s.id})">
      ${state.concluidas.includes(s.id) ? '<span class="sit-check">✓</span>' : ''}
      <span class="sit-icon">${s.icon}</span>
      <div class="sit-label">${s.id}. ${s.curto}</div>
    </div>
  `).join('');

  document.getElementById('sitSelect').innerHTML = SITUACOES.map(s => `
    <option value="${s.id}" ${s.id === state.situacaoAtual ? 'selected' : ''}>${s.icon} ${s.id}. ${s.curto}${state.concluidas.includes(s.id) ? ' ✓' : ''}</option>
  `).join('');
}

function selectSituacao(id) {
  state.situacaoAtual = id;
  saveState();
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── MODO PRÁTICA EM DUPLA ─────────────────────────────────────────────────────
function toggleDupla() {
  const id = state.situacaoAtual;
  const atual = state.modoDupla[id] || 'off';
  const proximo = atual === 'off' ? 'A' : (atual === 'A' ? 'B' : 'off');
  state.modoDupla[id] = proximo;
  saveState();
  renderSituacao();
}

function toggleRevelar(key) {
  state.revelados[key] = !state.revelados[key];
  saveState();
  renderSituacao();
}

// ── EXPRESSÕES ─────────────────────────────────────────────────────────────────
function toggleExpressao(id, idx) {
  const key = id + '-' + idx;
  const set = state.expandidas[id] || (state.expandidas[id] = []);
  const i = set.indexOf(idx);
  if (i === -1) set.push(idx); else set.splice(i, 1);
  saveState();
  renderSituacao();
}

// ── PROGRESSO ──────────────────────────────────────────────────────────────────
function toggleConcluida() {
  const id = state.situacaoAtual;
  const i = state.concluidas.indexOf(id);
  if (i === -1) state.concluidas.push(id); else state.concluidas.splice(i, 1);
  saveState();
  renderSidebar();
  renderSituacao();
}

// ── RENDER SITUAÇÃO ────────────────────────────────────────────────────────────
function renderSituacao() {
  const s = getSituacao(state.situacaoAtual);
  const modo = state.modoDupla[s.id] || 'off';
  const dupla = state.expandidas; // noop keep linter quiet

  let html = `
    <div class="sit-header">
      <div class="sit-eyebrow">Situação ${s.id}</div>
      <div class="sit-title">${s.icon} ${s.tituloEN}</div>
      <div class="sit-desc">${s.descPT}</div>
    </div>
    <div class="dupla-row">
      <button class="dupla-btn ${modo !== 'off' ? 'on' : ''}" onclick="toggleDupla()">
        🎭 ${modo === 'off' ? 'Modo Prática em Dupla' : (modo === 'A' ? 'Praticando como A — falas de A ocultas' : 'Praticando como B — falas de B ocultas')}
      </button>
    </div>
  `;

  s.dialogos.forEach(d => {
    html += `<div class="dialogo-card"><div class="dialogo-head"><span class="dialogo-badge">Diálogo ${d.letra}</span>${d.contexto ? `<span class="dialogo-contexto">${d.contexto}</span>` : ''}</div>`;
    d.linhas.forEach((linha, idx) => {
      const key = s.id + '-' + d.letra + '-' + idx;
      const oculta = modo !== 'off' && linha.spk === modo;
      const revelada = state.revelados[key];
      if (oculta && !revelada) {
        html += `
          <div class="linha linha-oculta">
            <span class="linha-spk">${linha.spk}:</span>
            <div style="flex:1;display:flex;align-items:center;justify-content:space-between;gap:.7rem;flex-wrap:wrap;">
              <span class="linha-placeholder">🗣️ Sua vez — diga a fala de ${linha.spk}</span>
              <button class="linha-reveal-btn" onclick="toggleRevelar('${key}')">👁️ Revelar</button>
            </div>
          </div>
        `;
      } else {
        html += `
          <div class="linha">
            <span class="linha-spk">${linha.spk}:</span>
            <span class="linha-texto">${linha.texto}</span>
          </div>
        `;
      }
    });
    html += `</div>`;
  });

  html += `<div class="vocab-title">📘 Expressões-chave desta situação</div>`;
  html += `
    <div class="table-wrap">
      <table class="v-table">
        <thead><tr><th>Expressão</th><th>Tradução / uso</th></tr></thead>
        <tbody>
          ${s.expressoes.map((v, idx) => {
            const open = (state.expandidas[s.id] || []).includes(idx);
            return `
              <tr class="v-row ${open ? 'active' : ''}" onclick="toggleExpressao(${s.id}, ${idx})">
                <td class="word-cell">${v.expr}</td>
                <td class="def-cell">${v.pt}</td>
              </tr>
              <tr class="exp-row ${open ? '' : 'hidden'}"><td colspan="2"><div class="exp-inner">"${getExemploSituacao(s, v.expr)}"</div></td></tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  html += `
    <div class="progresso-row">
      <label class="progresso-label">
        <input type="checkbox" ${state.concluidas.includes(s.id) ? 'checked' : ''} onchange="toggleConcluida()">
        Já pratiquei esta situação ✓
      </label>
    </div>
  `;

  const curIdx = SITUACOES.findIndex(x => x.id === s.id);
  const next = SITUACOES[(curIdx + 1) % SITUACOES.length];
  html += `
    <div class="next-row">
      <button class="next-btn" onclick="selectSituacao(${next.id})">Próxima situação: ${next.icon} ${next.curto} →</button>
    </div>
  `;

  document.getElementById('situacaoArea').innerHTML = html;
}

function render() {
  renderSidebar();
  renderSituacao();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadState();
render();
